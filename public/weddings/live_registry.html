<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Wedding Registry</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Open+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --sage:#A9BDC4; --olive:#4B5244; --cream:#F9F7F5; --border:#EDE8E3;
    --ink:#121212; --muted:#8C7D6E; --gold:#C9A36A; --line:#CBD5D8; --white:#FFFFFF;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--cream);color:var(--ink);font-family:"Open Sans",sans-serif;-webkit-font-smoothing:antialiased}
  .serif{font-family:"Instrument Serif",serif;font-weight:400}
  em{font-style:italic}
  a{color:inherit}
  img{display:block;max-width:100%}
  button{font-family:inherit;cursor:pointer}
  .container{max-width:1120px;margin:0 auto;padding:0 20px}
  .eyebrow{font-size:12px;letter-spacing:.24em;text-transform:uppercase;color:var(--gold);font-weight:600}

  /* ── Hero ───────────────────────────────────────────── */
  .hero{position:relative;overflow:hidden;color:#fff;text-align:center}
  .hero-bg{position:absolute;inset:0;background:linear-gradient(150deg,#A9BDC4 0%,#4B5244 100%)}
  .hero-bg img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
  .hero-scrim{position:absolute;inset:0;background:linear-gradient(180deg,rgba(18,18,18,.30),rgba(18,18,18,.55))}
  .hero-inner{position:relative;padding:88px 20px 76px;max-width:760px;margin:0 auto}
  .hero h1{font-size:clamp(40px,8vw,72px);line-height:1.04;margin:14px 0 0;text-shadow:0 2px 18px rgba(0,0,0,.35)}
  .hero .date{margin-top:16px;font-size:14px;letter-spacing:.16em;text-transform:uppercase;opacity:.92}
  .hero .welcome{margin:20px auto 0;max-width:560px;font-size:15px;line-height:1.6;opacity:.94}
  .hero .rule{width:46px;height:1px;background:var(--gold);margin:22px auto 0}

  /* ── Sticky toolbar ─────────────────────────────────── */
  .toolbar{position:sticky;top:0;z-index:40;background:rgba(249,247,245,.92);backdrop-filter:blur(8px);border-bottom:1px solid var(--border)}
  .toolbar-row{display:flex;align-items:center;gap:10px;padding:12px 0}
  .search{flex:1;display:flex;align-items:center;gap:8px;background:var(--white);border:1px solid var(--line);border-radius:999px;padding:9px 16px;min-width:0}
  .search input{border:none;outline:none;font-size:14px;width:100%;background:transparent;color:var(--ink)}
  .search svg{flex:none;color:var(--muted)}
  .tbtn{display:inline-flex;align-items:center;gap:7px;border:1px solid var(--olive);color:var(--olive);background:var(--white);border-radius:999px;padding:9px 16px;font-size:13px;font-weight:600;white-space:nowrap}
  .tbtn:hover{background:#fff}
  .tbtn .count{background:var(--olive);color:#fff;border-radius:999px;font-size:11px;padding:1px 7px}
  .pills{display:flex;flex-wrap:wrap;gap:8px;padding-bottom:12px}
  .pill{display:inline-flex;align-items:center;gap:6px;background:var(--border);color:var(--olive);border:none;border-radius:999px;padding:5px 12px;font-size:12px;font-weight:600}
  .pill button{border:none;background:transparent;color:var(--muted);line-height:0;padding:0}
  .meta{font-size:12px;color:var(--muted);padding:0 0 14px}

  /* ── Drawer ─────────────────────────────────────────── */
  .scrim{position:fixed;inset:0;background:rgba(18,18,18,.4);opacity:0;pointer-events:none;transition:opacity .25s;z-index:60}
  .scrim.open{opacity:1;pointer-events:auto}
  .drawer{position:fixed;top:0;right:0;height:100%;width:min(360px,90vw);background:var(--cream);z-index:70;transform:translateX(100%);transition:transform .3s cubic-bezier(.2,.7,.2,1);display:flex;flex-direction:column;box-shadow:-12px 0 40px -24px rgba(0,0,0,.5)}
  .drawer.open{transform:none}
  .drawer-head{display:flex;align-items:center;justify-content:space-between;padding:18px 20px;border-bottom:1px solid var(--border)}
  .drawer-head .serif{font-size:22px}
  .drawer-body{padding:6px 20px 20px;overflow-y:auto;flex:1}
  .fgroup{padding:18px 0;border-bottom:1px solid var(--border)}
  .fgroup h4{font-size:13px;color:var(--olive);margin-bottom:12px;font-weight:700}
  .chips{display:flex;flex-wrap:wrap;gap:8px}
  .chip{border:1px solid var(--line);background:var(--white);color:var(--ink);border-radius:999px;padding:7px 13px;font-size:12.5px;transition:all .15s}
  .chip.on{background:var(--olive);color:#fff;border-color:var(--olive)}
  .drawer-foot{display:flex;gap:10px;padding:16px 20px;border-top:1px solid var(--border)}
  .x{border:none;background:transparent;color:var(--muted);line-height:0;padding:6px;font-size:16px}

  /* ── Accordions + cards ─────────────────────────────── */
  .acc{border-bottom:1px solid var(--border)}
  .acc-head{width:100%;display:flex;align-items:center;justify-content:center;gap:12px;padding:20px 8px;background:transparent;border:none}
  .acc-head .serif{font-size:22px}
  .acc-head .n{font-size:12px;color:var(--muted);font-weight:600;font-family:"Open Sans"}
  .chev{transition:transform .25s;color:var(--olive)}
  .acc.open .chev{transform:rotate(180deg)}
  .acc-body{display:none;padding:6px 0 34px}
  .acc.open .acc-body{display:block}
  .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:18px}
  @media(min-width:640px){.grid{grid-template-columns:repeat(3,1fr)}}
  @media(min-width:920px){.grid{grid-template-columns:repeat(4,1fr)}}

  .card{display:flex;flex-direction:column}
  .card .imgwrap{position:relative;aspect-ratio:1/1;background:var(--white);border:1px solid var(--border);border-radius:6px;overflow:hidden;display:flex;align-items:center;justify-content:center}
  .card .imgwrap img{width:100%;height:100%;object-fit:cover}
  .card .ph{color:var(--line)}
  .badges{position:absolute;top:10px;left:10px;display:flex;flex-direction:column;gap:6px;align-items:flex-start}
  .badge{font-size:10px;font-weight:700;letter-spacing:.04em;color:#fff;border-radius:999px;padding:3px 9px}
  .badge.want{background:rgba(201,163,106,.96)}
  .badge.group{background:rgba(75,82,68,.92)}
  .badge.exp{background:rgba(201,163,106,.96)}
  .card .body{text-align:center;padding:12px 4px 0}
  .card .ttl{font-size:13.5px;line-height:1.3;margin-bottom:5px;min-height:35px}
  .card .price{font-family:"Instrument Serif",serif;font-size:18px}
  .card .sub{font-size:11px;color:var(--muted);margin-top:3px}
  .progress{height:5px;border-radius:999px;background:var(--border);overflow:hidden;margin:9px 2px 0}
  .progress > i{display:block;height:100%;background:var(--gold);border-radius:999px}
  .cta{margin-top:11px;width:100%;border:none;border-radius:999px;padding:10px 0;font-size:13px;font-weight:600;background:var(--olive);color:#fff}
  .cta:hover{opacity:.92}
  .cta.ghost{background:transparent;border:1px solid var(--olive);color:var(--olive)}

  .empty{text-align:center;color:var(--muted);font-size:14px;padding:60px 20px}

  /* ── Modal ──────────────────────────────────────────── */
  .modal-scrim{position:fixed;inset:0;background:rgba(18,18,18,.5);display:none;align-items:flex-end;justify-content:center;z-index:80;padding:0}
  .modal-scrim.open{display:flex}
  @media(min-width:640px){.modal-scrim{align-items:center;padding:20px}}
  .modal{background:var(--cream);width:100%;max-width:560px;max-height:92vh;overflow-y:auto;border-radius:16px 16px 0 0;box-shadow:0 -10px 40px rgba(0,0,0,.3)}
  @media(min-width:640px){.modal{border-radius:12px}}
  .modal-img{aspect-ratio:16/10;background:var(--white);position:relative;overflow:hidden}
  .modal-img img{width:100%;height:100%;object-fit:cover}
  .modal-close{position:absolute;top:12px;right:12px;background:rgba(255,255,255,.92);border:none;border-radius:50%;width:34px;height:34px;display:flex;align-items:center;justify-content:center;color:var(--ink);font-size:15px}
  .modal-pad{padding:20px}
  .modal h3{font-size:24px;line-height:1.15;margin-bottom:6px}
  .modal .m-sub{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px}
  .modal .m-desc{font-size:13.5px;line-height:1.6;color:var(--olive);margin:10px 0}
  .modal .m-note{background:var(--white);border:1px solid var(--border);border-left:3px solid var(--gold);border-radius:6px;padding:10px 12px;font-size:13px;color:var(--olive);font-style:italic;margin:12px 0}
  .field{margin-top:12px}
  .field label{display:block;font-family:"Instrument Serif",serif;font-size:14px;margin-bottom:5px}
  .field input[type=text],.field input[type=email],.field input[type=number],.field input[type=password],.field textarea{
    width:100%;border:1px solid var(--ink);background:var(--white);border-radius:6px;padding:10px 12px;font-size:14px;font-family:"Open Sans";outline:none}
  .field textarea{resize:vertical;min-height:64px}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .check{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--olive);margin-top:12px;cursor:pointer}
  .btn{width:100%;border:none;border-radius:999px;padding:13px 0;font-size:14px;font-weight:600;margin-top:8px}
  .btn-primary{background:var(--olive);color:#fff}
  .btn-primary:hover{opacity:.92}
  .btn-ghost{background:transparent;border:1px solid var(--ink);color:var(--ink)}
  .btn-link{display:flex;align-items:center;justify-content:center;gap:8px;text-decoration:none}
  .pay-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:10px}
  .pay-opt{display:flex;flex-direction:column;align-items:center;gap:3px;border:1px solid var(--line);border-radius:8px;padding:10px 4px;font-size:11px;font-weight:600;text-decoration:none;color:var(--olive);background:var(--white)}
  .hint{font-size:11.5px;color:var(--muted);text-align:center;margin-top:10px;line-height:1.5}
  .spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:-2px}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* ── Banner / gate / footer ─────────────────────────── */
  .banner{position:fixed;top:0;left:0;right:0;z-index:90;text-align:center;padding:13px 18px;font-size:14px;font-weight:600;color:#fff;transform:translateY(-100%);transition:transform .35s}
  .banner.show{transform:none}
  .banner.success{background:var(--olive)}
  .banner.info{background:var(--muted)}
  .gate{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:linear-gradient(150deg,#A9BDC4,#4B5244)}
  .gate-card{background:var(--cream);border-radius:14px;padding:34px 28px;max-width:380px;width:100%;text-align:center}
  .gate-card h2{font-size:26px;margin-bottom:6px}
  .gate-card p{font-size:13px;color:var(--muted);margin-bottom:18px}
  .footer{text-align:center;padding:48px 20px;color:var(--muted);font-size:12px}
  .footer .serif{font-size:18px;color:var(--olive)}
  .center-load{min-height:60vh;display:flex;align-items:center;justify-content:center}
  .center-load .spinner{width:30px;height:30px;border-color:rgba(75,82,68,.25);border-top-color:var(--olive)}
</style>
</head>
<body>
  <div id="banner" class="banner"></div>
  <div id="app"><div class="center-load"><span class="spinner"></span></div></div>

  <!-- Filter drawer -->
  <div id="scrim" class="scrim" onclick="closeDrawer()"></div>
  <aside id="drawer" class="drawer" aria-label="Filters">
    <div class="drawer-head">
      <span class="serif">Filter gifts</span>
      <button class="x" onclick="closeDrawer()" aria-label="Close">✕</button>
    </div>
    <div class="drawer-body" id="drawer-body"></div>
    <div class="drawer-foot">
      <button class="tbtn" style="flex:1;justify-content:center;border-color:var(--line);color:var(--muted)" onclick="clearFilters()">Clear all</button>
      <button class="tbtn" style="flex:1;justify-content:center;background:var(--olive);color:#fff;border-color:var(--olive)" onclick="closeDrawer()">Show results</button>
    </div>
  </aside>

  <!-- Gift / fund modal -->
  <div id="gift-scrim" class="modal-scrim" onclick="if(event.target===this)closeModal('gift')">
    <div class="modal" id="gift-modal"></div>
  </div>
  <!-- Experience modal -->
  <div id="exp-scrim" class="modal-scrim" onclick="if(event.target===this)closeModal('exp')">
    <div class="modal" id="exp-modal"></div>
  </div>
  <!-- Offline purchase modal -->
  <div id="off-scrim" class="modal-scrim" onclick="if(event.target===this)closeModal('off')">
    <div class="modal" id="off-modal" style="max-width:440px"></div>
  </div>

<script>
const RENDER_API = "https://wedding-recommender.onrender.com";
const CASH_FUND_TYPE = "343960eb-ce49-45d6-89b5-0bbe43d877f6";
const CASHFUND_BG   = "https://assets.softr-files.com/applications/98da9671-14f5-418f-b98a-6f8fb833401f/assets/5ff0fe31-c2c9-4ceb-b9b6-1c680c454e8a.png";
const EXPERIENCE_BG = "https://assets.softr-files.com/applications/98da9671-14f5-418f-b98a-6f8fb833401f/assets/992d7bc1-66f9-4941-894c-491a321f8c2c.jpeg";

const state = {
  registryId:null, slug:null, preview:false, password:null,
  data:null, things:[],
  filters:{ search:"", type:"all", cats:new Set(), price:new Set() },
  open:new Set(),
  activeItem:null, activeExp:null,
};

const PRICE_BUCKETS = [
  {id:"u50",  label:"Under $50",   test:c=>c<5000},
  {id:"50",   label:"$50–$100",    test:c=>c>=5000&&c<10000},
  {id:"100",  label:"$100–$250",   test:c=>c>=10000&&c<25000},
  {id:"250",  label:"$250–$500",   test:c=>c>=25000&&c<50000},
  {id:"500",  label:"$500+",       test:c=>c>=50000},
];

const fmt = (cents)=>new Intl.NumberFormat("en-US",{style:"currency",currency:"USD",maximumFractionDigits:0}).format((Number(cents)||0)/100);
const esc = (s)=>String(s==null?"":s).replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]));
const el  = (id)=>document.getElementById(id);
const isFund = (it)=> it.item_type_id===CASH_FUND_TYPE || (Number(it.price_cents)===0 && Number(it.goal_amount_cents)>0);

/* ─── Boot ─────────────────────────────────────────── */
(function init(){
  const params = new URLSearchParams(location.search);
  const m = location.pathname.match(/\/([^\/]+)\/registry\/?$/);
  if (m && m[1] && m[1]!=="preview") state.slug = decodeURIComponent(m[1]);
  state.registryId = params.get("id");
  state.preview = params.get("preview")==="1" || params.get("preview")==="true";

  const c = params.get("contribution");
  if (c==="success"){ showBanner("Thank you so much! Your gift has been received. 💌","success"); cleanParam("contribution"); }
  else if (c==="cancel"){ showBanner("No worries — your checkout was cancelled.","info"); cleanParam("contribution"); }

  load();
})();

function cleanParam(k){ const u=new URL(location.href); u.searchParams.delete(k); history.replaceState({},"",u); }
function showBanner(msg,kind){ const b=el("banner"); b.textContent=msg; b.className="banner "+kind+" show"; setTimeout(()=>b.classList.remove("show"),5200); }

async function load(){
  try{
    let url = state.slug
      ? RENDER_API+"/public/registry/by-slug/"+encodeURIComponent(state.slug)
      : RENDER_API+"/public/registry/"+encodeURIComponent(state.registryId||"");
    const qp=[];
    if(state.preview) qp.push("preview=1");
    if(state.password) qp.push("password="+encodeURIComponent(state.password));
    if(qp.length) url += "?"+qp.join("&");

    const res = await fetch(url);
    const data = await res.json();

    if(data.error==="not_published"){ return renderNotice("This registry isn't published yet.","Check back soon — the couple is still putting it together."); }
    if(data.password_required){ return renderGate(data.title||"Our Registry", data.password_invalid); }

    state.data = data;
    if(!state.registryId && data.registry) state.registryId = data.registry.id;
    buildThings();
    render();
  }catch(e){
    renderNotice("We couldn't load this registry.", "Please refresh the page or try again in a moment.");
  }
}

/* unify items + experiences into one filterable list */
function buildThings(){
  const items = state.data.items || [];
  const exps  = state.data.experiences || [];
  const things = [];
  items.forEach(it=>{
    const fund = isFund(it);
    things.push({
      kind: fund?"fund":"gift", raw:it, id:it.id,
      title:it.title, image:it.image_url || (fund?CASHFUND_BG:""),
      amount: fund? (Number(it.goal_amount_cents)||0) : (Number(it.price_cents)||0),
      category: fund?"Cash Funds":(it.category||"Gifts"),
      mostWanted: !!it.is_most_wanted, group:!!it.is_group_gift,
      sort: it.sort_order==null?9999:it.sort_order,
    });
  });
  exps.forEach(e=>{
    things.push({
      kind:"experience", raw:e, id:e.id,
      title:e.title, image:e.image_url||EXPERIENCE_BG,
      amount:Number(e.cost_cents)||0, received:Number(e.amount_received_cents)||0,
      category:"Honeymoon Experiences", location:e.location||"",
      mostWanted:false, group:false, sort:e.sort_order==null?9999:e.sort_order,
    });
  });
  things.sort((a,b)=>a.sort-b.sort);
  state.things = things;
}

function categoriesAvailable(){
  const s=new Set();
  state.things.forEach(t=>{ if(t.kind==="gift") s.add(t.category); });
  return Array.from(s).sort();
}

function applyFilters(){
  const f=state.filters, q=f.search.trim().toLowerCase();
  return state.things.filter(t=>{
    if(f.type==="gifts" && t.kind!=="gift") return false;
    if(f.type==="funds" && t.kind!=="fund") return false;
    if(f.type==="experiences" && t.kind!=="experience") return false;
    if(f.cats.size && !f.cats.has(t.category)) return false;
    if(f.price.size){
      const ok=[...f.price].some(id=>{ const b=PRICE_BUCKETS.find(x=>x.id===id); return b&&b.test(t.amount); });
      if(!ok) return false;
    }
    if(q && !((t.title+" "+(t.location||"")).toLowerCase().includes(q))) return false;
    return true;
  });
}

/* group filtered things into ordered accordion groups */
function groupThings(list){
  const wanted = list.filter(t=>t.mostWanted);
  const byCat = {};
  list.forEach(t=>{ (byCat[t.category]=byCat[t.category]||[]).push(t); });
  const order=[];
  if(wanted.length) order.push(["Most Wanted", wanted]);
  Object.keys(byCat).filter(c=>c!=="Cash Funds"&&c!=="Honeymoon Experiences").sort()
    .forEach(c=>order.push([c, byCat[c]]));
  if(byCat["Cash Funds"]) order.push(["Cash Funds", byCat["Cash Funds"]]);
  if(byCat["Honeymoon Experiences"]) order.push(["Honeymoon Experiences", byCat["Honeymoon Experiences"]]);
  return order;
}

/* ─── Render ────────────────────────────────────────── */
function render(){
  const r=state.data.registry||{}, couple=state.data.couple||{};
  const name = couple.name || r.title || "Our Registry";
  const dateStr = couple.date ? new Date(couple.date).toLocaleDateString("en-US",{month:"long",day:"numeric",year:"numeric"}) : "";
  const hero = r.hero_image_url || "";

  const filtered = applyFilters();
  const groups = groupThings(filtered);
  const activeFilterCount = state.filters.cats.size + state.filters.price.size + (state.filters.type!=="all"?1:0);

  el("app").innerHTML =
    '<header class="hero">'
    +   '<div class="hero-bg">'+(hero?'<img src="'+esc(hero)+'" alt="" onerror="this.remove()">':"")+'</div>'
    +   '<div class="hero-scrim"></div>'
    +   '<div class="hero-inner">'
    +     '<div class="eyebrow" style="color:#fff;opacity:.9">The Registry</div>'
    +     '<h1 class="serif">'+esc(name)+'</h1>'
    +     (dateStr?'<div class="date">'+esc(dateStr)+'</div>':"")
    +     (r.welcome_note
              ? '<p class="welcome">'+esc(r.welcome_note)+'</p>'
              : '<p class="welcome">Thank you for celebrating with us. Browse our registry below and pick something you would love to give.</p>')
    +     '<div class="rule"></div>'
    +   '</div>'
    + '</header>'

    + '<div class="toolbar"><div class="container">'
    +   '<div class="toolbar-row">'
    +     '<div class="search">'
    +       '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>'
    +       '<input id="search" type="text" placeholder="Search the registry…" value="'+esc(state.filters.search)+'" oninput="onSearch(this.value)">'
    +     '</div>'
    +     '<button class="tbtn" onclick="openDrawer()">'
    +       '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M7 12h10M10 18h4"/></svg>'
    +       'Filters '+(activeFilterCount?'<span class="count">'+activeFilterCount+'</span>':"")
    +     '</button>'
    +   '</div>'
    +   renderPills()
    +   '<div class="meta">'+filtered.length+' '+(filtered.length===1?"gift":"gifts")+' '+(state.preview?"· preview mode":"")+'</div>'
    + '</div></div>'

    + '<main class="container" style="padding-bottom:30px">'
    +   (groups.length===0
          ? '<div class="empty">No gifts match your filters.<br><button class="cta ghost" style="width:auto;padding:9px 20px;margin-top:14px" onclick="clearFilters()">Clear filters</button></div>'
          : groups.map(g=>renderAccordion(g[0],g[1])).join(""))
    + '</main>'

    + '<footer class="footer"><div class="serif">'+esc(name)+'</div>'
    +   '<div style="margin-top:6px">With love and gratitude · powered by MyPlanning</div></footer>';

  if(state.open.size===0 && groups.length){ state.open.add(groups[0][0]); const a=document.querySelector(".acc"); if(a) a.classList.add("open"); }
  renderDrawer();
}

function renderPills(){
  const f=state.filters, pills=[];
  if(f.type!=="all") pills.push(["type", ({gifts:"Gifts",funds:"Cash Funds",experiences:"Experiences"})[f.type]]);
  f.cats.forEach(c=>pills.push(["cat:"+c, c]));
  f.price.forEach(id=>{ const b=PRICE_BUCKETS.find(x=>x.id===id); pills.push(["price:"+id, b?b.label:id]); });
  if(!pills.length) return "";
  return '<div class="pills">'+pills.map(p=>'<span class="pill">'+esc(p[1])+'<button onclick="removePill(\''+p[0].replace(/'/g,"\\'")+'\')" aria-label="Remove">✕</button></span>').join("")+'</div>';
}

function renderAccordion(cat,list){
  const open = state.open.has(cat);
  return '<section class="acc '+(open?"open":"")+'">'
    + '<button class="acc-head" onclick="toggleAcc(\''+esc(cat).replace(/'/g,"\\'")+'\')">'
    +   '<span class="serif">'+esc(cat)+'</span>'
    +   '<span class="n">'+list.length+'</span>'
    +   '<svg class="chev" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m6 9 6 6 6-6"/></svg>'
    + '</button>'
    + '<div class="acc-body"><div class="grid">'+list.map(renderCard).join("")+'</div></div>'
    + '</section>';
}

function renderCard(t){
  const phSvg='<svg class="ph" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="m3 16 5-5 4 4 3-3 6 6"/></svg>';
  const img = t.image
    ? '<img src="'+esc(t.image)+'" alt="'+esc(t.title)+'" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'block\'">'+phSvg.replace('class="ph"','class="ph" style="display:none"')
    : phSvg;

  let badges = "";
  if(t.mostWanted) badges += '<span class="badge want">Most wanted</span>';
  if(t.kind==="experience") badges += '<span class="badge exp">Experience</span>';
  else if(t.group && t.kind==="gift") badges += '<span class="badge group">Group gift</span>';
  else if(t.kind==="fund") badges += '<span class="badge group">Cash fund</span>';

  let sub="", prog="";
  if(t.kind==="experience"){
    sub = t.location ? esc(t.location) : "Honeymoon experience";
    if(t.amount>0){ const pct=Math.min(100,Math.round((t.received/t.amount)*100)); prog='<div class="progress"><i style="width:'+pct+'%"></i></div><div class="sub">'+fmt(t.received)+' of '+fmt(t.amount)+'</div>'; }
  } else if(t.kind==="fund"){
    sub = "Goal: "+fmt(t.amount);
  } else {
    const q=t.raw.quantity_requested||1;
    sub = q>1 ? (q+" requested") : "&nbsp;";
  }

  const ctaLabel = t.kind==="gift" ? "View gift" : "Contribute";
  const onClick = t.kind==="experience" ? "openExp('"+t.id+"')" : "openGift('"+t.id+"')";

  return '<div class="card">'
    + '<div class="imgwrap">'+img+'<div class="badges">'+badges+'</div></div>'
    + '<div class="body"><div class="ttl">'+esc(t.title)+'</div>'
    +   '<div class="price">'+fmt(t.amount)+'</div><div class="sub">'+sub+'</div></div>'
    + prog
    + '<button class="cta" onclick="'+onClick+'">'+ctaLabel+'</button>'
    + '</div>';
}

/* ─── Filters UI ────────────────────────────────────── */
function renderDrawer(){
  const f=state.filters, cats=categoriesAvailable();
  const typeChip=(v,l)=>'<button class="chip '+(f.type===v?"on":"")+'" onclick="setType(\''+v+'\')">'+l+'</button>';
  el("drawer-body").innerHTML =
    '<div class="fgroup"><h4>Show</h4><div class="chips">'
    + typeChip("all","Everything")+typeChip("gifts","Gifts")+typeChip("funds","Cash Funds")+typeChip("experiences","Experiences")
    + '</div></div>'
    + (cats.length?'<div class="fgroup"><h4>Category</h4><div class="chips">'
        + cats.map(c=>'<button class="chip '+(f.cats.has(c)?"on":"")+'" onclick="toggleCat(\''+esc(c).replace(/'/g,"\\'")+'\')">'+esc(c)+'</button>').join("")
        + '</div></div>':"")
    + '<div class="fgroup" style="border-bottom:none"><h4>Price</h4><div class="chips">'
    + PRICE_BUCKETS.map(b=>'<button class="chip '+(f.price.has(b.id)?"on":"")+'" onclick="togglePrice(\''+b.id+'\')">'+b.label+'</button>').join("")
    + '</div></div>';
}
function openDrawer(){ renderDrawer(); el("drawer").classList.add("open"); el("scrim").classList.add("open"); }
function closeDrawer(){ el("drawer").classList.remove("open"); el("scrim").classList.remove("open"); }
function onSearch(v){ state.filters.search=v; rerenderContent(); }
function setType(v){ state.filters.type=v; renderDrawer(); rerenderContent(); }
function toggleCat(c){ const s=state.filters.cats; s.has(c)?s.delete(c):s.add(c); renderDrawer(); rerenderContent(); }
function togglePrice(id){ const s=state.filters.price; s.has(id)?s.delete(id):s.add(id); renderDrawer(); rerenderContent(); }
function clearFilters(){ state.filters={search:"",type:"all",cats:new Set(),price:new Set()}; const si=el("search"); if(si)si.value=""; renderDrawer(); rerenderContent(); }
function removePill(k){
  if(k==="type") state.filters.type="all";
  else if(k.indexOf("cat:")===0) state.filters.cats.delete(k.slice(4));
  else if(k.indexOf("price:")===0) state.filters.price.delete(k.slice(6));
  renderDrawer(); rerenderContent();
}
function toggleAcc(cat){ state.open.has(cat)?state.open.delete(cat):state.open.add(cat); rerenderContent(); }

function rerenderContent(){
  const focused = document.activeElement===el("search");
  render();
  if(focused){ const si=el("search"); si.focus(); si.setSelectionRange(si.value.length,si.value.length); }
}

/* ─── Gift / fund modal ─────────────────────────────── */
function openGift(id){
  const it=(state.data.items||[]).find(x=>x.id===id); if(!it) return;
  state.activeItem=it;
  const r=state.data.registry||{};
  const fund=isFund(it);
  const stripeOk = r.has_stripe_connect && r.stripe_active;
  const handles = r.payment_handles||{};
  const anyHandle = handles.paypal||handles.venmo||handles.cashapp;
  const img = it.image_url || (fund?CASHFUND_BG:"");
  const amount = fund ? (it.goal_amount_cents||0) : (it.price_cents||0);
  const min = it.min_contribution_cents || 2500;

  let action="";
  if(fund || it.is_group_gift){
    const stripeBlock = stripeOk ?
        '<div class="field"><label>Your contribution ($)</label>'
      +   '<input type="number" id="g-amt" min="'+(min/100)+'" step="1" value="'+Math.max(25,Math.round(min/100))+'"></div>'
      + '<div class="row2"><div class="field"><label>Your name</label><input type="text" id="g-name"></div>'
      +   '<div class="field"><label>Email</label><input type="email" id="g-email"></div></div>'
      + '<div class="field"><label>A note to the couple <span style="color:var(--muted);font-style:normal">(optional)</span></label>'
      +   '<textarea id="g-note" placeholder="Wishing you both a lifetime of happiness…"></textarea></div>'
      + '<label class="check"><input type="checkbox" id="g-anon"> Keep my gift anonymous</label>'
      + '<button class="btn btn-primary" id="g-submit" onclick="submitContribution()">Contribute '+fmt(min)+'+ via Stripe →</button>'
      + '<div class="hint">Secure checkout via Stripe. Your gift goes straight to the couple.</div>'
      : "";
    const handleBlock = (!stripeOk && anyHandle) ?
        '<p class="hint" style="margin-top:0">Send your gift directly to the couple:</p><div class="pay-grid">'
      + (handles.venmo?'<a class="pay-opt" target="_blank" rel="noopener" href="https://venmo.com/u/'+encodeURIComponent(handles.venmo)+'">Venmo<span style="color:var(--muted)">@'+esc(handles.venmo)+'</span></a>':"")
      + (handles.paypal?'<a class="pay-opt" target="_blank" rel="noopener" href="https://paypal.me/'+encodeURIComponent(handles.paypal)+'">PayPal<span style="color:var(--muted)">'+esc(handles.paypal)+'</span></a>':"")
      + (handles.cashapp?'<a class="pay-opt" target="_blank" rel="noopener" href="https://cash.app/$'+encodeURIComponent(handles.cashapp)+'">Cash App<span style="color:var(--muted)">$'+esc(handles.cashapp)+'</span></a>':"")
      + '</div>' : "";
    const none = (!stripeOk && !anyHandle) ? '<div class="hint">The couple hasn\'t finished setting up gifting yet — please check back soon.</div>' : "";
    action = stripeBlock + handleBlock + none;
  } else {
    const buy = it.source_url ? '<a class="btn btn-primary btn-link" target="_blank" rel="noopener" href="'+esc(it.source_url)+'">Buy this gift →</a>' : "";
    action = buy
      + '<button class="btn '+(it.source_url?"btn-ghost":"btn-primary")+'" onclick="openOffline()">I already bought this</button>'
      + '<div class="hint">'+(it.source_url?"Buy it wherever you like, then let the couple know so it's marked off the list.":"Found it elsewhere? Buy it, then let the couple know so it's marked off the list.")+'</div>';
  }

  el("gift-modal").innerHTML =
      '<div class="modal-img">'+(img?'<img src="'+esc(img)+'" alt="" onerror="this.remove()">':"")
    +   '<button class="modal-close" onclick="closeModal(\'gift\')" aria-label="Close">✕</button></div>'
    + '<div class="modal-pad">'
    +   (it.source?'<div class="m-sub">'+esc(it.source)+'</div>':"")
    +   '<h3 class="serif">'+esc(it.title)+'</h3>'
    +   '<div class="price serif" style="font-size:20px;margin:2px 0 4px">'+fmt(amount)+(fund?' <span style="font-size:13px;color:var(--muted);font-family:\'Open Sans\'">goal</span>':"")+'</div>'
    +   (it.description?'<p class="m-desc">'+esc(it.description)+'</p>':"")
    +   (it.couple_note?'<div class="m-note">“'+esc(it.couple_note)+'”</div>':"")
    +   action
    + '</div>';
  openModal("gift");
}

async function submitContribution(){
  const it=state.activeItem; if(!it) return;
  const min = it.min_contribution_cents || 2500;
  const name=(el("g-name")?el("g-name").value:"").trim();
  const email=(el("g-email")?el("g-email").value:"").trim();
  const note=(el("g-note")?el("g-note").value:"").trim();
  const anon=el("g-anon")?el("g-anon").checked:false;
  const dollars=parseFloat(el("g-amt")?el("g-amt").value:"0")||0;
  const amount_cents=Math.round(dollars*100);
  if(amount_cents<min){ alert("Minimum contribution is "+fmt(min)+"."); return; }
  if(!name){ alert("Please enter your name."); return; }
  if(!email){ alert("Please enter your email."); return; }

  const btn=el("g-submit"); btn.disabled=true; btn.innerHTML='<span class="spinner"></span> Redirecting to Stripe…';
  try{
    const ret=retUrl(), sep=ret.includes("?")?"&":"?";
    const res = await fetch(RENDER_API+"/public/registry/"+state.registryId+"/checkout",{
      method:"POST", headers:{"Content-Type":"application/json"},
      body:JSON.stringify({ item_id:it.id, guest_name:name, guest_email:email, amount_cents, quantity:1,
        gift_note:note||null, is_anonymous:anon, success_url:ret+sep+"contribution=success", cancel_url:ret+sep+"contribution=cancel" }),
    });
    if(!res.ok) throw new Error(await errText(res));
    const data=await res.json();
    if(data.session_url) location.href=data.session_url; else throw new Error("Checkout session URL missing");
  }catch(e){ alert("Couldn't start checkout: "+e.message); btn.disabled=false; btn.innerHTML="Contribute via Stripe →"; }
}

/* ─── Offline "I bought it" ─────────────────────────── */
function openOffline(){
  const it=state.activeItem; if(!it) return;
  el("off-modal").innerHTML=
      '<div class="modal-pad"><h3 class="serif" style="font-size:22px">Mark as purchased</h3>'
    + '<p class="m-desc" style="margin-top:4px">Let the couple know you have <strong>'+esc(it.title)+'</strong> so it comes off the list.</p>'
    + '<div class="field"><label>Your name</label><input type="text" id="off-name"></div>'
    + '<div class="field"><label>Email <span style="color:var(--muted);font-style:normal">(optional)</span></label><input type="email" id="off-email"></div>'
    + '<button class="btn btn-primary" id="off-submit" onclick="submitOffline()">I bought it</button>'
    + '<button class="btn btn-ghost" onclick="closeModal(\'off\')">Cancel</button></div>';
  openModal("off");
}
async function submitOffline(){
  const it=state.activeItem; if(!it) return;
  const name=(el("off-name")?el("off-name").value:"").trim();
  const email=(el("off-email")?el("off-email").value:"").trim();
  if(!name){ alert("Please enter your name."); return; }
  const btn=el("off-submit"); btn.disabled=true; btn.innerHTML='<span class="spinner"></span> Saving…';
  try{
    const res=await fetch(RENDER_API+"/registry/items/mark-purchased-offline",{
      method:"POST", headers:{"Content-Type":"application/json"},
      body:JSON.stringify({ registry_id:state.registryId, item_id:it.id, guest_name:name, guest_email:email||null, quantity:1 }),
    });
    if(!res.ok) throw new Error(await errText(res));
    closeModal("off"); closeModal("gift");
    showBanner("Thanks "+name.split(/\s+/)[0]+"! We've let the couple know.","success");
  }catch(e){ alert("Couldn't save: "+e.message); btn.disabled=false; btn.innerHTML="I bought it"; }
}

/* ─── Experience modal ──────────────────────────────── */
function openExp(id){
  const exp=(state.data.experiences||[]).find(x=>x.id===id); if(!exp) return;
  state.activeExp=exp;
  const r=state.data.registry||{};
  const stripeOk=r.has_stripe_connect && r.stripe_active;
  const img=exp.image_url||EXPERIENCE_BG;
  const cost=exp.cost_cents||0, min=exp.min_contribution_cents||2500;
  const received=exp.amount_received_cents||0;
  const remaining=Math.max(0,cost-received);
  const pct = cost>0 ? Math.min(100,Math.round((received/cost)*100)) : 0;

  const form = stripeOk ?
      (exp.allow_partial
        ? '<div class="field"><label>Your contribution ($)</label><input type="number" id="e-amt" min="'+(min/100)+'" step="1" value="'+Math.max(25,Math.round(min/100))+'"></div>'
        : '<div class="hint" style="text-align:left;margin:8px 0 0">This experience is gifted in full: <strong>'+fmt(cost)+'</strong>.</div>')
    + '<div class="row2"><div class="field"><label>Your name</label><input type="text" id="e-name"></div>'
    +   '<div class="field"><label>Email</label><input type="email" id="e-email"></div></div>'
    + '<div class="field"><label>A note for the couple <span style="color:var(--muted);font-style:normal">(optional)</span></label>'
    +   '<textarea id="e-note" placeholder="Enjoy every moment…"></textarea></div>'
    + '<div class="field"><label>Display name on their memory wall <span style="color:var(--muted);font-style:normal">(optional)</span></label>'
    +   '<input type="text" id="e-display" placeholder="e.g. Aunt Mei & Family"></div>'
    + '<label class="check"><input type="checkbox" id="e-journal" checked> Add my note to the couple\'s travel journal</label>'
    + '<label class="check"><input type="checkbox" id="e-anon"> Keep my gift anonymous</label>'
    + '<button class="btn btn-primary" id="e-submit" onclick="submitExp()">Contribute via Stripe →</button>'
    + '<div class="hint">Secure checkout via Stripe. Your gift funds a real moment on their trip.</div>'
    : '<div class="hint">The couple hasn\'t finished setting up experience gifting yet — please check back soon.</div>';

  el("exp-modal").innerHTML =
      '<div class="modal-img">'+(img?'<img src="'+esc(img)+'" alt="" onerror="this.remove()">':"")
    +   '<button class="modal-close" onclick="closeModal(\'exp\')" aria-label="Close">✕</button></div>'
    + '<div class="modal-pad">'
    +   '<div class="m-sub">'+esc(exp.category||"Experience")+(exp.location?" · "+esc(exp.location):"")+'</div>'
    +   '<h3 class="serif">'+esc(exp.title)+'</h3>'
    +   '<div class="price serif" style="font-size:20px;margin:2px 0 6px">'+fmt(cost)+'</div>'
    +   (cost>0?'<div class="progress" style="margin-left:0;margin-right:0"><i style="width:'+pct+'%"></i></div><div class="sub" style="margin-bottom:4px">'+fmt(received)+' funded · '+fmt(remaining)+' to go</div>':"")
    +   (exp.description?'<p class="m-desc">'+esc(exp.description)+'</p>':"")
    +   form
    + '</div>';
  openModal("exp");
}
async function submitExp(){
  const exp=state.activeExp; if(!exp) return;
  const name=(el("e-name")?el("e-name").value:"").trim();
  const email=(el("e-email")?el("e-email").value:"").trim();
  const note=(el("e-note")?el("e-note").value:"").trim();
  const display=(el("e-display")?el("e-display").value:"").trim();
  const journal=el("e-journal")?el("e-journal").checked:false;
  const anon=el("e-anon")?el("e-anon").checked:false;
  let amount_cents;
  if(exp.allow_partial){
    const d=parseFloat(el("e-amt")?el("e-amt").value:"0")||0; amount_cents=Math.round(d*100);
    const min=exp.min_contribution_cents||2500;
    if(amount_cents<min){ alert("Minimum contribution is "+fmt(min)+"."); return; }
  } else { amount_cents=exp.cost_cents||0; }
  if(!name){ alert("Please enter your name."); return; }
  if(!email){ alert("Please enter your email."); return; }

  const btn=el("e-submit"); btn.disabled=true; btn.innerHTML='<span class="spinner"></span> Redirecting to Stripe…';
  try{
    const ret=retUrl(), sep=ret.includes("?")?"&":"?";
    const res=await fetch(RENDER_API+"/public/registry/"+state.registryId+"/checkout",{
      method:"POST", headers:{"Content-Type":"application/json"},
      body:JSON.stringify({ experience_id:exp.id, guest_name:name, guest_email:email, amount_cents,
        gift_note:note||null, display_name:anon?null:(display||null), show_in_journal:journal, is_anonymous:anon,
        success_url:ret+sep+"contribution=success", cancel_url:ret+sep+"contribution=cancel" }),
    });
    if(!res.ok) throw new Error(await errText(res));
    const data=await res.json();
    if(data.session_url) location.href=data.session_url; else throw new Error("Checkout session URL missing");
  }catch(e){ alert("Couldn't start checkout: "+e.message); btn.disabled=false; btn.innerHTML="Contribute via Stripe →"; }
}

/* ─── Modal plumbing + helpers ──────────────────────── */
function openModal(k){ el(k+"-scrim").classList.add("open"); document.body.style.overflow="hidden"; }
function closeModal(k){ el(k+"-scrim").classList.remove("open"); document.body.style.overflow=""; }
function retUrl(){ return state.slug ? (location.origin+location.pathname) : (location.origin+location.pathname+"?id="+encodeURIComponent(state.registryId)); }
async function errText(res){ const t=await res.text(); try{ return JSON.parse(t).detail||t; }catch(e){ return t; } }

/* ─── Password gate & notices ───────────────────────── */
function renderGate(title, invalid){
  el("app").innerHTML=
      '<div class="gate"><div class="gate-card">'
    + '<div class="eyebrow">Private registry</div>'
    + '<h2 class="serif" style="margin-top:6px">'+esc(title)+'</h2>'
    + '<p>This registry is password-protected. Please enter the password the couple shared with you.</p>'
    + '<div class="field"><input type="password" id="gate-pw" placeholder="Password" style="text-align:center"></div>'
    + (invalid?'<div style="color:#C23331;font-size:12px;margin-top:8px">That password didn\'t match — please try again.</div>':"")
    + '<button class="btn btn-primary" onclick="submitGate()">Unlock registry</button>'
    + '</div></div>';
  setTimeout(()=>{ const g=el("gate-pw"); if(g){ g.focus(); g.addEventListener("keydown",e=>{ if(e.key==="Enter") submitGate(); }); } },50);
}
function submitGate(){ const g=el("gate-pw"); const v=g?g.value.trim():""; if(!v) return; state.password=v; el("app").innerHTML='<div class="center-load"><span class="spinner"></span></div>'; load(); }
function renderNotice(title,sub){
  el("app").innerHTML='<div class="gate"><div class="gate-card"><h2 class="serif">'+esc(title)+'</h2><p style="margin-bottom:0">'+esc(sub)+'</p></div></div>';
}
</script>
</body>
