<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Wedding Registry</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Open+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --sage:#A9BDC4; --olive:#4B5244; --cream:#F9F7F5; --ink:#121212;
    --muted:#8C7D6E; --border:#CBD5D8; --line:#EDE8E3; --gold:#C9A36A; --white:#FFFFFF;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--sage);color:var(--ink);font-family:"Open Sans",sans-serif;-webkit-font-smoothing:antialiased}
  .serif{font-family:"Instrument Serif",serif;font-weight:400}
  em{font-style:italic}
  a{color:inherit}
  img{display:block;max-width:100%}
  button{font-family:inherit;cursor:pointer}
  .wrap{max-width:1180px;margin:0 auto;padding:0 20px}
  .eyebrow{font-size:12px;letter-spacing:.22em;text-transform:uppercase;color:var(--gold);font-weight:600}

  /* ── Hero (mirrors the registry dashboard) ──────────── */
  .hero{position:relative;min-height:320px;aspect-ratio:16/6;overflow:hidden;background:#E5E0D9}
  .hero img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center}
  .hero-scrim{position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.18) 0%,rgba(0,0,0,.42) 100%)}
  .hero-text{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px}
  .hero-text h1{font-size:clamp(34px,7vw,64px);line-height:1.08;color:#fff;text-shadow:0 2px 16px rgba(0,0,0,.4)}
  .hero-text .date{margin-top:8px;font-family:"Instrument Serif",serif;font-style:italic;font-size:clamp(18px,3.4vw,28px);color:#fff;text-shadow:0 2px 12px rgba(0,0,0,.4)}

  /* ── Header band ─────────────────────────────────────── */
  .head{background:var(--cream);text-align:center;padding:30px 20px 10px}
  .head h2{font-size:30px}
  .head p{font-size:13.5px;color:var(--muted);margin-top:8px;max-width:560px;margin-left:auto;margin-right:auto;line-height:1.6}

  /* ── Sticky filter bar ──────────────────────────────── */
  .bar{position:sticky;top:0;z-index:40;background:var(--cream);box-shadow:0 1px 5px rgba(0,0,0,.07)}
  .bar-row{display:flex;align-items:center;gap:10px;padding:14px 0}
  .allbtn{display:inline-flex;align-items:center;gap:8px;background:var(--white);border:1px solid var(--border);color:var(--ink);border-radius:999px;padding:9px 16px;font-size:13px;font-weight:600;white-space:nowrap}
  .allbtn .count{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:999px;background:var(--olive);color:#fff;font-size:11px}
  .search{position:relative;flex:1;min-width:150px}
  .search svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none}
  .search input{width:100%;border:1px solid var(--border);background:var(--white);border-radius:999px;height:38px;padding:0 36px 0 34px;font-size:13px;color:var(--ink);outline:none;font-family:"Open Sans"}
  .search .clr{position:absolute;right:8px;top:50%;transform:translateY(-50%);border:none;background:transparent;color:var(--muted);line-height:0;padding:4px}
  .count-txt{font-size:13px;font-weight:600;color:var(--olive);white-space:nowrap}
  .sortbtn{display:flex;align-items:center;justify-content:center;width:38px;height:38px;border-radius:999px;background:var(--white);border:1px solid var(--border)}
  .sortmenu{position:absolute;right:0;top:46px;z-index:50;background:var(--white);border:1px solid var(--sage);border-radius:10px;padding:6px;width:210px;box-shadow:0 10px 30px rgba(0,0,0,.12)}
  .sortmenu button{display:flex;align-items:center;gap:8px;width:100%;text-align:left;border:none;background:transparent;border-radius:7px;padding:9px 10px;font-size:13px;color:var(--ink)}
  .sortmenu button:hover{background:#f3f1ee}
  .pills{display:flex;flex-wrap:wrap;gap:8px;padding-bottom:12px}
  .pill{display:inline-flex;align-items:center;gap:7px;background:var(--olive);color:#fff;border:1px solid var(--olive);border-radius:999px;padding:6px 13px;font-size:12.5px;font-weight:600}
  .pill button{border:none;background:transparent;color:rgba(255,255,255,.75);line-height:0;padding:0}

  /* ── Drawer (catalog style) ─────────────────────────── */
  .scrim{position:fixed;inset:0;background:rgba(0,0,0,.3);opacity:0;pointer-events:none;transition:opacity .2s;z-index:60}
  .scrim.open{opacity:1;pointer-events:auto}
  .drawer{position:fixed;top:0;right:0;height:100%;width:100%;max-width:384px;background:var(--cream);z-index:70;transform:translateX(100%);transition:transform .25s ease;overflow-y:auto;box-shadow:-12px 0 40px -24px rgba(0,0,0,.5)}
  .drawer.open{transform:none}
  .drawer-pad{padding:24px}
  .drawer-top{display:flex;align-items:center;justify-content:between;justify-content:space-between;margin-bottom:18px}
  .drawer-top h3{font-size:22px}
  .sep{border-top:1px solid var(--sage);margin:20px 0}
  .grp-h{font-size:13px;font-weight:700;color:var(--olive);margin-bottom:12px}
  .chips{display:flex;flex-wrap:wrap;gap:8px}
  .chip{border:1px solid var(--sage);background:var(--white);color:var(--olive);border-radius:999px;padding:7px 13px;font-size:12.5px;font-weight:500;transition:all .15s}
  .chip.on{background:var(--olive);color:#fff;border-color:var(--olive)}
  .ck{display:flex;align-items:center;gap:9px;margin:11px 0;cursor:pointer}
  .ck .box{width:17px;height:17px;border-radius:4px;border:2px solid var(--sage);display:flex;align-items:center;justify-content:center;flex:none;transition:all .15s}
  .ck.on .box{background:var(--olive);border-color:var(--olive)}
  .ck span{font-size:13.5px}
  .drawer-actions{display:flex;flex-direction:column;gap:10px;margin-top:24px}
  .btn{border:none;border-radius:999px;padding:12px 0;font-size:14px;font-weight:600;width:100%}
  .btn-primary{background:var(--olive);color:#fff}
  .btn-primary:hover{opacity:.92}
  .btn-out{background:var(--white);border:1px solid var(--sage);color:var(--olive)}
  .x{border:none;background:transparent;color:var(--ink);line-height:0;padding:6px;font-size:16px}

  /* ── Accordions ─────────────────────────────────────── */
  .content{background:var(--sage);min-height:420px;padding-bottom:40px}
  .acc{border-bottom:1px solid rgba(75,82,68,.16)}
  .acc-head{width:100%;display:flex;align-items:center;justify-content:center;gap:12px;padding:22px 8px;background:transparent;border:none}
  .acc-head .serif{font-size:24px;color:var(--ink)}
  .acc-head .n{font-size:12px;color:var(--olive);font-weight:600}
  .chev{transition:transform .26s ease;color:var(--olive)}
  .acc.open .chev{transform:rotate(180deg)}
  .acc-body{display:grid;grid-template-rows:0fr;opacity:.3;transition:grid-template-rows .26s ease,opacity .2s ease}
  .acc.open .acc-body{grid-template-rows:1fr;opacity:1}
  .acc-inner{overflow:hidden;min-height:0}
  .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:18px;padding:4px 0 34px}
  @media(min-width:640px){.grid{grid-template-columns:repeat(3,1fr)}}
  @media(min-width:980px){.grid{grid-template-columns:repeat(4,1fr)}}

  /* ── Cards ──────────────────────────────────────────── */
  .card{display:flex;flex-direction:column}
  .card-click{cursor:pointer}
  .imgwrap{position:relative;aspect-ratio:1/1;background:var(--white);border:1px solid var(--line);border-radius:4px;overflow:hidden;display:flex;align-items:center;justify-content:center}
  .imgwrap img{width:100%;height:100%;object-fit:cover}
  .ph{color:var(--border)}
  .badges{position:absolute;top:9px;left:9px;display:flex;flex-direction:column;gap:5px;align-items:flex-start}
  .badge{font-size:10px;font-weight:700;letter-spacing:.03em;color:#fff;border-radius:999px;padding:3px 9px}
  .badge.want{background:rgba(201,163,106,.97)}
  .badge.group{background:rgba(75,82,68,.92)}
  .badge.exp{background:rgba(201,163,106,.97)}
  .card .body{text-align:center;margin-top:9px}
  .card .src{font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin-bottom:2px}
  .card .ttl{font-size:13px;color:var(--ink);line-height:1.3;margin-bottom:3px;min-height:34px}
  .card .price{font-family:"Instrument Serif",serif;font-size:16px}
  .card .sub{font-size:11px;color:var(--olive);margin-top:2px}
  .progress{height:5px;border-radius:999px;background:rgba(255,255,255,.55);overflow:hidden;margin:8px 2px 0}
  .progress > i{display:block;height:100%;background:var(--gold);border-radius:999px}
  .cta-row{display:flex;gap:7px;margin-top:11px}
  .cta{flex:1;border:none;border-radius:999px;padding:9px 0;font-size:12.5px;font-weight:600;text-align:center;text-decoration:none;display:inline-flex;align-items:center;justify-content:center;gap:5px}
  .cta.solid{background:var(--olive);color:#fff}
  .cta.solid:hover{opacity:.92}
  .cta.out{background:transparent;border:1px solid var(--olive);color:var(--olive)}
  .cta.out:hover{background:rgba(75,82,68,.06)}

  .empty{text-align:center;color:#fff;padding:70px 20px}
  .empty .ring{width:84px;height:84px;border-radius:999px;background:rgba(255,255,255,.3);display:flex;align-items:center;justify-content:center;margin:0 auto 16px}

  /* ── Modal ──────────────────────────────────────────── */
  .m-scrim{position:fixed;inset:0;background:rgba(18,18,18,.55);display:none;align-items:flex-end;justify-content:center;z-index:80}
  .m-scrim.open{display:flex}
  @media(min-width:640px){.m-scrim{align-items:center;padding:20px}}
  .modal{background:var(--cream);width:100%;max-width:580px;max-height:92vh;overflow-y:auto;border-radius:16px 16px 0 0;box-shadow:0 -10px 40px rgba(0,0,0,.3)}
  @media(min-width:640px){.modal{border-radius:12px}}
  .m-img{aspect-ratio:16/10;background:var(--white);position:relative;overflow:hidden}
  .m-img img{width:100%;height:100%;object-fit:cover}
  .m-close{position:absolute;top:12px;right:12px;background:rgba(255,255,255,.92);border:none;border-radius:50%;width:34px;height:34px;display:flex;align-items:center;justify-content:center;color:var(--ink);font-size:15px}
  .m-pad{padding:22px}
  .m-pad h3{font-size:25px;line-height:1.15;margin-bottom:4px}
  .m-sub{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px}
  .m-price{font-family:"Instrument Serif",serif;font-size:21px;margin:2px 0 6px}
  .m-desc{font-size:13.5px;line-height:1.6;color:var(--olive);margin:10px 0}
  .m-note{background:var(--white);border:1px solid var(--line);border-left:3px solid var(--gold);border-radius:6px;padding:10px 12px;font-size:13px;color:var(--olive);font-style:italic;margin:12px 0}
  .m-actions{display:flex;gap:10px;margin-top:14px}
  .m-actions .cta{padding:13px 0;font-size:14px;border-radius:999px}
  .field{margin-top:12px}
  .field label{display:block;font-family:"Instrument Serif",serif;font-size:14px;margin-bottom:5px}
  .field input,.field textarea{width:100%;border:1px solid var(--ink);background:var(--white);border-radius:6px;padding:10px 12px;font-size:14px;font-family:"Open Sans";outline:none}
  .field textarea{resize:vertical;min-height:64px}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .check{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--olive);margin-top:12px;cursor:pointer}
  .mbtn{width:100%;border:none;border-radius:999px;padding:13px 0;font-size:14px;font-weight:600;margin-top:10px}
  .mbtn.primary{background:var(--olive);color:#fff}
  .mbtn.ghost{background:transparent;border:1px solid var(--ink);color:var(--ink)}
  .pay-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:10px}
  .pay-opt{display:flex;flex-direction:column;align-items:center;gap:3px;border:1px solid var(--border);border-radius:8px;padding:10px 4px;font-size:11px;font-weight:600;text-decoration:none;color:var(--olive);background:var(--white)}
  .hint{font-size:11.5px;color:var(--muted);text-align:center;margin-top:10px;line-height:1.5}
  .spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:-2px}
  @keyframes spin{to{transform:rotate(360deg)}}

  .banner{position:fixed;top:0;left:0;right:0;z-index:95;text-align:center;padding:13px 18px;font-size:14px;font-weight:600;color:#fff;transform:translateY(-100%);transition:transform .35s}
  .banner.show{transform:none}
  .banner.success{background:var(--olive)}
  .banner.info{background:var(--muted)}
  .gate{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:linear-gradient(150deg,#A9BDC4,#4B5244)}
  .gate-card{background:var(--cream);border-radius:14px;padding:34px 28px;max-width:380px;width:100%;text-align:center}
  .gate-card h2{font-size:26px;margin-bottom:6px}
  .gate-card p{font-size:13px;color:var(--muted);margin-bottom:18px}
  .footer{text-align:center;padding:46px 20px;color:rgba(75,82,68,.8);font-size:12px;background:var(--sage)}
  .footer .serif{font-size:18px;color:var(--olive)}
  .center-load{min-height:70vh;display:flex;align-items:center;justify-content:center;background:var(--sage)}
  .center-load .spinner{width:30px;height:30px;border-color:rgba(255,255,255,.4);border-top-color:#fff}

  /* Outside / external registry links */
  .ext-wrap{background:var(--cream);padding:34px 20px 40px}
  .ext-head{text-align:center;margin-bottom:20px}
  .ext-head p{font-size:13.5px;color:var(--muted);margin-top:8px;max-width:560px;margin-left:auto;margin-right:auto;line-height:1.6}
  .ext-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px;max-width:720px;margin:0 auto}
  .ext-card{display:flex;align-items:center;justify-content:space-between;gap:12px;background:var(--white);border:1px solid var(--line);border-radius:12px;padding:16px 18px;text-decoration:none;transition:box-shadow .15s,transform .15s}
  .ext-card:hover{box-shadow:0 8px 24px rgba(0,0,0,.08);transform:translateY(-1px)}
  .ext-label{font-size:18px;color:var(--ink)}
  .ext-go{display:inline-flex;align-items:center;gap:5px;font-size:12.5px;font-weight:600;color:var(--olive);white-space:nowrap}

/* ── Preview mode: rearrange ─────────────────────────────── */
.pv-tag{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
        background:rgba(255,255,255,.18);padding:3px 8px;border-radius:999px;flex-shrink:0;}
        border-radius:999px;padding:7px 14px;font-size:12.5px;font-weight:600;cursor:pointer;flex-shrink:0;}

.card.draggable{cursor:grab;position:relative;}
.card.draggable:active{cursor:grabbing;}
.card.draggable .card-click{cursor:grab;}
.card.dragging{opacity:.45;transform:scale(.97);}
.card.drop-target{outline:2px dashed #C9A36A;outline-offset:3px;}

.pv-toast{position:fixed;left:50%;bottom:24px;transform:translate(-50%,20px);opacity:0;pointer-events:none;
          background:#121212;color:#fff;font-size:13px;padding:10px 18px;border-radius:999px;z-index:200;
          transition:opacity .2s ease,transform .2s ease;}
.pv-toast.show{opacity:1;transform:translate(-50%,0);}
.pv-toast.bad{background:#C23331;}

/* ── Editable hero (preview) ─────────────────────────────── */
.hero .hero-note{font-size:13px;line-height:1.65;color:rgba(255,255,255,.92);max-width:340px;margin:10px 0 0;}
.hero .couple-sig{margin-top:14px;font-size:15px;font-style:italic;color:rgba(255,255,255,.95);}
.hero.editable .ed{outline:1px dashed rgba(255,255,255,.5);outline-offset:4px;border-radius:3px;cursor:text;}
.hero.editable .ed:hover,.hero.editable .ed:focus{outline-color:#C9A36A;background:rgba(0,0,0,.12);}
.cover-edit{position:absolute;top:14px;left:14px;z-index:4;display:inline-flex;align-items:center;gap:6px;
  background:rgba(255,255,255,.94);color:#4B5244;border-radius:999px;padding:7px 13px;font-size:12px;
  font-weight:600;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.2);}
.cover-edit input{display:none;}

/* ── Card: heart, centre drag handle, couple note ─────────── */
.card{position:relative;}
.heart{position:absolute;top:9px;right:9px;z-index:3;width:26px;height:26px;border-radius:50%;
  background:rgba(255,255,255,.95);display:flex;align-items:center;justify-content:center;
  box-shadow:0 1px 4px rgba(0,0,0,.14);}
.heart.tap{cursor:pointer;}
.heart.tap:hover{transform:scale(1.08);}
.cnote{margin-top:8px;font-size:11.5px;line-height:1.5;color:#4B5244;font-style:italic;
  background:#F4F1EC;border-radius:6px;padding:7px 9px;text-align:left;}
.cnote .q{font-family:"Instrument Serif",serif;font-size:15px;margin-right:2px;}
.cta-row.col{flex-direction:column;gap:7px;align-items:stretch;}
.ipurch{display:flex;align-items:center;justify-content:center;gap:6px;font-size:11px;color:#8C7D6E;cursor:pointer;}
.ipurch input{accent-color:#4B5244;cursor:pointer;}

.card.draggable{cursor:grab;}
.card.draggable:active{cursor:grabbing;}
.card.dragging{opacity:.45;transform:scale(.97);}
.card.drop-target{outline:2px dashed #C9A36A;outline-offset:3px;}

/* ── Flow modals (How it works / Did you purchase / Form) ── */
.modal-wrap{position:fixed;inset:0;z-index:150;background:rgba(18,18,18,.5);display:none;
  align-items:center;justify-content:center;padding:16px;}
.modal-wrap.show{display:flex;}
.modal-card{position:relative;width:100%;max-width:380px;background:#F9F7F5;border-radius:6px;
  padding:26px 22px 0;max-height:90vh;overflow-y:auto;box-shadow:0 24px 60px rgba(0,0,0,.3);}
.m-x{position:absolute;top:12px;right:12px;background:transparent;border:none;cursor:pointer;color:#8C7D6E;}
.m-title{text-align:center;font-size:22px;font-weight:400;margin:0 0 14px;}
.m-body{text-align:center;font-size:12.5px;line-height:1.75;color:#4B5244;margin:0 0 12px;}
.m-img{display:block;width:96px;height:96px;object-fit:contain;margin:6px auto 10px;}
.m-prod{text-align:center;margin-bottom:14px;}
.m-brand{font-size:9px;text-transform:uppercase;letter-spacing:.06em;color:#8C7D6E;}
.m-name{font-size:13px;color:#121212;margin-top:2px;}
.m-price{font-family:"Instrument Serif",serif;font-size:15px;margin-top:2px;}
.m-actions{display:flex;justify-content:center;gap:8px;margin-bottom:18px;}
.m-actions.col{flex-direction:column;align-items:center;}
.m-cta{border-radius:999px;font-size:12px;font-weight:600;height:34px;padding:0 22px;cursor:pointer;
  border:none;display:inline-flex;align-items:center;justify-content:center;min-width:190px;}
.m-cta.solid{background:#A9BDC4;color:#fff;}
.m-cta.ghost{background:#fff;color:#4B5244;border:1px solid #EDE8E3;}
.m-cta.dark{background:#4B5244;color:#fff;width:100%;margin-top:6px;}
.m-cta:hover{opacity:.92;}
.m-form{padding-bottom:22px;}
.m-form label{display:block;font-size:10.5px;color:#4B5244;margin:10px 0 4px;}
.m-form input,.m-form textarea{width:100%;border:1px solid #EDE8E3;border-radius:3px;background:#fff;
  padding:8px 10px;font-size:12.5px;font-family:inherit;color:#121212;outline:none;}
.m-form input:focus,.m-form textarea:focus{border-color:#A9BDC4;}
.frow{display:flex;gap:10px;}
.frow>div{flex:1;}

/* Shipping-address callout */
.ship{background:#A9BDC4;color:#fff;text-align:center;padding:14px 16px;margin:0 -22px;}
.ship-head{font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:8px;}
.ship-copy{background:transparent;border:none;color:#fff;cursor:pointer;opacity:.85;}
.ship-copy:hover{opacity:1;}
.ship-line{font-size:11.5px;margin-top:4px;opacity:.95;}

/* ── Split hero: photo left, teal panel right (mirrors the dashboard) ── */
.rhero{display:grid;grid-template-columns:1fr;}
@media(min-width:768px){ .rhero{grid-template-columns:52% 48%;} }
.rhero-img{position:relative;background:#E5E0D9;aspect-ratio:8/3;overflow:hidden;}
.rhero-img img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
.rhero-panel{position:relative;background:#A9BDC4;color:#fff;display:flex;flex-direction:column;
  align-items:center;justify-content:center;text-align:center;padding:18px 28px 22px;min-width:0;}
.rh-title{font-size:clamp(20px,2.4vw,26px);font-weight:400;margin:0;line-height:1.15;color:#fff;}
.rh-title em,.rh-title i{font-style:italic;}
.rh-note{font-size:12px;line-height:1.65;margin:9px 0 0;max-width:320px;color:rgba(255,255,255,.94);}
.rh-note em,.rh-note i{font-family:"Instrument Serif",serif;font-style:italic;font-size:1.08em;}
.rh-note p{margin:0 0 .55em;} .rh-note p:last-child{margin-bottom:0;}
.rh-sig{margin-top:9px;font-size:13.5px;font-style:italic;color:#fff;}
.rh-date{margin-top:4px;font-size:11px;letter-spacing:.06em;color:rgba(255,255,255,.85);}
.rh-note.ed:empty:before{content:attr(data-ph);opacity:.6;}
.rhero .ed{cursor:text;border-radius:3px;}
.rhero .ed:focus{outline:1px solid rgba(255,255,255,.7);outline-offset:4px;}
.rh-edit{position:absolute;bottom:14px;right:14px;z-index:5;width:34px;height:34px;border-radius:50%;
  background:rgba(255,255,255,.95);color:#4B5244;border:none;display:flex;align-items:center;
  justify-content:center;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.2);}
.rh-edit:hover{background:#fff;}
.rh-edit input{display:none;}

/* ── Quick filters ── */
.qf{background:#F9F7F5;border-bottom:1px solid var(--border);}
.qf .wrap{max-width:1100px;margin:0 auto;padding:14px 16px 12px;}
.qf-row{display:flex;flex-wrap:wrap;align-items:center;gap:7px;margin-bottom:7px;}
.qf-row:last-child{margin-bottom:0;}
.chip{border:1px solid var(--border);background:#fff;color:var(--ink);border-radius:999px;
  padding:6px 13px;font-size:12px;cursor:pointer;white-space:nowrap;font-family:"Open Sans";}
.chip:hover{border-color:#A9BDC4;}
.chip.on{background:#4B5244;border-color:#4B5244;color:#fff;font-weight:600;}
.chip.clear{border-style:dashed;color:var(--muted);}
.qf-count{margin-left:auto;font-size:11.5px;color:var(--muted);white-space:nowrap;}

/* ── Drag handle: dead centre of the card ── */
.drag-handle{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:4;
  width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.95);color:#4B5244;
  display:flex;align-items:center;justify-content:center;box-shadow:0 2px 12px rgba(0,0,0,.25);
  pointer-events:none;}

/* ── Filter / sort row: dropdowns on a single line ── */
.qf{background:#F9F7F5;border-bottom:1px solid var(--border);}
.qf .wrap{max-width:1100px;margin:0 auto;padding:12px 16px;}
.qf-line{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.fsel{display:inline-flex;align-items:center;gap:6px;background:#fff;border:1px solid var(--border);
  border-radius:999px;padding:5px 6px 5px 12px;}
.fsel-lbl{font-size:10.5px;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);white-space:nowrap;}
.fsel select{border:none;outline:none;background:transparent;font-family:"Open Sans";font-size:12.5px;
  color:var(--ink);cursor:pointer;padding:2px 4px;max-width:170px;}
.qf-count{margin-left:auto;font-size:11.5px;color:var(--muted);white-space:nowrap;}
@media(max-width:640px){ .fsel select{max-width:120px;} .qf-count{margin-left:0;width:100%;} }
</style>
</head>
<body>
  <div id="banner" class="banner"></div>
  <div id="app"><div class="center-load"><span class="spinner"></span></div></div>

  <!-- Filter drawer -->
  <div id="scrim" class="scrim" onclick="closeDrawer()"></div>
  <aside id="drawer" class="drawer" aria-label="Filters">
    <div class="drawer-pad">
      <div class="drawer-top"><h3 class="serif">All Filters</h3>
        <button class="x" onclick="closeDrawer()" aria-label="Close">✕</button></div>
      <div id="drawer-body"></div>
    </div>
  </aside>

  <!-- Modals -->
  <div id="detail-scrim" class="m-scrim" onclick="if(event.target===this)closeModal('detail')"><div class="modal" id="detail-modal"></div></div>
  <div id="fund-scrim"   class="m-scrim" onclick="if(event.target===this)closeModal('fund')"><div class="modal" id="fund-modal"></div></div>
  <div id="exp-scrim"    class="m-scrim" onclick="if(event.target===this)closeModal('exp')"><div class="modal" id="exp-modal"></div></div>
  <div id="off-scrim"    class="m-scrim" onclick="if(event.target===this)closeModal('off')"><div class="modal" id="off-modal" style="max-width:440px"></div></div>

<script>
const RENDER_API = "https://wedding-recommender.onrender.com";
const CASH_FUND_TYPE = "343960eb-ce49-45d6-89b5-0bbe43d877f6";
const HERO_PLACEHOLDER = "https://assets.softr-files.com/applications/98da9671-14f5-418f-b98a-6f8fb833401f/assets/5ff0fe31-c2c9-4ceb-b9b6-1c680c454e8a.png";
const CASHFUND_BG   = HERO_PLACEHOLDER;
const EXPERIENCE_BG = "https://assets.softr-files.com/applications/98da9671-14f5-418f-b98a-6f8fb833401f/assets/992d7bc1-66f9-4941-894c-491a321f8c2c.jpeg";

const GROUPS = [
  { key:"physical", label:"Physical Gifts",       kind:"gift" },
  { key:"funds",    label:"Cash Funds",            kind:"fund" },
  { key:"exp",      label:"Honeymoon Experiences", kind:"experience" },
];

const PRICE_BUCKETS = [
  {id:"under50", label:"Under $50",  test:c=>c<5000},
  {id:"50-100",  label:"$50–$100",   test:c=>c>=5000&&c<10000},
  {id:"100-250", label:"$100–$250",  test:c=>c>=10000&&c<25000},
  {id:"250-500", label:"$250–$500",  test:c=>c>=25000&&c<50000},
  {id:"over500", label:"$500+",      test:c=>c>=50000},
];
const SORT_OPTIONS = [
  {value:"custom",     label:"Couple's order"},
  {value:"featured",   label:"Featured"},
  {value:"price_asc",  label:"Price (Low to High)"},
  {value:"price_desc", label:"Price (High to Low)"},
  {value:"name_asc",   label:"Name (A to Z)"},
];

const state = {
  registryId:null, slug:null, preview:false, password:null, reorder:false, howItem:null, pendingAsk:null,
  data:null, things:[],
  filters:{ search:"", cats:new Set(), price:new Set(), status:"all", sort:"featured" },
  open:new Set(),            // collapsed by default — nothing open
  sortOpen:false,
  activeItem:null, activeExp:null,
};

const fmt = c=>new Intl.NumberFormat("en-US",{style:"currency",currency:"USD",maximumFractionDigits:0}).format((Number(c)||0)/100);
const esc = s=>String(s==null?"":s).replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]));
const el  = id=>document.getElementById(id);
const isFund = it=> it.item_type_id===CASH_FUND_TYPE || (Number(it.price_cents)===0 && Number(it.goal_amount_cents)>0);

/* ─── Boot ─────────────────────────────────────────── */
(function init(){
  const params = new URLSearchParams(location.search);
  const m = location.pathname.match(/\/([^\/]+)\/registry\/?$/);
  if (m && m[1] && m[1]!=="preview") state.slug = decodeURIComponent(m[1]);
  state.registryId = params.get("id");
  state.preview = params.get("preview")==="1" || params.get("preview")==="true";
  const c = params.get("contribution");
  if (c==="success"){ showBanner("Thank you so much! Your gift has been received. 💌","success"); cleanParam("contribution"); }
  else if (c==="cancel"){ showBanner("No worries — your checkout was cancelled.","info"); cleanParam("contribution"); }
  load();
})();
function cleanParam(k){ const u=new URL(location.href); u.searchParams.delete(k); history.replaceState({},"",u); }
function showBanner(msg,kind){ const b=el("banner"); b.textContent=msg; b.className="banner "+kind+" show"; setTimeout(()=>b.classList.remove("show"),5200); }

async function load(){
  try{
    let url = state.slug
      ? RENDER_API+"/public/registry/by-slug/"+encodeURIComponent(state.slug)
      : RENDER_API+"/public/registry/"+encodeURIComponent(state.registryId||"");
    const qp=[];
    if(state.preview) qp.push("preview=1");
    if(state.password) qp.push("password="+encodeURIComponent(state.password));
    if(qp.length) url += "?"+qp.join("&");
    const res = await fetch(url);
    const data = await res.json();
    if(data.error==="not_published") return renderNotice("This registry isn't published yet.","Check back soon — the couple is still putting it together.");
    if(data.password_required) return renderGate(data.title||"Our Registry", data.password_invalid);
    state.data = data;
    if(!state.registryId && data.registry) state.registryId = data.registry.id;
    buildThings();
    render();
  }catch(e){ renderNotice("We couldn't load this registry.","Please refresh the page or try again in a moment."); }
}

function buildThings(){
  const things=[];
  (state.data.items||[]).forEach(it=>{
    const fund=isFund(it);
    things.push({
      kind: fund?"fund":"gift", raw:it, id:it.id, title:it.title,
      image: it.image_url || (fund?CASHFUND_BG:""),
      amount: fund?(Number(it.goal_amount_cents)||0):(Number(it.price_cents)||0),
      fcat: fund?"":(it.category||""),
      mostWanted:!!it.is_most_wanted, group:!!it.is_group_gift,
      sort: it.sort_order==null?9999:it.sort_order,
    });
  });
  (state.data.experiences||[]).forEach(e=>{
    things.push({
      kind:"experience", raw:e, id:e.id, title:e.title,
      image: e.image_url||EXPERIENCE_BG,
      amount: Number(e.cost_cents)||0, received:Number(e.amount_received_cents)||0,
      location:e.location||"", fcat:"",
      mostWanted:false, group:false, sort:e.sort_order==null?9999:e.sort_order,
    });
  });
  state.things=things;
}

function categoriesAvailable(){
  const s=new Set();
  state.things.forEach(t=>{ if(t.kind==="gift"&&t.fcat) s.add(t.fcat); });
  return Array.from(s).sort();
}

/* ─── Quick filters ──────────────────────────────────────────
   Chips instead of a search box + filter drawer: category · price · status. */
function quickFiltersHtml(count){
  const f = state.filters;
  const cats = [...new Set(state.things.map(t=>t.fcat).filter(Boolean))].sort();

  const sel = (id, label, value, opts, onchange) =>
      '<label class="fsel">'
    +   '<span class="fsel-lbl">'+label+'</span>'
    +   '<select id="'+id+'" onchange="'+onchange+'">'
    +     opts.map(o=>'<option value="'+esc(o[0])+'"'+(String(o[0])===String(value)?' selected':'')+'>'+esc(o[1])+'</option>').join("")
    +   '</select>'
    + '</label>';

  const catOpts   = [["", "All categories"]].concat(cats.map(c=>[c, c]));
  const priceOpts = [["", "Any price"]].concat(PRICE_BUCKETS.map(b=>[b.id, b.label]));
  const statOpts  = [["all","All gifts"],["pending","Still needed"],["purchased","Purchased"]];
  const sortOpts  = SORT_OPTIONS.map(o=>[o.value, o.label]);

  const active = f.cats.size + f.price.size + (f.status!=="all"?1:0);

  return '<div class="qf"><div class="wrap"><div class="qf-line">'
    + sel("f-cat",   "Category", [...f.cats][0]  || "", catOpts,   "pickCat(this.value)")
    + sel("f-price", "Price",    [...f.price][0] || "", priceOpts, "pickPrice(this.value)")
    + sel("f-stat",  "Status",   f.status,             statOpts,  "setStatus(this.value)")
    + sel("f-sort",  "Sort",     f.sort, sortOpts, "setSort(this.value)")
    + (active ? '<button class="chip clear" onclick="clearAllFilters()">Clear</button>' : '')
    + '<span class="qf-count">'+count+' '+(count===1?"gift":"gifts")+(state.preview?" · preview":"")+'</span>'
    + '</div></div></div>';
}

/* Single-select helpers (the dropdowns replace multi-select chips). */
function pickCat(v){ state.filters.cats.clear(); if(v) state.filters.cats.add(v); render(); }
function pickPrice(v){ state.filters.price.clear(); if(v) state.filters.price.add(v); render(); }
function setStatus(s){ state.filters.status=s; render(); }
function clearAllFilters(){
  state.filters.cats.clear(); state.filters.price.clear();
  state.filters.status="all"; state.filters.search=""; render();
}
function isPurchased(t){
  if(t.kind!=="gift") return false;
  const req = (t.raw && t.raw.quantity_requested) || 1;
  const ful = (t.raw && t.raw.quantity_fulfilled) || 0;
  return req > 0 && ful >= req;
}

function passesFilters(t){
  const f=state.filters, q=f.search.trim().toLowerCase();
  if(f.cats.size && !f.cats.has(t.fcat)) return false;
  if(f.price.size){
    const ok=[...f.price].some(id=>{ const b=PRICE_BUCKETS.find(x=>x.id===id); return b&&b.test(t.amount); });
    if(!ok) return false;
  }
  if(q && !((t.title+" "+(t.location||"")+" "+(t.fcat||"")).toLowerCase().includes(q))) return false;
  const st = state.filters.status || "all";
  if(st==="purchased" && !isPurchased(t)) return false;
  if(st==="pending"   &&  isPurchased(t)) return false;
  return true;
}

function sortList(list){
  const s=state.filters.sort;
  const a=[...list];
  // "custom" = exactly the order the couple dragged into (no most-wanted bump),
  // so what they arrange in preview is what guests see.
  if(s==="custom") { a.sort((x,y)=>x.sort-y.sort); return a; }
  if(s==="price_asc")  a.sort((x,y)=>x.amount-y.amount);
  else if(s==="price_desc") a.sort((x,y)=>y.amount-x.amount);
  else if(s==="name_asc")   a.sort((x,y)=>x.title.localeCompare(y.title));
  else a.sort((x,y)=>((y.mostWanted?1:0)-(x.mostWanted?1:0)) || (x.sort-y.sort));
  return a;
}

/* ─── Render ────────────────────────────────────────── */
function render(){
  const r=state.data.registry||{}, couple=state.data.couple||{};
  const name = couple.name || r.title || "Our Registry";
  const dateStr = couple.date ? new Date(couple.date).toLocaleDateString("en-US",{month:"long",day:"numeric",year:"numeric",timeZone:"UTC"}) : "";
  const hero = r.hero_image_url || HERO_PLACEHOLDER;

  const matched = state.things.filter(passesFilters);
  const total = matched.length;
  const activeCount = state.filters.cats.size + state.filters.price.size;

  const groupsHtml = GROUPS.map(g=>{
    const list = sortList(matched.filter(t=>t.kind===g.kind));
    if(!list.length) return "";
    const open = state.open.has(g.key);
    return '<section class="acc '+(open?"open":"")+'" id="acc-'+g.key+'">'
      + '<button class="acc-head" onclick="toggleAcc(\''+g.key+'\')">'
      +   '<span class="serif">'+g.label+'</span><span class="n">'+list.length+'</span>'
      +   '<svg class="chev" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m6 9 6 6 6-6"/></svg>'
      + '</button>'
      + '<div class="acc-body"><div class="acc-inner"><div class="grid">'+list.map(renderCard).join("")+'</div></div></div>'
      + '</section>';
  }).join("");

  el("app").innerHTML =
      '<header class="rhero">'
    +   '<div class="rhero-img">'
    +     '<img src="'+esc(hero)+'" alt="" onerror="this.src=\''+HERO_PLACEHOLDER+'\'">'
    +     (state.preview
            ? '<label class="rh-edit" title="Change cover photo">'
              + pencilSvg()
              + '<input type="file" accept="image/*" onchange="uploadCover(event)">'
              + '</label>'
            : '')
    +   '</div>'
    +   '<div class="rhero-panel">'
    +     '<h1 class="serif rh-title'+(state.preview?' ed':'')+'"'
    +       (state.preview?' contenteditable="true" data-field="title" onblur="savePresentation(this)"':'')
    +       '>'+(r.title || esc(name))+'</h1>'
    +     '<div class="rh-note'+(state.preview?' ed':'')+'"'
    +       (state.preview?' contenteditable="true" data-field="welcome_note" onblur="savePresentation(this)" data-ph="Add a welcome note for your guests…"':'')
    +       '>'+(r.welcome_note || '')+'</div>'
    +     (couple.name?'<div class="rh-sig serif">'+esc(couple.name)+'</div>':'')
    +     (dateStr?'<div class="rh-date">'+esc(dateStr)+'</div>':'')
    +     (state.preview?'<button class="rh-edit panel" title="Edit text" onclick="focusTitle()">'+pencilSvg()+'</button>':'')
    +   '</div>'
    + '</header>'

    + quickFiltersHtml(matched.length)

    + '<div class="content"><div class="wrap">'
    +   (groupsHtml || '<div class="empty"><div class="ring"><svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.6"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg></div><h3 class="serif" style="font-size:22px;color:#fff;margin-bottom:6px">No gifts match your filters</h3><p style="color:rgba(255,255,255,.85);font-size:13px;margin-bottom:16px">Try broadening your search or clearing some filters.</p>'+(activeCount||state.filters.search?'<button class="btn btn-primary" style="width:auto;padding:9px 22px" onclick="clearFilters()">Clear filters</button>':"")+'</div>')
    + '</div></div>'

    + renderExternalLinks()

    + '<footer class="footer"><div class="serif">'+esc(name)+'</div><div style="margin-top:6px">With love and gratitude · powered by MyPlanning</div></footer>';

  renderDrawer();
}

function renderExternalLinks(){
  const links = (state.data && state.data.external_links) || [];
  if(!links.length) return "";
  const cards = links.map(function(l){
    const url = esc(l.url || "");
    if(!url) return "";
    const label = esc(l.display_label || l.retailer_other_name || l.retailer || "Registry");
    return '<a class="ext-card" href="'+url+'" target="_blank" rel="noopener noreferrer">'
      + '<span class="ext-label serif">'+label+'</span>'
      + '<span class="ext-go">Visit registry'
      +   '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 17 17 7M7 7h10v10"/></svg>'
      + '</span>'
      + '</a>';
  }).join("");
  if(!cards) return "";
  return '<section class="ext-wrap"><div class="wrap">'
    + '<div class="ext-head"><div class="eyebrow">Also Registered At</div>'
    +   '<p>We are also registered at the stores below \u2014 tap through to shop those gifts there.</p></div>'
    + '<div class="ext-grid">'+cards+'</div>'
    + '</div></section>';
}

function renderPills(){
  const f=state.filters, pills=[];
  f.cats.forEach(c=>pills.push(["cat:"+c,c]));
  f.price.forEach(id=>{ const b=PRICE_BUCKETS.find(x=>x.id===id); pills.push(["price:"+id,b?b.label:id]); });
  if(f.search.trim()) pills.push(["q",'"'+f.search.trim()+'"']);
  if(!pills.length) return "";
  return '<div class="pills">'+pills.map(p=>'<button class="pill" onclick="removePill(\''+p[0].replace(/'/g,"\\'")+'\')">'+esc(p[1])+'<span style="line-height:0">✕</span></button>').join("")+'</div>';
}
function renderSortMenu(){
  return '<div class="sortmenu" onclick="event.stopPropagation()">'+SORT_OPTIONS.map(o=>
    '<button onclick="setSort(\''+o.value+'\')">'+(state.filters.sort===o.value
      ? '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#4B5244" stroke-width="2.5"><path d="M20 6 9 17l-5-5"/></svg>'
      : '<span style="width:15px;display:inline-block"></span>')+'<span style="color:'+(state.filters.sort===o.value?"#4B5244":"#121212")+';font-weight:'+(state.filters.sort===o.value?600:400)+'">'+o.label+'</span></button>').join("")+'</div>';
}

/* A cash fund hides its amount when the couple turned the goal off, or when
   it's an "any amount" fund (goal 0). */
function hidesAmount(t){
  return t.kind==="fund" && !(t.raw && t.raw.show_goal && t.amount > 0);
}

function renderCard(t){
  const phSvg='<svg class="ph" width="38" height="38" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="m3 16 5-5 4 4 3-3 6 6"/></svg>';
  const img = t.image
    ? '<img src="'+esc(t.image)+'" alt="'+esc(t.title)+'" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'block\'">'+phSvg.replace('class="ph"','class="ph" style="display:none"')
    : phSvg;

  let badges="";
  if(t.mostWanted) badges+='<span class="badge want">Most wanted</span>';
  if(t.kind==="experience") badges+='<span class="badge exp">Experience</span>';
  else if(t.kind==="fund") badges+='<span class="badge group">Cash fund</span>';
  else if(t.group) badges+='<span class="badge group">Group gift</span>';

  let sub="", prog="";
  if(t.kind==="experience"){
    sub = t.location ? esc(t.location) : "Honeymoon experience";
    if(t.amount>0){ const pct=Math.min(100,Math.round((t.received/t.amount)*100)); prog='<div class="progress"><i style="width:'+pct+'%"></i></div>'; sub+=' · '+fmt(t.received)+' of '+fmt(t.amount); }
  } else if(t.kind==="fund"){
    // The couple can hide the target ("Show Goal to Guests?" = off), and a goal
    // of 0 means "any amount" — either way we don't show a number.
    const showGoal = t.raw && t.raw.show_goal && t.amount > 0;
    sub = showGoal ? ("Goal "+fmt(t.amount)) : "Any amount welcome";
  }
  else { const q=t.raw.quantity_requested||1; sub = q>1?(q+" requested"):"&nbsp;"; }

  // CTAs by kind
  let cta="";
  if(t.kind==="gift"){
    cta = '<div class="cta-row col">'
        + '<button class="cta solid" onclick="event.stopPropagation();openHow(\''+t.id+'\')">Purchase &rarr;</button>'
        + '<label class="ipurch" onclick="event.stopPropagation()">'
        +   '<input type="checkbox" onchange="openOffline(\''+t.id+'\')"> I Purchased This Item'
        + '</label>'
        + '</div>';
  } else if(t.kind==="fund"){
    cta = '<div class="cta-row"><button class="cta solid" onclick="event.stopPropagation();openFund(\''+t.id+'\')">Contribute</button></div>';
  } else {
    cta = '<div class="cta-row"><button class="cta solid" onclick="event.stopPropagation();openExp(\''+t.id+'\')">Contribute</button></div>';
  }

  const openFn = t.kind==="experience" ? "openExp" : (t.kind==="fund" ? "openFund" : "openDetail");

  // Preview mode: the couple can drag gifts/funds to reorder them. Experiences
  // live in a separate table that bulk-sort doesn't cover, so they stay fixed.
  const canDrag = state.preview && t.kind!=="experience";
  const dragAttrs = canDrag

    : '';

  // Most-wanted heart (top-right). In preview it's a toggle; for guests it's
  // just an indicator of what the couple wants most.
  const heartFill = t.mostWanted ? '#A9BDC4' : 'none';
  const heartCls  = 'heart' + (t.mostWanted ? ' on' : '') + (state.preview && t.kind!=="experience" ? ' tap' : '');

  const heart = (t.kind!=="experience")
    ? '<div class="'+heartCls+'"'+heartClick+' title="'+(t.mostWanted?'Most wanted':'Mark as most wanted')+'">'
      + '<svg width="17" height="17" viewBox="0 0 24 24" fill="'+heartFill+'" stroke="#A9BDC4" stroke-width="1.8">'
      + '<path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.7l-1-1.1a5.5 5.5 0 0 0-7.8 7.8l1.1 1L12 21l7.7-7.6 1.1-1a5.5 5.5 0 0 0 0-7.8z"/>'
      + '</svg></div>'
    : '';

  // The couple's note, wherever they've written one.
  const note = t.raw && t.raw.couple_note
    ? '<div class="cnote"><span class="q">&ldquo;</span>'+esc(t.raw.couple_note)+'</div>' : '';

  return '<div class="card'+(canDrag?' draggable':'')+'"'+dragAttrs+'>'
    + heart
    + handle
    + '<div class="card-click" onclick="'+openFn+'(\''+t.id+'\')">'
    +   '<div class="imgwrap">'+img+'<div class="badges">'+badges+'</div></div>'
    +   '<div class="body"><div class="ttl">'+esc(t.title)+'</div>'+(hidesAmount(t)?'':'<div class="price">'+fmt(t.amount)+'</div>')+'<div class="sub">'+sub+'</div>'+note+'</div>'
    +   prog
    + '</div>'
    + cta
    + '</div>';
}

function toggleWanted(id){

   .catch(()=>{ t.mostWanted = before; render(); toastPreview("Couldn't save that", true); });

/* ─── Preview: drag to reorder ───────────────────────────────
   Only available when the couple opens their own registry with ?preview=1.
   Order is persisted with POST /registry/items/bulk-sort (gifts + cash funds;
   both are registry items). Optimistic: the grid re-renders immediately and we
   reconcile — or roll back — once the write returns. */
let dragSrcId = null;

function dragStart(e){
  const card = e.currentTarget;
  dragSrcId = card.getAttribute("data-id");
  card.classList.add("dragging");
  try { e.dataTransfer.effectAllowed = "move"; e.dataTransfer.setData("text/plain", dragSrcId); } catch(_){}
}
function dragOver(e){
  e.preventDefault();
  try { e.dataTransfer.dropEffect = "move"; } catch(_){}
  const card = e.currentTarget;
  if(card.getAttribute("data-id") !== dragSrcId) card.classList.add("drop-target");
}
function dragEnd(e){
  e.currentTarget.classList.remove("dragging");
  document.querySelectorAll(".drop-target").forEach(n=>n.classList.remove("drop-target"));
}
function dragDrop(e){
  e.preventDefault();
  const target = e.currentTarget;
  document.querySelectorAll(".drop-target").forEach(n=>n.classList.remove("drop-target"));
  const targetId = target.getAttribute("data-id");
  if(!dragSrcId || !targetId || dragSrcId===targetId) return;
  reorder(dragSrcId, targetId);
}

function reorder(srcId, targetId){
  const src = state.things.find(t=>t.id===srcId);
  const tgt = state.things.find(t=>t.id===targetId);
  if(!src || !tgt || src.kind==="experience" || tgt.kind==="experience") return;

  // Work within the dragged item's own group, in the order currently shown.
  const group = sortList(state.things.filter(t=>t.kind===src.kind && passesFilters(t)));
  const from = group.findIndex(t=>t.id===srcId);
  const to   = group.findIndex(t=>t.id===targetId);
  if(from<0 || to<0) return;

  const before = group.map(t=>({id:t.id, sort:t.sort}));   // for rollback
  group.splice(to, 0, group.splice(from,1)[0]);            // move
  group.forEach((t,i)=>{ t.sort = i; });                   // renumber 0..n-1

  // A manual order only makes sense under "custom" sort — switch to it so the
  // new order is what's actually displayed.
  state.filters.sort = "custom";
  render();

  const payload = group.map((t,i)=>({ id: t.id, sort_order: i }));
  fetch(RENDER_API+"/registry/items/bulk-sort", {
    method:"POST", headers:{"Content-Type":"application/json"},
    body: JSON.stringify({ items: payload })
  }).then(r=>{
    if(!r.ok) throw new Error("save failed");
    return r.json();
  }).then(res=>{
    const failed = (res.results||[]).filter(x=>!x.ok).length;
    if(failed) throw new Error("some items didn't save");
    toastPreview("Order saved");
  }).catch(()=>{
    before.forEach(b=>{ const t=state.things.find(x=>x.id===b.id); if(t) t.sort=b.sort; });
    render();
    toastPreview("Couldn't save the new order", true);
  });
}

  const min = it.min_contribution_cents || 2500;
  const name=(el("g-name")?el("g-name").value:"").trim();
  const email=(el("g-email")?el("g-email").value:"").trim();
  const note=(el("g-note")?el("g-note").value:"").trim();
  const anon=el("g-anon")?el("g-anon").checked:false;
  const dollars=parseFloat(el("g-amt")?el("g-amt").value:"0")||0;
  const amount_cents=Math.round(dollars*100);
  if(amount_cents<min){ alert("Minimum contribution is "+fmt(min)+"."); return; }
  if(!name){ alert("Please enter your name."); return; }
  if(!email){ alert("Please enter your email."); return; }
  const btn=el("g-submit"); btn.disabled=true; btn.innerHTML='<span class="spinner"></span> Redirecting to Stripe…';
  try{
    const ret=retUrl(), sep=ret.includes("?")?"&":"?";
    const res=await fetch(RENDER_API+"/public/registry/"+state.registryId+"/checkout",{
      method:"POST", headers:{"Content-Type":"application/json"},
      body:JSON.stringify({ item_id:it.id, guest_name:name, guest_email:email, amount_cents, quantity:1,
        gift_note:note||null, is_anonymous:anon, success_url:ret+sep+"contribution=success", cancel_url:ret+sep+"contribution=cancel" }),
    });
    if(!res.ok) throw new Error(await errText(res));
    const data=await res.json();
    if(data.session_url) location.href=data.session_url; else throw new Error("Checkout session URL missing");
  }catch(e){ alert("Couldn't start checkout: "+e.message); btn.disabled=false; btn.innerHTML="Contribute via Stripe →"; }
}

/* ─── Experience contribute ─────────────────────────── */
function openExp(id){
  const exp=(state.data.experiences||[]).find(x=>x.id===id); if(!exp) return;
  state.activeExp=exp;
  const r=state.data.registry||{};
  const stripeOk=r.has_stripe_connect && r.stripe_active;
  const img=exp.image_url||EXPERIENCE_BG;
  const cost=exp.cost_cents||0, min=exp.min_contribution_cents||2500;
  const received=exp.amount_received_cents||0, remaining=Math.max(0,cost-received);
  const pct = cost>0?Math.min(100,Math.round((received/cost)*100)):0;

  const form = stripeOk ?
      ((exp.allow_partial
        ? '<div class="field"><label>Your contribution ($)</label><input type="number" id="e-amt" min="'+(min/100)+'" step="1" value="'+Math.max(25,Math.round(min/100))+'"></div>'
        : '<div class="hint" style="text-align:left;margin:8px 0 0">This experience is gifted in full: <strong>'+fmt(cost)+'</strong>.</div>')
      + '<div class="row2"><div class="field"><label>Your name</label><input type="text" id="e-name"></div><div class="field"><label>Email</label><input type="email" id="e-email"></div></div>'
      + '<div class="field"><label>A note for the couple <span style="color:var(--muted);font-style:normal">(optional)</span></label><textarea id="e-note" placeholder="Enjoy every moment…"></textarea></div>'
      + '<div class="field"><label>Display name on their memory wall <span style="color:var(--muted);font-style:normal">(optional)</span></label><input type="text" id="e-display" placeholder="e.g. Aunt Mei & Family"></div>'
      + '<label class="check"><input type="checkbox" id="e-journal" checked> Add my note to the couple\'s travel journal</label>'
      + '<label class="check"><input type="checkbox" id="e-anon"> Keep my gift anonymous</label>'
      + '<button class="mbtn primary" id="e-submit" onclick="submitExp()">Contribute via Stripe →</button>'
      + '<div class="hint">Secure checkout via Stripe. Your gift funds a real moment on their trip.</div>')
    : '<div class="hint">The couple hasn\'t finished setting up experience gifting yet — please check back soon.</div>';

  el("exp-modal").innerHTML =
      '<div class="m-img">'+(img?'<img src="'+esc(img)+'" alt="" onerror="this.remove()">':"")+'<button class="m-close" onclick="closeModal(\'exp\')">✕</button></div>'
    + '<div class="m-pad"><div class="m-sub">Experience'+(exp.location?' · '+esc(exp.location):"")+'</div><h3 class="serif">'+esc(exp.title)+'</h3>'
    +   '<div class="m-price">'+fmt(cost)+'</div>'
    +   (cost>0?'<div class="progress" style="margin:6px 0 4px"><i style="width:'+pct+'%"></i></div><div class="sub" style="color:var(--olive);font-size:12px;margin-bottom:4px">'+fmt(received)+' funded · '+fmt(remaining)+' to go</div>':"")
    +   (exp.description?'<p class="m-desc">'+esc(exp.description)+'</p>':"")
    +   form
    + '</div>';
  openModal("exp");
}
async function submitExp(){
  const exp=state.activeExp; if(!exp) return;
  const name=(el("e-name")?el("e-name").value:"").trim();
  const email=(el("e-email")?el("e-email").value:"").trim();
  const note=(el("e-note")?el("e-note").value:"").trim();
  const display=(el("e-display")?el("e-display").value:"").trim();
  const journal=el("e-journal")?el("e-journal").checked:false;
  const anon=el("e-anon")?el("e-anon").checked:false;
  let amount_cents;
  if(exp.allow_partial){
    const d=parseFloat(el("e-amt")?el("e-amt").value:"0")||0; amount_cents=Math.round(d*100);
    const min=exp.min_contribution_cents||2500;
    if(amount_cents<min){ alert("Minimum contribution is "+fmt(min)+"."); return; }
  } else { amount_cents=exp.cost_cents||0; }
  if(!name){ alert("Please enter your name."); return; }
  if(!email){ alert("Please enter your email."); return; }
  const btn=el("e-submit"); btn.disabled=true; btn.innerHTML='<span class="spinner"></span> Redirecting to Stripe…';
  try{
    const ret=retUrl(), sep=ret.includes("?")?"&":"?";
    const res=await fetch(RENDER_API+"/public/registry/"+state.registryId+"/checkout",{
      method:"POST", headers:{"Content-Type":"application/json"},
      body:JSON.stringify({ experience_id:exp.id, guest_name:name, guest_email:email, amount_cents,
        gift_note:note||null, display_name:anon?null:(display||null), show_in_journal:journal, is_anonymous:anon,
        success_url:ret+sep+"contribution=success", cancel_url:ret+sep+"contribution=cancel" }),
    });
    if(!res.ok) throw new Error(await errText(res));
    const data=await res.json();
    if(data.session_url) location.href=data.session_url; else throw new Error("Checkout session URL missing");
  }catch(e){ alert("Couldn't start checkout: "+e.message); btn.disabled=false; btn.innerHTML="Contribute via Stripe →"; }
}

/* ─── Modal plumbing + helpers ──────────────────────── */
function openModal(k){ el(k+"-scrim").classList.add("open"); document.body.style.overflow="hidden"; }
function closeModal(k){ el(k+"-scrim").classList.remove("open"); document.body.style.overflow=""; }
function retUrl(){ return state.slug ? (location.origin+location.pathname) : (location.origin+location.pathname+"?id="+encodeURIComponent(state.registryId)); }
async function errText(res){ const t=await res.text(); try{ return JSON.parse(t).detail||t; }catch(e){ return t; } }

/* ─── Password gate & notices ───────────────────────── */
function renderGate(title, invalid){
  el("app").innerHTML =
      '<div class="gate"><div class="gate-card"><div class="eyebrow">Private registry</div>'
    + '<h2 class="serif" style="margin-top:6px">'+esc(title)+'</h2>'
    + '<p>This registry is password-protected. Please enter the password the couple shared with you.</p>'
    + '<div class="field"><input type="password" id="gate-pw" placeholder="Password" style="text-align:center"></div>'
    + (invalid?'<div style="color:#C23331;font-size:12px;margin-top:8px">That password didn\'t match — please try again.</div>':"")
    + '<button class="mbtn primary" onclick="submitGate()">Unlock registry</button></div></div>';
  setTimeout(()=>{ const g=el("gate-pw"); if(g){ g.focus(); g.addEventListener("keydown",e=>{ if(e.key==="Enter") submitGate(); }); } },50);
}
function submitGate(){ const g=el("gate-pw"); const v=g?g.value.trim():""; if(!v) return; state.password=v; el("app").innerHTML='<div class="center-load"><span class="spinner"></span></div>'; load(); }
function renderNotice(title,sub){ el("app").innerHTML='<div class="gate"><div class="gate-card"><h2 class="serif">'+esc(title)+'</h2><p style="margin-bottom:0">'+esc(sub)+'</p></div></div>'; }
</script>
</body>
