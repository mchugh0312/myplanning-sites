<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slow Dance</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{
  font-family:'Instrument Serif',Georgia,serif;
  background:#4a5240;
  color:#ffffff;
  /* Always vertically centred — even in thumbnail iframe */
  min-height:100%;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:2rem;
}
body.hydrating{visibility:hidden;}
/* In thumbnail mode: iframe is scaled to 50% and shows top portion.
   To appear centred IN the visible thumbnail area, push content down ~25% */
body.thumbnail-mode{
  justify-content:center;
  padding-top:20%;
}
.couple{
  font-size:clamp(1.6rem,4vw,2.4rem);
  font-style:italic;
  color:#ffffff;
  margin-bottom:0.5rem;
  line-height:1.2;
  opacity:0.7;
}
.divider{
  width:30px;height:1px;
  background:rgba(255,255,255,0.35);
  margin:0 auto 1.5rem;
}
.coming-soon{
  font-size:clamp(1.4rem,3.5vw,2rem);
  font-style:italic;
  color:#ffffff;
  margin-bottom:0.5rem;
}
.coming-desc{
  font-size:0.72rem;
  letter-spacing:0.12em;
  text-transform:uppercase;
  color:rgba(255,255,255,0.45);
}
</style>
</head>
<body class="hydrating">
  <div class="couple" id="coupleNames">A &amp; B</div>
  <div class="divider"></div>
  <div class="coming-soon">Coming Soon</div>
  <div class="coming-desc">This template is in development</div>
<script>
(function(){
  var p=new URLSearchParams(window.location.search);
  if(p.get('thumbnail')==='1')document.body.classList.add('thumbnail-mode');
})();
function _reveal(){document.body.classList.remove('hydrating');}
function hydrateTemplate(d){
  var names=d.couple_names||(d.partner_1&&d.partner_2?d.partner_1+' & '+d.partner_2:'A & B');
  var el=document.getElementById('coupleNames');
  if(el)el.textContent=names;
}
var _got=false;
_reveal();
window.addEventListener('message',function(e){
  if(e.data&&e.data.type==='HYDRATE_TEMPLATE'){
    _got=true;hydrateTemplate(e.data.payload);
  }
});
setTimeout(function(){if(!_got)hydrateTemplate({couple_names:'A & B'});},800);
</script>
</body>
</html>
