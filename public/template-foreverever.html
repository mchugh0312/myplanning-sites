<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forever &amp; Ever</title>
<style>
@font-face{font-family:'Parfumerie Script';src:url('/fonts/PARFUMERIEREGULARScript.woff2') format('woff2'),url('/fonts/PARFUMERIEREGULARScript.woff') format('woff');}
@font-face{font-family:'Goudy';src:url('/fonts/GOUDYOLDSTYLEREGULARScript.woff2') format('woff2'),url('/fonts/GOUDYOLDSTYLEREGULARScript.woff') format('woff');}

:root{
  --black:   #1c2120;
  --offwhite:#f9f7f5;
  --white:   #ffffff;
  --text:    #1c2120;
  --script:  'Parfumerie Script',cursive;
  --serif:   'Goudy','Georgia',serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:var(--serif);color:var(--text);background:var(--offwhite);}
body.hydrating{visibility:hidden;}
img{max-width:100%;display:block;}

/* ── NAV ─────────────────────────────────────────────────────── */
.nav{
  position:fixed;top:0;left:0;right:0;z-index:500;
  display:flex;align-items:center;justify-content:flex-end;
  padding:1.2rem 1.8rem;
  background:transparent;
  pointer-events:none;
}
.nav-hamburger{
  background:none;border:none;cursor:pointer;
  font-size:1.3rem;color:var(--black);
  line-height:1;letter-spacing:0.08em;
  pointer-events:auto;
  font-family:var(--serif);
}

/* ── MENU OVERLAY — dark right slide-in ──────────────────────── */
.menu-overlay{position:fixed;inset:0;z-index:1000;display:flex;pointer-events:none;}
.menu-backdrop{flex:1;background:rgba(0,0,0,0);transition:background 0.4s;pointer-events:none;}
.menu-drawer{
  width:300px;background:rgba(28,33,32,0.97);
  transform:translateX(100%);
  transition:transform 0.45s cubic-bezier(0.77,0,0.175,1);
  display:flex;flex-direction:column;justify-content:center;
  padding:3rem 2.5rem;
  pointer-events:auto;position:relative;
}
.menu-overlay.open .menu-backdrop{background:rgba(0,0,0,0.4);pointer-events:auto;}
.menu-overlay.open .menu-drawer{transform:translateX(0);}
.menu-close{
  position:absolute;top:1.2rem;right:1.4rem;
  background:none;border:none;cursor:pointer;
  font-size:1.5rem;color:rgba(249,247,245,0.6);line-height:1;
}
.menu-close:hover{color:var(--offwhite);}
.menu-header{
  font-family:var(--script);font-size:1.8rem;
  color:var(--offwhite);margin-bottom:0.3rem;
}
.menu-sub{
  font-family:var(--serif);font-size:0.68rem;
  letter-spacing:0.12em;text-transform:uppercase;
  color:rgba(249,247,245,0.4);margin-bottom:2.5rem;
}
.menu-links{list-style:none;display:flex;flex-direction:column;gap:1rem;}
.menu-links a{
  font-family:var(--serif);font-size:0.82rem;
  letter-spacing:0.06em;
  color:rgba(249,247,245,0.75);text-decoration:none;
  transition:color 0.2s;
}
.menu-links a:hover{color:var(--offwhite);}
.menu-footer{
  margin-top:3rem;
  font-family:var(--script);font-size:1.2rem;
  color:rgba(249,247,245,0.35);
}

/* ── HOME — offwhite bg, couple names centred vertically ────── */
.home-section{
  min-height:100vh;
  background:var(--offwhite);
  display:flex;align-items:center;justify-content:center;
  padding:2rem;
}
.home-couple-name{
  font-family:var(--script);
  font-size:clamp(3.5rem,8vw,6rem);
  color:var(--black);
  text-align:center;
  line-height:1.2;
}

/* ── SECTION BASE ────────────────────────────────────────────── */
.section{padding:5rem 2rem;}
.section-inner{max-width:840px;margin:0 auto;}

/* ── OUR STORY — offwhite bg ─────────────────────────────────── */
.story-section{background:var(--offwhite);}
.story-title{
  font-family:var(--script);font-size:clamp(2rem,4vw,3rem);
  color:var(--black);text-align:center;margin-bottom:0.5rem;
}
.story-rule{width:40px;height:1px;background:rgba(28,33,32,0.25);margin:0 auto 2rem;}
.story-body{
  font-family:var(--serif);font-size:0.88rem;
  color:var(--black);line-height:2;text-align:center;
  max-width:560px;margin:0 auto;
}

/* ── THE WEDDING — near-black bg, two columns + candelabra ──── */
.wedding-section{
  background:var(--black);
  padding:5rem 2rem;
}
.wedding-grid{
  display:grid;
  grid-template-columns:1fr auto 1fr;
  gap:0 2rem;
  max-width:780px;margin:0 auto;
  align-items:center;
}
.wedding-candelabra{
  width:90px;flex-shrink:0;
  /* candelabra image — tall and narrow */
  filter:brightness(1.05);
}
.wedding-card{
  padding:1.5rem 1rem;
  /* left-aligned text within card per screenshot */
}
.wedding-card-name{
  font-family:var(--script);
  font-size:clamp(2rem,4vw,3rem);
  color:var(--white);
  margin-bottom:1.5rem;line-height:1.2;
}
.wedding-card-detail{
  font-family:var(--serif);font-size:1rem;
  color:var(--white);line-height:2.1;
}
.wedding-card-dress{
  display:block;margin-top:1.5rem;
  font-family:var(--script);font-size:1.6rem;
  color:var(--white);
}

/* ── OTHER EVENTS — offwhite bg, photo top centre ───────────── */
.events-section{background:var(--offwhite);padding:5rem 2rem;}
.other-event-item{
  max-width:500px;margin:0 auto;
  text-align:center;padding:2rem 0;
}
.other-event-item + .other-event-item{
  border-top:1px solid rgba(28,33,32,0.1);
}
.other-event-photo{
  width:240px;height:220px;
  object-fit:cover;object-position:center;
  margin:0 auto 2.5rem;
  display:block;
  /* B&W filter to match screenshot */
  filter:grayscale(100%);
}
.other-event-name{
  font-family:var(--script);
  font-size:clamp(2rem,5vw,3.2rem);
  color:var(--black);
  margin-bottom:1.6rem;line-height:1.2;
}
.other-event-detail{
  font-family:var(--serif);font-size:1rem;
  color:var(--black);line-height:2.2;text-align:center;
}
.other-event-dress{
  display:block;margin-top:1.5rem;
  font-family:var(--script);font-size:2rem;
  color:var(--black);
}

/* ── TRAVEL / ACCOMMODATIONS — dark bg, two arch cards ──────── */
.travel-section{
  background:var(--black);
  padding:5rem 2rem;
}
.travel-cards{
  display:grid;grid-template-columns:1fr 1fr;
  gap:1.5rem;max-width:620px;margin:0 auto;
}
/* Arch/tombstone card shape */
.arch-card{
  background:var(--offwhite);
  /* Arch at top using border-radius — large top corners */
  border-radius:120px 120px 4px 4px;
  border:1.5px solid rgba(28,33,32,0.15);
  padding:2.5rem 1.8rem 2rem;
  text-align:center;
  display:flex;flex-direction:column;align-items:center;
}
.arch-card-label{
  font-family:var(--script);
  font-size:1.4rem;
  color:var(--black);
  margin-bottom:0.7rem;line-height:1.2;
}
.arch-card-rule{
  width:50px;height:1px;background:rgba(28,33,32,0.25);
  margin:0 auto 1.2rem;
}
.arch-card-name{
  font-family:var(--serif);font-size:0.9rem;font-weight:bold;
  color:var(--black);line-height:1.5;margin-bottom:0.7rem;
  text-align:center;
}
.arch-card-note{
  font-family:var(--serif);font-size:0.75rem;font-style:italic;
  color:rgba(28,33,32,0.7);line-height:1.6;margin-bottom:1.5rem;
  text-align:center;flex:1;
}
.arch-card-btn{
  display:block;width:100%;
  background:var(--black);color:var(--white);
  font-family:var(--serif);font-size:0.75rem;font-weight:bold;
  letter-spacing:0.1em;text-transform:uppercase;
  padding:0.75rem;border:none;cursor:pointer;
  text-decoration:none;transition:opacity 0.2s;
}
.arch-card-btn:hover{opacity:0.8;}

/* ── NEED TO KNOWS — dark bg, candelabra image at bottom ────── */
.ntk-section{
  background:var(--black);
  padding:5rem 2rem 3rem;
  position:relative;
}
.ntk-title{
  font-family:var(--script);
  font-size:clamp(2.5rem,6vw,4rem);
  color:var(--white);text-align:center;margin-bottom:3.5rem;
}
.ntk-inner{max-width:560px;margin:0 auto;}
.ntk-item{
  text-align:center;margin-bottom:3rem;padding-bottom:3rem;
  border-bottom:none;
}
.ntk-item:last-child{margin-bottom:0;padding-bottom:0;}
.ntk-question{
  font-family:var(--serif);font-size:1.1rem;font-weight:bold;
  color:var(--white);margin-bottom:0.9rem;
}
.ntk-answer{
  font-family:var(--serif);font-size:0.88rem;font-style:italic;
  color:rgba(249,247,245,0.85);line-height:2;
  text-align:center;max-width:480px;margin:0 auto;
}
/* Candelabra image at bottom of NTK section */
.ntk-candelabra{
  display:block;
  width:90px;margin:3rem auto 0;
  opacity:0.85;
}

/* ── GALLERY — offwhite bg ────────────────────────────────────── */
.gallery-section{background:var(--offwhite);padding:5rem 2rem;}
.gallery-title{
  font-family:var(--script);font-size:clamp(2rem,4vw,3rem);
  color:var(--black);text-align:center;margin-bottom:0.5rem;
}
.gallery-rule{width:40px;height:1px;background:rgba(28,33,32,0.25);margin:0 auto 2rem;}
.gallery-grid{
  display:grid;grid-template-columns:repeat(3,1fr);
  gap:3px;max-width:820px;margin:0 auto;
}
.gallery-cell{overflow:hidden;cursor:pointer;aspect-ratio:1;}
.gallery-cell img{width:100%;height:100%;object-fit:cover;transition:transform 0.4s;}
.gallery-cell:hover img{transform:scale(1.05);}
.gallery-lightbox{position:fixed;inset:0;z-index:999;background:rgba(28,33,32,0.95);display:none;align-items:center;justify-content:center;}
.gallery-lightbox.open{display:flex;}
.gallery-lightbox img{max-width:88vw;max-height:88vh;object-fit:contain;}
.gallery-lb-close{position:absolute;top:1.2rem;right:1.5rem;background:none;border:none;color:var(--offwhite);font-size:2rem;cursor:pointer;}
.gallery-lb-arrow{position:absolute;top:50%;transform:translateY(-50%);background:rgba(249,247,245,0.15);border:none;cursor:pointer;color:var(--offwhite);width:44px;height:44px;border-radius:50%;font-size:1.2rem;display:flex;align-items:center;justify-content:center;transition:background 0.2s;}
.gallery-lb-arrow:hover{background:rgba(249,247,245,0.3);}
.gallery-lb-arrow.prev{left:1.2rem;}
.gallery-lb-arrow.next{right:1.2rem;}
.gallery-lb-counter{position:absolute;bottom:1.2rem;left:50%;transform:translateX(-50%);font-family:var(--serif);font-size:0.75rem;letter-spacing:0.08em;color:rgba(249,247,245,0.5);}

/* ── REGISTRY — offwhite bg, just the title ──────────────────── */
.registry-section{
  background:var(--offwhite);
  padding:4rem 2rem;
  min-height:160px;
  display:flex;align-items:center;justify-content:center;
  border-top:1px solid rgba(28,33,32,0.08);
}
.registry-title{
  font-family:var(--script);
  font-size:clamp(2.2rem,5vw,3.5rem);
  color:var(--black);
  text-align:center;line-height:1.2;
}
.registry-body{
  font-family:var(--serif);font-size:0.8rem;
  color:rgba(28,33,32,0.65);line-height:1.9;
  margin-top:0.8rem;text-align:center;
}

/* ── RSVP ──────────────────────────────────────────────────── */
/* FIX 7: Matches screenshot exactly */
.rsvp-section{background:var(--offwhite);padding:5rem 4rem;text-align:center;}
.rsvp-inner{max-width:560px;margin:0 auto;}
.rsvp-deadline{
  font-family:var(--serif);font-size:0.78rem;
  color:var(--olive);letter-spacing:0.08em;
  font-style:italic;margin-bottom:2.5rem;   /* italic as in screenshot */
}
.rsvp-event-block{
  margin-bottom:1.2rem;background:var(--white);
  border:1px solid rgba(141,136,99,0.18);
  border-radius:3px;text-align:left;overflow:hidden;
}
.rsvp-event-label{
  font-family:var(--serif);font-size:0.72rem;
  letter-spacing:0.12em;text-transform:uppercase;
  color:var(--olive);padding:0.85rem 1.4rem 0.7rem;
  border-bottom:1px solid rgba(141,136,99,0.12);
}
.rsvp-name-row{padding:0;}
.rsvp-name-input{
  width:100%;padding:0.85rem 1.4rem;
  border:none;background:transparent;
  font-family:var(--serif);font-size:0.88rem;
  color:var(--text);outline:none;display:block;
}
.rsvp-name-input::placeholder{color:#c8c5be;font-style:italic;}
/* Expandable section */
.rsvp-expanded{
  display:none;border-top:1px solid rgba(141,136,99,0.12);
  padding:1rem 1.4rem;
}
.rsvp-expanded.visible{display:block}
.rsvp-field-row{display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;margin-bottom:0.75rem;}
.rsvp-field-row.full{grid-template-columns:1fr}
.rsvp-select,.rsvp-text-input{
  width:100%;padding:0.65rem 0.9rem;
  border:1px solid rgba(141,136,99,0.25);
  background:var(--offwhite);
  font-family:var(--serif);font-size:0.82rem;
  color:var(--text);outline:none;border-radius:2px;
}
.rsvp-select:focus,.rsvp-text-input:focus{border-color:var(--olive)}
.rsvp-textarea{
  width:100%;padding:0.65rem 0.9rem;resize:vertical;min-height:58px;
  border:1px solid rgba(141,136,99,0.25);
  background:var(--offwhite);font-family:var(--serif);
  font-size:0.82rem;color:var(--text);outline:none;border-radius:2px;
}
.rsvp-textarea:focus{border-color:var(--olive)}
.extra-guests-list{display:flex;flex-direction:column;gap:0.5rem;margin-bottom:0.5rem;}
.extra-guest-row{display:grid;grid-template-columns:1fr auto;gap:0.5rem;align-items:center;}
.rsvp-remove-btn{background:none;border:none;cursor:pointer;font-size:1rem;color:#ccc;padding:0.3rem;line-height:1;}
.rsvp-remove-btn:hover{color:#999}
/* FIX 7: Add guest CTA matches screenshot — plain text link style */
.rsvp-add-guest{
  display:block;width:100%;padding:0.65rem;
  border:1px solid rgba(141,136,99,0.25);
  border-radius:2px;background:none;
  font-family:var(--serif);font-size:0.82rem;
  color:var(--text);cursor:pointer;text-align:center;
  margin-top:0.5rem;transition:background 0.2s;
}
.rsvp-add-guest:hover{background:rgba(141,136,99,0.06)}
/* FIX 7: Submit button — pill, olive */
.rsvp-submit{
  display:block;width:100%;padding:0.9rem;
  margin:1.2rem auto 0;
  background:var(--olive);color:var(--white);
  border:none;border-radius:999px;  /* pill to match screenshot */
  cursor:pointer;font-family:var(--serif);
  font-size:0.82rem;letter-spacing:0.1em;
  text-transform:uppercase;transition:opacity 0.2s;
}
.rsvp-submit:hover{opacity:0.85}
.rsvp-success{
  display:none;margin:1.5rem auto 0;
  background:var(--white);border:1px solid rgba(141,136,99,0.22);
  border-radius:3px;padding:2rem;text-align:center;
}
.rsvp-success-icon{font-size:2rem;margin-bottom:0.5rem}
.rsvp-success-msg{font-family:var(--serif);font-size:0.9rem;color:var(--olive);line-height:1.7;}

/* ── TRAVEL ───────────────────────────────────────────────── */
.travel-section{
  background:var(--olive);padding:5rem 4rem;
  position:relative;overflow:visible;text-align:center;
}
.travel-inner{max-width:680px;margin:0 auto;position:relative;z-index:1;}
.travel-content{
  font-family:var(--serif);font-size:0.9rem;
  color:rgba(255,255,255,0.88);line-height:1.9;
  text-align:left;max-width:560px;margin:1.5rem auto 0;
}
.travel-flower-l{
  position:absolute;right:-30px;bottom:-60px;
  width:120px;opacity:0.9;z-index:10;pointer-events:none;
}

/* ── GALLERY ──────────────────────────────────────────────── */
.gallery-section{
  background:var(--offwhite);padding:5rem 0;text-align:center;
}
.gallery-section-inner{max-width:100%;margin:0 auto;}
/* Masonry-style collage grid */
.gallery-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  grid-auto-rows:140px;
  gap:6px;
  padding:0;
}
.gallery-item{overflow:hidden;cursor:pointer;position:relative;}
.gallery-item img{
  width:100%;height:100%;object-fit:cover;display:block;
  transition:transform 0.4s ease;
}
.gallery-item:hover img{transform:scale(1.06);}
/* Varied sizes for collage feel */
.gallery-item:nth-child(1){grid-column:span 2;grid-row:span 2;}
.gallery-item:nth-child(4){grid-column:span 2;}
.gallery-item:nth-child(7){grid-row:span 2;}
.gallery-item:nth-child(9){grid-column:span 2;}

/* Lightbox */
.gallery-lightbox{
  position:fixed;inset:0;z-index:9000;
  background:rgba(4,5,5,0.92);
  display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity 0.3s;
}
.gallery-lightbox.open{opacity:1;pointer-events:auto;}
.gallery-lightbox img{
  max-width:90vw;max-height:88vh;
  object-fit:contain;border-radius:4px;
  box-shadow:0 8px 60px rgba(0,0,0,0.6);
}
.gallery-lb-close{
  position:absolute;top:20px;right:24px;
  background:none;border:none;color:#fff;
  font-size:2rem;cursor:pointer;opacity:0.7;line-height:1;
}
.gallery-lb-close:hover{opacity:1;}
.gallery-lb-prev,.gallery-lb-next{
  position:absolute;top:50%;transform:translateY(-50%);
  background:rgba(255,255,255,0.12);border:none;color:#fff;
  font-size:1.8rem;cursor:pointer;padding:12px 18px;
  border-radius:4px;transition:background 0.2s;
}
.gallery-lb-prev{left:16px;}
.gallery-lb-next{right:16px;}
.gallery-lb-prev:hover,.gallery-lb-next:hover{background:rgba(255,255,255,0.25);}
.gallery-lb-counter{
  position:absolute;bottom:20px;left:50%;transform:translateX(-50%);
  color:rgba(255,255,255,0.6);font-family:var(--serif);font-size:0.8rem;
  letter-spacing:0.1em;
}

/* ── FOOTER ──────────────────────────────────────────────────── */
.footer{
  background:var(--black);text-align:center;padding:2.5rem 1rem;
}
.footer-couple{
  font-family:var(--script);font-size:1.8rem;
  color:var(--offwhite);display:block;margin-bottom:0.4rem;
}
.footer-tagline{
  font-family:var(--serif);font-size:0.68rem;
  letter-spacing:0.12em;text-transform:uppercase;
  color:rgba(249,247,245,0.4);
}

/* ── RESPONSIVE ───────────────────────────────────────────────── */
@media(max-width:640px){
  .wedding-grid{grid-template-columns:1fr;gap:2rem;}
  .wedding-candelabra{width:60px;margin:0 auto;}
  .wedding-card{text-align:center;}
  .travel-cards{grid-template-columns:1fr;max-width:280px;}
  .gallery-grid{grid-template-columns:1fr 1fr;}
}

/* ── THUMBNAIL MODE ─────────────────────────────────────── */
body.thumbnail-mode .home-section{
  min-height:40vh;
}
</style>
</head>
<body class="hydrating">

<!-- MENU OVERLAY -->
<div class="menu-overlay" id="menuOverlay">
  <div class="menu-backdrop" onclick="closeMenu()"></div>
  <div class="menu-drawer">
    <button class="menu-close" onclick="closeMenu()">×</button>
    <div class="menu-header" id="menuCoupleName">Forever &amp; Ever</div>
    <div class="menu-sub">Wedding Website</div>
    <ul class="menu-links" id="menuLinks">
      <li><a href="#home"          onclick="handleMenuClick(this)">Home</a></li>
      <li><a href="#story"         onclick="handleMenuClick(this)">Our Story</a></li>
      <li><a href="#wedding"       onclick="handleMenuClick(this)">The Wedding</a></li>
      <li><a href="#events"        onclick="handleMenuClick(this)">Other Events</a></li>
      <li><a href="#travel"        onclick="handleMenuClick(this)">Accommodations &amp; Travel</a></li>
      <li><a href="#ntk"           onclick="handleMenuClick(this)">Need to Knows</a></li>
      <li><a href="#gallery"       onclick="handleMenuClick(this)">Gallery</a></li>
      <li><a href="#registry"      onclick="handleMenuClick(this)">Our Registry</a></li>
      <li><a href="#rsvp"          onclick="handleMenuClick(this)">RSVP</a></li>
    </ul>
    <div class="menu-footer" id="menuDate"></div>
  </div>
</div>

<!-- NAV -->
<nav class="nav">
  <button class="nav-hamburger" onclick="openMenu()" aria-label="Open menu">&#9776;</button>
</nav>

<!-- HOME -->
<section class="home-section" id="home">
  <div class="home-couple-name" id="homeCoupleNames">Elizabeth and Joseph</div>
</section>

<!-- OUR STORY -->
<section class="section story-section" id="story" style="display:none">
  <div class="section-inner">
    <div class="story-title">Our Story</div>
    <div class="story-rule"></div>
    <div class="story-body" id="storyText"></div>
  </div>
</section>

<!-- THE WEDDING — dark bg, two columns + candelabra -->
<section class="wedding-section" id="wedding" style="display:none">
  <div class="wedding-grid" id="weddingGrid">
    <!-- injected by JS -->
  </div>
</section>

<!-- OTHER EVENTS — offwhite, photo top, script name, serif details -->
<section class="events-section" id="events" style="display:none">
  <div id="otherEventsList"></div>

<script>

// ── Thumbnail mode detection ──────────────────────────────
(function(){
  if(new URLSearchParams(window.location.search).get('thumbnail')==='1'){
    document.body.classList.add('thumbnail-mode');
  }
})();

const API           = 'https://wedding-recommender.onrender.com';
const _CANDELABRA   = 'https://assets.softr-files.com/applications/98da9671-14f5-418f-b98a-6f8fb833401f/assets/2981ff7d-774a-4a51-845c-d7bf987e2e79.png';
const _EVENTS_PHOTO = 'https://assets.softr-files.com/applications/98da9671-14f5-418f-b98a-6f8fb833401f/assets/232269a0-8368-4a48-9188-fe2df41b6d35.png';

const _params    = new URLSearchParams(window.location.search);
const _slugParam = _params.get('slug') || '';
const _pathParts = window.location.pathname.split('/').filter(p=>p);
const _firstPart = _pathParts[0] || '';
const _liveSlug  = _slugParam || (_firstPart !== 'template-foreverever.html' ? _firstPart : '');
const _isPreview = !_liveSlug;
const _pwdParam  = _params.get('pwd') || '';

// ── Menu ──────────────────────────────────────────────────────────────────
function openMenu()  { document.getElementById('menuOverlay').classList.add('open'); }
function closeMenu() { document.getElementById('menuOverlay').classList.remove('open'); }
document.addEventListener('keydown', e => { if(e.key==='Escape') closeMenu(); });
function handleMenuClick(link) {
  closeMenu();
  var href = link.getAttribute('href');
  if (href && href !== '#') {
    setTimeout(function() {
      var el = document.querySelector(href);
      if (el) el.scrollIntoView({behavior:'smooth'});
    }, 350);
  }
  return false;
}

// ── Gallery ────────────────────────────────────────────────────────────────
var _galleryUrls=[], _galleryIdx=0;
function openLightbox(i){_galleryIdx=i;var lb=document.getElementById('galleryLightbox');var img=document.getElementById('galleryLbImg');if(!lb||!img)return;img.src=_galleryUrls[i];document.getElementById('galleryLbCounter').textContent=(i+1)+' / '+_galleryUrls.length;lb.classList.add('open');document.body.style.overflow='hidden';}
function closeLightbox(){document.getElementById('galleryLightbox').classList.remove('open');document.body.style.overflow='';}
function shiftLightbox(dir){_galleryIdx=(_galleryIdx+dir+_galleryUrls.length)%_galleryUrls.length;document.getElementById('galleryLbImg').src=_galleryUrls[_galleryIdx];document.getElementById('galleryLbCounter').textContent=(_galleryIdx+1)+' / '+_galleryUrls.length;}
document.addEventListener('keydown',function(e){if(e.key==='Escape')closeLightbox();if(e.key==='ArrowLeft')shiftLightbox(-1);if(e.key==='ArrowRight')shiftLightbox(1);});
document.addEventListener('click',function(e){var lb=document.getElementById('galleryLightbox');if(lb&&lb.classList.contains('open')&&e.target===lb)closeLightbox();});

function buildRsvpBlocks(events) {
  var container = document.getElementById('rsvpBlocks');
  container.innerHTML = '';
  var entreeOpts = _rsvpEntreeOptions.map(function(o) {
    return '<option value="' + o.value + '">' + o.label + '</option>';
  }).join('');
  events.forEach(function(ev) {
    var block = document.createElement('div');
    block.className = 'rsvp-event-block';
    block.dataset.eventId = ev.id;
    block.innerHTML =
      '<div class="rsvp-event-label">' + ev.label + '</div>' +
      '<div class="rsvp-name-row">' +
        '<input class="rsvp-name-input" type="text" placeholder="Your full name" oninput="onNameInput(this)">' +
      '</div>' +
      '<div class="rsvp-expanded" id="expanded-' + ev.id + '">' +
        '<div class="rsvp-field-row" style="margin-bottom:0.75rem">' +
          '<select class="rsvp-select" data-field="attending">' +
            '<option value="">Will you attend?</option>' +
            '<option value="yes">Attending</option>' +
            '<option value="no">Cannot make it</option>' +
            '<option value="maybe">Not sure yet</option>' +
          '</select>' +
          '<select class="rsvp-select" data-field="meal">' +
            '<option value="">Meal type</option>' +
            '<option value="Vegetarian">Vegetarian</option>' +
            '<option value="Non Vegetarian">Non-Vegetarian</option>' +
            '<option value="Vegan">Vegan</option>' +
            '<option value="Gluten Free">Gluten-Free</option>' +
            '<option value="Kids Meal">Kids Meal</option>' +
          '</select>' +
        '</div>' +
        '<div class="rsvp-field-row full" style="margin-bottom:0.75rem">' +
          '<select class="rsvp-select" data-field="entree" style="width:100%">' +
            '<option value="">Entree choice (select one)</option>' +
            entreeOpts +
          '</select>' +
        '</div>' +
        '<div class="rsvp-field-row full" style="margin-bottom:0.75rem">' +
          '<input class="rsvp-text-input" type="email" placeholder="Email address" data-field="email">' +
        '</div>' +
        '<div class="rsvp-field-row full" style="margin-bottom:0.5rem">' +
          '<textarea class="rsvp-textarea" rows="2" placeholder="Allergies or dietary requirements?" data-field="dietary"></textarea>' +
        '</div>' +
        '<div class="rsvp-field-row full" style="margin-bottom:0.5rem">' +
          '<textarea class="rsvp-textarea" rows="2" placeholder="Message for the couple (optional)" data-field="notes"></textarea>' +
        '</div>' +
        '<div class="extra-guests-list" id="extra-guests-' + ev.id + '"></div>' +
        '<button class="rsvp-add-guest" onclick="addExtraGuest(this)">' +
          '+ Add Another Guest' +
        '</button>' +
      '</div>';
    container.appendChild(block);
  });
  checkShowSubmit();
}

function onNameInput(input) {
  const block    = input.closest('.rsvp-event-block');
  const eventId  = block.dataset.eventId;
  const expanded = document.getElementById('expanded-' + eventId);
  expanded.classList.toggle('visible', input.value.trim().length >= 2);
  checkShowSubmit();
}

function addExtraGuest(btn) {
  var eventId = btn.closest('.rsvp-event-block').dataset.eventId;
  var list = document.getElementById('extra-guests-' + eventId);
  if (list.children.length > 0) return; // only one plus one

  var mealOpts = [
    {v:'', l:'Meal type'},
    {v:'Vegetarian', l:'Vegetarian'},
    {v:'Non Vegetarian', l:'Non-Vegetarian'},
    {v:'Vegan', l:'Vegan'},
    {v:'Gluten Free', l:'Gluten-Free'},
    {v:'Kids Meal', l:'Kids Meal'}
  ];
  var entreeOpts = [{v:'', l:'Entree (optional)'}].concat(
    _rsvpEntreeOptions.map(function(o) { return {v: o.value, l: o.label}; })
  );

  function makeSelect(opts, role) {
    var sel = document.createElement('select');
    sel.className = 'rsvp-select';
    sel.dataset.role = role;
    opts.forEach(function(o) {
      var opt = document.createElement('option');
      opt.value = o.v; opt.textContent = o.l;
      sel.appendChild(opt);
    });
    return sel;
  }

  var row = document.createElement('div');
  row.className = 'extra-guest-row';

  // Name row
  var nameRow = document.createElement('div');
  nameRow.style.cssText = 'display:grid;grid-template-columns:1fr auto;gap:0.5rem;align-items:center;margin-bottom:0.4rem';
  var nameInput = document.createElement('input');
  nameInput.className = 'rsvp-text-input';
  nameInput.type = 'text';
  nameInput.placeholder = 'Plus one full name';
  nameInput.dataset.role = 'plus-one-name';
  var removeBtn = document.createElement('button');
  removeBtn.className = 'rsvp-remove-btn';
  removeBtn.textContent = '×';
  removeBtn.onclick = function() {
    row.remove();
    btn.style.display = '';
  };
  nameRow.appendChild(nameInput);
  nameRow.appendChild(removeBtn);

  // Meal row
  var mealRow = document.createElement('div');
  mealRow.style.cssText = 'display:grid;grid-template-columns:1fr 1fr;gap:0.5rem';
  mealRow.appendChild(makeSelect(mealOpts, 'plus-one-meal'));
  mealRow.appendChild(makeSelect(entreeOpts, 'plus-one-entree'));

  row.appendChild(nameRow);
  row.appendChild(mealRow);
  list.appendChild(row);
  btn.style.display = 'none';
}

function checkShowSubmit() {
  const has = [...document.querySelectorAll('.rsvp-name-input')]
    .some(i => i.value.trim().length >= 2);
  const btn = document.getElementById('rsvpSubmitBtn');
  if (btn) btn.style.display = has ? 'block' : 'none';
}

async function submitRSVP() {
  if (_isPreview) { alert('RSVP is disabled in preview mode.'); return; }
  var blocks = document.querySelectorAll('.rsvp-event-block');
  var slug   = window._weddingSlug || '';
  var btn    = document.getElementById('rsvpSubmitBtn');
  btn.disabled = true; btn.textContent = 'Submitting...';
  try {
    var promises = [];
    blocks.forEach(function(block) {
      var name = block.querySelector('.rsvp-name-input').value.trim();
      if (!name) return;
      var eid      = block.dataset.eventId;
      var exp      = document.getElementById('expanded-' + eid);
      var attending    = (exp && exp.querySelector('[data-field="attending"]')) ? exp.querySelector('[data-field="attending"]').value : 'yes';
      var meal         = (exp && exp.querySelector('[data-field="meal"]'))     ? exp.querySelector('[data-field="meal"]').value     : '';
      var entree       = (exp && exp.querySelector('[data-field="entree"]'))   ? exp.querySelector('[data-field="entree"]').value   : '';
      var email        = (exp && exp.querySelector('[data-field="email"]'))    ? exp.querySelector('[data-field="email"]').value    : '';
      var dietary      = (exp && exp.querySelector('[data-field="dietary"]'))  ? exp.querySelector('[data-field="dietary"]').value  : '';
      var notes        = (exp && exp.querySelector('[data-field="notes"]'))    ? exp.querySelector('[data-field="notes"]').value    : '';
      var label        = block.querySelector('.rsvp-event-label').textContent;
      promises.push(fetch(API + '/rsvp', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          slug:             slug,
          guest_name:       name,
          attending:        attending,
          meal_preference:  meal,
          entree_choice:    entree,
          email:            email,
          dietary_notes:    dietary,
          message:          notes,
          event_name:       label
        })
      }));
      // Plus one — reads the structured fields we added
      var plusOneRow = exp && exp.querySelector('.extra-guest-row');
      if (plusOneRow) {
        var plusOneName   = (plusOneRow.querySelector('[data-role="plus-one-name"]') || {}).value || '';
        var plusOneMeal   = (plusOneRow.querySelector('[data-role="plus-one-meal"]') || {}).value || '';
        var plusOneEntree = (plusOneRow.querySelector('[data-role="plus-one-entree"]') || {}).value || '';
        if (plusOneName.trim()) {
          promises.push(fetch(API + '/rsvp', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              slug: slug, guest_name: plusOneName.trim(),
              attending: attending, event_name: label,
              meal_preference: plusOneMeal, entree_choice: plusOneEntree
            })
          }));
        }
      }
    });
    var results = await Promise.all(promises);
    // Check if any failed
    var failed = results.filter(function(r) { return !r.ok; });
    if (failed.length > 0) throw new Error(failed.length + ' RSVP(s) failed to save');
    document.getElementById('rsvpSuccess').style.display = 'block';
    btn.style.display = 'none';
  } catch(e) {
    console.error('RSVP error:', e);
    alert('Something went wrong. Please try again.');
    btn.disabled = false; btn.textContent = 'Submit Your Rsvp';
  }
}

// ── Hydration ─────────────────────────────────────────────────
function hydrateTemplate(d) {
  window._weddingSlug  = d.slug || '';
  const names   = d.couple_names || 'Sarah & Aiden';
  const p1      = d.partner_1 || '';
  const p2      = d.partner_2 || '';
  const mode    = (d.website_mode || 'Full').toLowerCase();
  const isSaveTheDate = mode.includes('save');
  const menu    = d.menu_config || {};
  const rsvpOn  = d.rsvp_enabled === true;

  // ── Names ────────────────────────────────────────────────────────────
  document.getElementById('heroCoupleNames').textContent = names;
  document.getElementById('navLogo').textContent = p1 && p2 ? `${p1[0]} & ${p2[0]}` : names;
  document.getElementById('footerNames').textContent = names;
  document.title = names;

  // ── Hero image ────────────────────────────────────────────────────────
  if (d.hero_image) {
    document.getElementById('heroImg').src = d.hero_image;
    const bg = document.getElementById('needToKnowBg');
    if (bg) { bg.style.backgroundImage = `url('${d.hero_image}')`; bg.style.backgroundSize = 'cover'; bg.style.backgroundPosition = 'center'; }
  }

  // ── Footer ────────────────────────────────────────────────────────────
  if (d.celebration_date || d.celebration_location) {
    const dp = d.celebration_date ? new Date(d.celebration_date).toLocaleDateString('en-US', { month:'long', day:'numeric', year:'numeric' }) : '';
    document.getElementById('footerDate').textContent = [dp, d.celebration_location].filter(Boolean).join(' · ');
  }

  // ── Custom colours + CSS ──────────────────────────────────────────────
  if (d.customization) {
    if (d.customization.primary_color) document.documentElement.style.setProperty('--olive',   d.customization.primary_color);
    if (d.customization.accent_color)  document.documentElement.style.setProperty('--offwhite', d.customization.accent_color);
    if (d.customization.text_color)    document.documentElement.style.setProperty('--text',     d.customization.text_color);
  }

  // ── RSVP config — entree options + plus one ───────────────────────────
  if (d.rsvp_config) {
    // Update entree options list
    if (d.rsvp_config.entrees && d.rsvp_config.entrees.length) {
      _rsvpEntreeOptions = d.rsvp_config.entrees.map(function(e) {
        return { value: e, label: e };
      });
    }
    // Show/hide "Add Another Guest" button based on allow_plus_one
    var addGuestBtns = document.querySelectorAll('.rsvp-add-guest');
    addGuestBtns.forEach(function(btn) {
      btn.style.display = d.rsvp_config.allow_plus_one === false ? 'none' : '';
    });
  }
  // Custom CSS — injected as a <style> block, applied after theme defaults
  if (d.custom_css) {
    var existingStyle = document.getElementById('custom-css-override');
    if (existingStyle) existingStyle.remove();
    var styleEl = document.createElement('style');
    styleEl.id = 'custom-css-override';
    styleEl.textContent = d.custom_css;
    document.head.appendChild(styleEl);
  }

  // ── Custom font ────────────────────────────────────────────────────────
  if (d.custom_font) {
    const cursiveFonts = ['Dancing Script','Pacifico','Great Vibes'];
    const isCursive = cursiveFonts.some(f => d.custom_font.includes(f));
    const fontLink  = document.createElement('link');
    fontLink.rel    = 'stylesheet';
    fontLink.href   = `https://fonts.googleapis.com/css2?family=${encodeURIComponent(d.custom_font)}&display=swap`;
    document.head.appendChild(fontLink);
    document.documentElement.style.setProperty(isCursive ? '--script' : '--serif', `'${d.custom_font}',${isCursive ? 'cursive' : 'serif'}`);
  }

  // ── Save the Date mode: show only hero ────────────────────────────────
  const allSections = ['our-story','events-primary','other-events','accommodations','need-to-know','travel-section','gallery','registry-section','rsvp'];
  if (isSaveTheDate) {
    allSections.forEach(id => { const el = document.getElementById(id); if (el) el.style.display = 'none'; });
    _buildMenu({ home: true }, false);
    const overlay = document.querySelector('.hero-names-overlay');
    if (overlay && !document.getElementById('saveTheDateLabel')) {
      const lbl = document.createElement('div');
      lbl.id = 'saveTheDateLabel';
      lbl.style.cssText = 'font-family:var(--serif);font-size:0.9rem;color:rgba(255,255,255,0.85);letter-spacing:0.14em;text-transform:uppercase;margin-top:12px;text-shadow:0 1px 8px rgba(0,0,0,0.3)';
      lbl.textContent = 'Save the Date';
      overlay.appendChild(lbl);
    }
    _reveal();
    return;
  }

  // ── Our Story ─────────────────────────────────────────────────────────
  const storySection = document.getElementById('our-story');
  const storyText    = document.getElementById('storyText');
  if (d.story && menu.story && storySection && storyText) {
    storyText.innerHTML = d.story;
    storySection.style.display = '';
  } else if (storySection) { storySection.style.display = 'none'; }

  // ── The Wedding ───────────────────────────────────────────────────────
  const weddingSection = document.getElementById('events-primary');
  if (weddingSection) weddingSection.style.display = menu.wedding ? '' : 'none';
  if (menu.wedding) {
    const grid = document.getElementById('eventsGrid');
    if (grid) {
      grid.innerHTML = '';
      if (d.weddings_info) {
        // Split on double <br> to get individual event blocks (Ceremony / Reception)
        var wParts = d.weddings_info.replace(/<br\s*\/?> *<br\s*\/?>\s*<br\s*\/?>\s*<br\s*\/?>\s*<br\s*\/?>\s*/gi, '||SPLIT||')
                                    .replace(/<br\s*\/?> *<br\s*\/?>\s*/gi, '||SPLIT||')
                                    .split('||SPLIT||')
                                    .map(function(p) { return p.trim(); })
                                    .filter(function(p) { return p.length > 3; });
        if (wParts.length >= 2) {
          // Two-column layout: Ceremony left, Reception right
          wParts.slice(0, 2).forEach(function(part) {
            var col = document.createElement('div');
            col.className = 'event-card-primary';
            // First line = event name (bold/strong), rest = details, last em = dress code
            var nameMatch = part.match(/^<strong>([^<]+)<\/strong>/i);
            var eventName = nameMatch ? nameMatch[1] : '';
            var rest = nameMatch ? part.replace(nameMatch[0], '').replace(/^<br\s*\/?>\s*/i, '') : part;
            var dressMatch = rest.match(/<em>([^<]+)<\/em>\s*$/i);
            var dressCode = dressMatch ? dressMatch[1] : '';
            var detail = dressMatch ? rest.replace(dressMatch[0], '').replace(/<br\s*\/?>\s*$/i, '').trim() : rest;
            col.innerHTML =
              (eventName ? '<div class="event-card-name">' + eventName + '</div>' : '') +
              (detail    ? '<div class="event-card-detail">' + detail + '</div>' : '') +
              (dressCode ? '<span class="event-card-dress">' + dressCode + '</span>' : '');
            grid.appendChild(col);
          });
        } else {
          // Fallback: single full-width block
          var card = document.createElement('div');
          card.className = 'event-card-primary';
          card.style.cssText = 'grid-column:1/-1';
          card.innerHTML = '<div style="font-family:var(--serif);font-size:0.9rem;color:rgba(255,255,255,0.92);line-height:2;text-align:center">' + d.weddings_info + '</div>';
          grid.appendChild(card);
        }
      } else if (d.events && d.events.length) {
        // Fallback: structured events from DB
        d.events.slice(0,2).forEach(function(ev) {
          const col = document.createElement('div');
          col.className = 'event-card-primary';
          col.innerHTML = '<div class="event-card-name">'+ev.name+'</div><div class="event-card-detail">'+(ev.date ? fmtDate(ev.date)+'<br>' : '')+(ev.time ? ev.time+'<br>' : '')+(ev.venue ? ev.venue+'<br>' : '')+(ev.address || '')+'</div>'+(ev.dress_code ? '<span class="event-card-dress">'+ev.dress_code+'</span>' : '');
          grid.appendChild(col);
        });
      }
    }
  }

  // ── Other Events ──────────────────────────────────────────────────────
  const otherSection = document.getElementById('other-events');
  if (otherSection) otherSection.style.display = menu.other_events ? '' : 'none';
  if (menu.other_events) {
    const list = document.getElementById('otherEventsList');
    if (list) {
      if (d.events_info) {
        // User-authored HTML — renders the full section content
        list.innerHTML = '<div style="font-family:var(--serif);font-size:0.9rem;line-height:1.9;text-align:center">' + d.events_info + '</div>';
      } else if (d.events && d.events.length > 2) {
        // Fallback: structured events beyond the first 2
        list.innerHTML = '';
        d.events.slice(2).forEach(function(ev) {
          const card = document.createElement('div');
          card.className = 'other-event-card';
          card.innerHTML = '<div class="other-event-name">'+ev.name+'</div><div class="other-event-detail">'+[fmtDate(ev.date), ev.time, ev.venue, ev.address].filter(Boolean).join('<br>')+'</div>';
          list.appendChild(card);
        });
      }
    }
  }

  // ── Accommodations ────────────────────────────────────────────────────
  const accomSection = document.getElementById('accommodations');
  if (accomSection) accomSection.style.display = menu.accommodations ? '' : 'none';
  if (menu.accommodations) {
    const accomList = document.getElementById('accomList');
    if (accomList && d.accommodation_info) {
      accomList.innerHTML = `<div style="font-family:var(--serif);font-size:0.9rem;color:rgba(255,255,255,0.88);line-height:1.9;">${d.accommodation_info}</div>`;
    }
  }

  // ── Need to Knows / FAQs ─────────────────────────────────────────────
  const ntkSection = document.getElementById('need-to-know');
  const showNTK    = menu.things_to_do || menu.faqs;
  if (ntkSection) ntkSection.style.display = showNTK ? '' : 'none';
  if (showNTK) {
    const faqList = document.getElementById('faqList');
    faqList.querySelectorAll('.faq-dynamic').forEach(el => el.remove());
    // Parse faqs HTML into individual accordion items
    // Each <strong>Question</strong> followed by text becomes one FAQ item
    if (d.faqs && menu.faqs) {
      // Parse faqs HTML into individual accordion items.
      // Strategy: split the raw HTML on <br><br> boundaries.
      // Each block's first line (up to first <br>) is the question; rest is the answer.
      var rawHtml = d.faqs;
      // Normalise: replace <br><br> with a sentinel, then split
      var blocks = rawHtml.replace(/<br\s*\/?>\s*<br\s*\/?>/gi, '|||SPLIT|||').split('|||SPLIT|||');
      var faqPairs = blocks.map(function(block) {
        block = block.trim();
        if (!block) return null;
        // Split on first <br> — before = question line, after = answer
        var brIdx = block.search(/<br\s*\/?>/i);
        if (brIdx === -1) {
          // No <br> inside block — whole block is the question, no answer
          return { q: block.replace(/<[^>]+>/g, '').trim(), a: '' };
        }
        var questionHtml = block.substring(0, brIdx);
        var answerHtml   = block.substring(brIdx).replace(/^(<br\s*\/?>)+/i, '').trim();
        // Strip tags from question for display
        var questionText = questionHtml.replace(/<[^>]+>/g, '').trim();
        return { q: questionText, a: answerHtml };
      }).filter(Boolean);

      if (faqPairs.length === 0) {
        faqPairs = [{ q: 'FAQs', a: d.faqs }];
      }

      // Render: each pair = one accordion item (default collapsed)
      faqPairs.forEach(function(pair) {
        var item = document.createElement('div');
        item.className = 'faq-item faq-dynamic';
        item.innerHTML = '<button class="faq-question" onclick="toggleFaq(this)"><span class="faq-q-text">' + pair.q + '</span><span class="faq-icon">+</span></button><div class="faq-answer" style="font-style:italic">' + pair.a + '</div>';
        faqList.prepend(item);
      });
      // Reverse so first question appears at top
      var dynamic = Array.from(faqList.querySelectorAll('.faq-dynamic'));
      dynamic.reverse().forEach(function(el) { faqList.prepend(el); });
    }

    if (d.things_to_do && menu.things_to_do) {
      const item = document.createElement('div'); item.className = 'faq-item faq-dynamic';
      item.innerHTML = `<button class="faq-question" onclick="toggleFaq(this)"><span class="faq-q-text">Things to do nearby?</span><span class="faq-icon">+</span></button><div class="faq-answer">${d.things_to_do}</div>`;
      faqList.appendChild(item);
    }
  }

  // ── Travel ───────────────────────────────────────────────────────────
  const travelSection = document.getElementById('travel-section');
  if (travelSection) travelSection.style.display = menu.travel ? '' : 'none';
  if (menu.travel && d.travel_info) {
    const travelContent = document.getElementById('travelContent');
    if (travelContent) travelContent.innerHTML = d.travel_info;
  }

  // ── Old registry strip — now used as the main registry section ────────
  const oldRegistry = document.getElementById('registry');
  if (oldRegistry) oldRegistry.style.display = 'none';

  // ── Gallery — collage grid + lightbox ────────────────────────────────
  var _galleryUrls = [];
  var _galleryIdx  = 0;
  const gallerySection = document.getElementById('gallery');
  if (gallerySection) {
    const hasImages = d.gallery_images && d.gallery_images.length > 0;
    gallerySection.style.display = (menu.gallery && hasImages) ? '' : 'none';
    if (hasImages) {
      _galleryUrls = d.gallery_images.map(function(i){ return i.url || i; });
      const grid = document.getElementById('galleryGrid');
      if (grid) {
        grid.innerHTML = '';
        _galleryUrls.forEach(function(url, i) {
          const div = document.createElement('div');
          div.className = 'gallery-item';
          div.setAttribute('data-idx', i);
          div.innerHTML = '<img src="' + url + '" alt="" loading="lazy">';
          div.addEventListener('click', function(){ openLightbox(i); });
          grid.appendChild(div);
        });
      }
    }
  }

  // ── Registry section ──────────────────────────────────────────────────
  const registrySection = document.getElementById('registry-section');
  if (registrySection) registrySection.style.display = menu.registry ? '' : 'none';
  if (menu.registry) {
    const infoEl = document.getElementById('registryInfo');
    if (infoEl) infoEl.innerHTML = d.registry_info || '';
  }

  // ── RSVP ─────────────────────────────────────────────────────────────
  const rsvpSection = document.getElementById('rsvp');
  if (rsvpSection) rsvpSection.style.display = (rsvpOn && menu.rsvp) ? '' : 'none';
  if (rsvpOn && menu.rsvp) {
    if (d.events && d.events.length)
      buildRsvpBlocks(d.events.map(ev => ({ id: ev.id || ev.name, label: ev.name })));
    else
      buildRsvpBlocks([{ id: 'wedding', label: 'The Wedding' }]);
  }

  // ── Menu ─────────────────────────────────────────────────────────────
  _buildMenu(menu, rsvpOn, d);
  _reveal();
}

function _buildMenu(menu, rsvpOn, d) {
  d = d || {};
  const menuEl = document.getElementById('menuLinks');
  if (!menuEl) return;
  const links = [
    { show: !!menu.home,                                      href: '#hero',             label: 'Home'           },
    { show: !!menu.story && !!d.story,                        href: '#our-story',        label: 'Our Story'      },
    { show: !!menu.wedding,                                   href: '#events-primary',   label: 'The Wedding'    },
    { show: !!menu.other_events,                              href: '#other-events',     label: 'Other Events'   },
    { show: !!menu.accommodations,                            href: '#accommodations',   label: 'Accommodations' },
    { show: !!(menu.things_to_do || menu.faqs),               href: '#need-to-know',    label: 'Need to Knows'  },
    { show: !!menu.travel,                                    href: '#travel-section',   label: 'Travel'         },
    { show: !!menu.gallery && !!(d.gallery_images?.length),   href: '#gallery',          label: 'Gallery'        },
    { show: !!menu.registry,                                  href: '#registry-section', label: 'Our Registry'   },
    { show: !!rsvpOn && !!menu.rsvp,                          href: '#rsvp',             label: 'RSVP'           },
  ];
  menuEl.innerHTML = '';
  links.filter(l => l.show).forEach(l => {
    const li = document.createElement('li');
    li.innerHTML = `<a href="${l.href}" onclick="handleMenuClick(this)">${l.label}</a>`;
    menuEl.appendChild(li);
  });
}



function fmtDate(d) {
  if (!d) return '';
  try { return new Date(d).toLocaleDateString('en-US',
    { weekday:'long', month:'long', day:'numeric', year:'numeric' }); }
  catch(e) { return d; }
}

// ── Entry point ──────────────────────────────────────────────────────────────

function _reveal() {
  document.body.classList.remove('hydrating');
}

if (_isPreview) {
  // Preview iframe — listen for postMessage, show sample data as fallback
  _reveal(); // show immediately in preview — sample data is fine
  let _got = false;
  window.addEventListener('message', e => {
    if (e.data && e.data.type === 'HYDRATE_TEMPLATE') {
      _got = true; hydrateTemplate(e.data.payload);
    }
  });
  setTimeout(() => { if (!_got) hydrateTemplate(SAMPLE_DATA); }, 800);

} else {
  // Live site — check sessionStorage synchronously (data pre-fetched by index.html)
  const _sessionKey  = 'weddingData_' + _liveSlug;
  const _sessionData = sessionStorage.getItem(_sessionKey);

  if (_sessionData) {
    // Data is already here — hydrate immediately, zero delay, no flash
    try {
      const d = JSON.parse(_sessionData);
      sessionStorage.removeItem(_sessionKey);
      hydrateTemplate(d);
      _reveal();
      // Clean URL after hydration
      if (window.location.search.includes('slug=')) {
        window.history.replaceState({}, d.couple_names || '', '/' + _liveSlug);
      }
    } catch {
      sessionStorage.removeItem(_sessionKey);
      _reveal();
      _fetchAndHydrate();
    }
  } else {
    // No sessionStorage — fetch directly (direct URL access, bookmark, etc.)
    // Show a loading spinner instead of placeholder while fetching
    document.body.innerHTML = `
      <style>
        @keyframes petalSpin{
          0%{transform:rotate(0deg) scale(1)}
          25%{transform:rotate(90deg) scale(1.06)}
          50%{transform:rotate(180deg) scale(1)}
          75%{transform:rotate(270deg) scale(1.06)}
          100%{transform:rotate(360deg) scale(1)}
        }
        @keyframes lineSlide{
          0%{left:-100%} 50%{left:0%} 100%{left:100%}
        }
      </style>
      <div style="display:flex;align-items:center;justify-content:center;
        min-height:100vh;flex-direction:column;gap:24px;background:#f9f7f5;
        background-image:radial-gradient(ellipse 60% 40% at 20% 80%,rgba(169,189,196,0.12) 0%,transparent 60%),
          radial-gradient(ellipse 40% 60% at 80% 20%,rgba(141,136,99,0.08) 0%,transparent 60%)">
        <img src="https://assets.softr-files.com/applications/98da9671-14f5-418f-b98a-6f8fb833401f/assets/d739d2eb-f460-4984-89fb-35511ea20510.png" style="width:72px;height:72px;object-fit:contain;
          animation:petalSpin 3s cubic-bezier(0.45,0.05,0.55,0.95) infinite;
          filter:drop-shadow(0 4px 12px rgba(141,136,99,0.25))">
        <p style="font-family:'Instrument Serif',serif;color:#8d8863;
          font-size:1.5rem;font-style:italic;letter-spacing:0.02em;margin:0">
          Your celebration awaits</p>
        <div style="width:120px;height:1px;background:#e8e4dc;border-radius:999px;
          position:relative;overflow:hidden">
          <div style="position:absolute;left:-100%;top:0;width:100%;height:100%;
            background:#8d8863;border-radius:999px;
            animation:lineSlide 1.8s ease-in-out infinite"></div>
        </div>
      </div>`;
    _reveal();
    _fetchAndHydrate();
  }

  function _fetchAndHydrate() {
    const _apiUrl = `${API}/wedding-site/${encodeURIComponent(_liveSlug)}`
      + (_pwdParam ? `?password=${encodeURIComponent(_pwdParam)}` : '');
    fetch(_apiUrl)
      .then(r => { if (!r.ok) throw r.status; return r.json(); })
      .then(d => {
        if (d.password_required) {
          document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:serif;flex-direction:column;gap:1rem;background:#f9f7f5"><p style="font-size:1.1rem">🔒 Password protected.</p></div>';
          return;
        }
        hydrateTemplate(d);
      })
      .catch(() => {
        document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:serif;flex-direction:column;gap:1rem;background:#f9f7f5"><p style="font-size:1.1rem">🔍 Wedding site not found.</p></div>';
      });
  }
}
// ── Gallery lightbox ──────────────────────────────────────────────────────────
function openLightbox(idx) {
  _galleryIdx = idx;
  var lb = document.getElementById('galleryLightbox');
  var img = document.getElementById('galleryLbImg');
  if (!lb || !img || !_galleryUrls.length) return;
  img.src = _galleryUrls[idx];
  document.getElementById('galleryLbCounter').textContent = (idx+1) + ' / ' + _galleryUrls.length;
  lb.classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeLightbox() {
  var lb = document.getElementById('galleryLightbox');
  if (lb) lb.classList.remove('open');
  document.body.style.overflow = '';
}
function shiftLightbox(dir) {
  if (!_galleryUrls.length) return;
  _galleryIdx = (_galleryIdx + dir + _galleryUrls.length) % _galleryUrls.length;
  var img = document.getElementById('galleryLbImg');
  if (img) img.src = _galleryUrls[_galleryIdx];
  document.getElementById('galleryLbCounter').textContent = (_galleryIdx+1) + ' / ' + _galleryUrls.length;
}
// Close lightbox on backdrop click or Escape key
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeLightbox();
  if (e.key === 'ArrowLeft')  shiftLightbox(-1);
  if (e.key === 'ArrowRight') shiftLightbox(1);
});
document.addEventListener('click', function(e) {
  var lb = document.getElementById('galleryLightbox');
  if (lb && lb.classList.contains('open') && e.target === lb) closeLightbox();
});

// Touch/swipe for mobile lightbox
(function() {
  var startX = null;
  document.addEventListener('touchstart', function(e) {
    var lb = document.getElementById('galleryLightbox');
    if (lb && lb.classList.contains('open')) startX = e.touches[0].clientX;
  });
  document.addEventListener('touchend', function(e) {
    if (startX === null) return;
    var dx = e.changedTouches[0].clientX - startX;
    if (Math.abs(dx) > 50) shiftLightbox(dx < 0 ? 1 : -1);
    startX = null;
  });
})();
