<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Love Letters</title>
<style>
@font-face{font-family:'Parfumerie Script';src:url('/fonts/PARFUMERIEREGULARScript.woff2') format('woff2'),url('/fonts/PARFUMERIEREGULARScript.woff') format('woff');}
@font-face{font-family:'Lancelot';src:url('/fonts/LANCELOTREGULARScript.woff2') format('woff2'),url('/fonts/LANCELOTREGULARScript.woff') format('woff');}
@font-face{font-family:'Sloop Script Pro';src:url('/fonts/SLOOPBOLDTWOScript.woff2') format('woff2'),url('/fonts/SLOOPBOLDTWOScript.woff') format('woff');}

:root{
  --gold:    #afab57;
  --offwhite:#f2ece7;
  --berry:   #673d45;
  --gray:    #696c62;
  --text:    #4a3a3d;
  --white:   #ffffff;
  --script:  'Sloop Script Pro','Parfumerie Script',cursive;
  --serif:   'Lancelot',Georgia,serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:var(--serif);color:var(--text);background:var(--offwhite);}
body.hydrating{visibility:hidden;}
img{max-width:100%;display:block;}

/* ── NAV ───────────────────────────────────────────────────── */
.nav{
  position:fixed;top:0;right:0;z-index:500;
  padding:1rem 1.5rem;
  background:transparent;
}
.nav-hamburger{
  background:none;border:none;cursor:pointer;
  display:flex;flex-direction:column;gap:5px;padding:4px;
}
.nav-hamburger span{display:block;width:22px;height:1.5px;background:var(--offwhite);}

/* ── MENU OVERLAY — right slide-in ──────────────────────────── */
.menu-overlay{position:fixed;inset:0;z-index:1000;display:flex;pointer-events:none;}
.menu-backdrop{flex:1;background:rgba(0,0,0,0);transition:background 0.4s;pointer-events:none;}
.menu-drawer{
  width:280px;background:var(--berry);
  transform:translateX(100%);
  transition:transform 0.45s cubic-bezier(0.77,0,0.175,1);
  display:flex;flex-direction:column;justify-content:center;
  padding:3rem 2.5rem;box-shadow:-8px 0 40px rgba(0,0,0,0.2);
  pointer-events:auto;position:relative;
}
.menu-overlay.open .menu-backdrop{background:rgba(0,0,0,0.35);pointer-events:auto;}
.menu-overlay.open .menu-drawer{transform:translateX(0);}
.menu-close{
  position:absolute;top:1.2rem;right:1.4rem;
  background:none;border:none;cursor:pointer;
  font-size:1.5rem;color:rgba(242,236,231,0.7);line-height:1;
}
.menu-close:hover{color:var(--offwhite);}
.menu-title{font-family:var(--script);font-size:1.8rem;color:var(--offwhite);margin-bottom:2rem;}
.menu-links{list-style:none;display:flex;flex-direction:column;gap:1.1rem;}
.menu-links a{
  font-family:var(--serif);font-size:0.8rem;letter-spacing:0.1em;
  text-transform:uppercase;color:rgba(242,236,231,0.78);text-decoration:none;
  transition:color 0.2s;
}
.menu-links a:hover{color:var(--gold);}

/* ── HERO — full bleed photo, initials bottom-left area ──────── */
.hero{
  position:relative;width:100%;
  /* height set to viewport — square-ish on desktop, taller on mobile */
  height:100vh;min-height:500px;
  overflow:hidden;
  background:#888 url('https://assets.softr-files.com/applications/98da9671-14f5-418f-b98a-6f8fb833401f/assets/a9bef259-3a3f-45b4-83fb-bfaa434bcdba.png') center/cover no-repeat;
}
.hero-carousel{
  position:absolute;inset:0;
  display:flex;height:100%;
  transition:transform 0.7s cubic-bezier(0.4,0,0.2,1);
}
.hero-slide{min-width:100%;height:100%;flex-shrink:0;}
.hero-slide img{width:100%;height:100%;object-fit:cover;display:block;}
/* Carousel dots bottom-centre */
.carousel-dots{
  position:absolute;bottom:1.2rem;left:50%;transform:translateX(-50%);
  display:flex;gap:8px;z-index:3;
}
.carousel-dot{
  width:7px;height:7px;border-radius:50%;
  background:rgba(255,255,255,0.45);border:none;cursor:pointer;padding:0;
  transition:all 0.3s;
}
.carousel-dot.active{background:var(--white);transform:scale(1.25);}
.carousel-arrow{
  position:absolute;top:50%;transform:translateY(-50%);
  background:rgba(103,61,69,0.4);border:none;cursor:pointer;
  color:var(--white);width:36px;height:36px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;font-size:1rem;
  transition:background 0.2s;z-index:3;
}
.carousel-arrow:hover{background:rgba(103,61,69,0.75);}
.carousel-arrow.prev{left:0.8rem;}
.carousel-arrow.next{right:0.8rem;}
/* Initials — large, bottom-left quadrant, overlaid on photo */
.hero-initials-wrap{
  position:absolute;
  bottom:8%;
  left:50%;
  transform:translateX(-50%);
  z-index:2;pointer-events:none;
  display:flex;
  align-items:flex-end;
  /* T and L sit at same baseline; & is smaller, vertically centred between them */
}
.hero-initial-left{
  font-family:'Lancelot',serif;
  font-size:clamp(8rem,20vw,14rem);
  color:#afab57;
  display:inline-block;
  line-height:1;
}
.hero-initial-amp{
  font-family:'Parfumerie Script',cursive;
  font-size:clamp(3.5rem,9vw,6.5rem);
  color:#afab57;
  display:inline-block;
  line-height:1;
  /* pull up from baseline so it sits mid-height between T and L */
  margin-bottom:0.35em;
}
.hero-initial-right{
  font-family:'Lancelot',serif;
  font-size:clamp(8rem,20vw,14rem);
  color:#afab57;
  display:inline-block;
  line-height:1;
}

/* ── THE WEDDING — offwhite bg, no title, two cards + flower ─── */
.wedding-section{
  background:var(--offwhite);
  padding:4rem 2rem;
}
.wedding-grid{
  display:grid;
  grid-template-columns:1fr auto 1fr;
  gap:0 1.5rem;
  max-width:780px;margin:0 auto;
  align-items:center;
}
.wedding-flower-sep{
  width:160px;flex-shrink:0;
  /* flower image is taller than it is wide — natural botanical print */
}
.wedding-card{text-align:center;padding:1.5rem 1rem;}
.wedding-card-name{
  font-family:var(--script);
  font-size:clamp(1.8rem,4vw,2.8rem);
  color:#673d45;
  margin-bottom:1.4rem;line-height:1.2;
}
.wedding-card-detail{
  font-family:var(--serif);font-size:0.9rem;
  color:#673d45;line-height:2.1;
  text-align:center;
}
.wedding-card-dress{
  display:block;margin-top:1.2rem;
  font-family:var(--script);font-size:1.25rem;
  color:#673d45;
}

/* ── OTHER EVENTS — berry bg, all centred white ──────────────── */
.events-section{
  background:#673d45;
  padding:4rem 2rem;
}
.other-event-item{
  text-align:center;
  max-width:560px;margin:0 auto;
  padding:2.5rem 1rem;
}
.other-event-item + .other-event-item{
  border-top:1px solid rgba(242,236,231,0.15);
}
.other-event-name{
  font-family:var(--script);
  font-size:clamp(1.8rem,4vw,2.8rem);
  color:#f2ece7;
  margin-bottom:1.6rem;line-height:1.2;
}
.other-event-detail{
  font-family:var(--serif);font-size:0.92rem;
  color:#f2ece7;line-height:2.2;
  text-align:center;
}
.other-event-dress{
  display:block;margin-top:1.4rem;
  font-family:var(--script);font-size:1.3rem;
  color:#f2ece7;
}

/* ── ACCOMMODATIONS — gray bg ─────────────────────────────────── */
.accommodations-section{
  background:var(--gray);padding:4rem 2rem;
}
.accom-inner{max-width:520px;margin:0 auto;text-align:center;}
.accom-title{
  font-family:var(--script);font-size:clamp(1.8rem,4vw,2.6rem);
  color:var(--offwhite);margin-bottom:1.2rem;
}
.accom-rule{width:50px;height:1px;background:rgba(175,171,87,0.6);margin:0 auto 1.5rem;}
.accom-detail{
  font-family:var(--serif);font-size:0.82rem;
  color:rgba(242,236,231,0.88);line-height:2;
}
.accom-btn{
  display:inline-block;margin-top:1.4rem;
  padding:0.55rem 2rem;
  border:1px solid rgba(175,171,87,0.6);
  color:var(--gold);
  font-family:var(--serif);font-size:0.74rem;
  letter-spacing:0.1em;text-transform:uppercase;
  cursor:pointer;transition:all 0.2s;background:transparent;text-decoration:none;
}
.accom-btn:hover{background:var(--gold);color:var(--white);}

/* ── TRAVEL — offwhite bg ─────────────────────────────────────── */
.travel-section{background:var(--offwhite);padding:4rem 2rem;}
.travel-inner{max-width:540px;margin:0 auto;text-align:center;}
.section-title-script{
  font-family:var(--script);
  font-size:clamp(1.8rem,4vw,2.8rem);
  color:var(--berry);text-align:center;
  margin-bottom:0.5rem;
}
.section-rule-gold{width:50px;height:1px;background:var(--gold);margin:0 auto 2rem;}
.section-body-serif{
  font-family:var(--serif);font-size:0.82rem;
  color:var(--text);line-height:2;text-align:center;
}

/* ── NEED TO KNOWS — offwhite bg, expanded (no accordion) ────── */
.ntk-section{background:var(--offwhite);padding:4rem 2rem;}
.ntk-inner{max-width:560px;margin:0 auto;}
.ntk-title{
  font-family:var(--script);
  font-size:clamp(2rem,5vw,3.2rem);
  color:#673d45;text-align:center;margin-bottom:3rem;
}
.ntk-item{
  text-align:center;
  margin-bottom:2.5rem;
  padding-bottom:2.5rem;
  border-bottom:none;
}
.ntk-item:last-child{margin-bottom:0;padding-bottom:0;}
.ntk-question{
  font-family:var(--serif);
  font-size:1.05rem;font-weight:normal;
  color:#673d45;margin-bottom:0.9rem;
}
.ntk-answer{
  font-family:var(--serif);font-size:0.82rem;
  color:#4a3a3d;line-height:2;text-align:center;
  max-width:480px;margin:0 auto;
}

/* ── GALLERY — berry bg ────────────────────────────────────────── */
.gallery-section{background:var(--berry);padding:4rem 2rem;}
.gallery-title{
  font-family:var(--script);font-size:clamp(1.8rem,4vw,2.6rem);
  color:var(--offwhite);text-align:center;margin-bottom:0.5rem;
}
.gallery-rule{width:50px;height:1px;background:rgba(175,171,87,0.6);margin:0 auto 2rem;}
.gallery-grid{
  display:grid;grid-template-columns:repeat(3,1fr);
  gap:4px;max-width:820px;margin:0 auto;
}
.gallery-cell{overflow:hidden;cursor:pointer;aspect-ratio:1;}
.gallery-cell img{width:100%;height:100%;object-fit:cover;transition:transform 0.4s;}
.gallery-cell:hover img{transform:scale(1.05);}
.gallery-lightbox{
  position:fixed;inset:0;z-index:999;background:rgba(40,20,25,0.92);
  display:none;align-items:center;justify-content:center;backdrop-filter:blur(4px);
}
.gallery-lightbox.open{display:flex;}
.gallery-lightbox img{max-width:88vw;max-height:88vh;object-fit:contain;}
.gallery-lb-close{position:absolute;top:1.2rem;right:1.5rem;background:none;border:none;color:var(--offwhite);font-size:2rem;cursor:pointer;}
.gallery-lb-arrow{position:absolute;top:50%;transform:translateY(-50%);background:rgba(103,61,69,0.6);border:none;cursor:pointer;color:var(--offwhite);width:44px;height:44px;border-radius:50%;font-size:1.2rem;display:flex;align-items:center;justify-content:center;transition:background 0.2s;}
.gallery-lb-arrow:hover{background:rgba(103,61,69,0.9);}
.gallery-lb-arrow.prev{left:1.2rem;}
.gallery-lb-arrow.next{right:1.2rem;}
.gallery-lb-counter{position:absolute;bottom:1.2rem;left:50%;transform:translateX(-50%);font-family:var(--serif);font-size:0.75rem;letter-spacing:0.1em;color:rgba(242,236,231,0.6);}

/* ── REGISTRY — gold bg, ornate border frame ───────────────────── */
.registry-section{
  background:var(--gold);
  padding:4rem 2rem;
  min-height:220px;
  display:flex;align-items:center;justify-content:center;
}
.registry-frame{
  position:relative;
  max-width:580px;width:100%;
  padding:2.8rem 3.5rem;
  text-align:center;
}
/* Ornate SVG border — scrollwork style matching screenshot */
.registry-frame-svg{
  position:absolute;inset:0;width:100%;height:100%;
  pointer-events:none;
}
.registry-title{
  font-family:var(--script);
  font-size:clamp(2rem,5vw,3.2rem);
  color:#3a2010;
  line-height:1.2;
  position:relative;z-index:1;
}
.registry-body{
  font-family:var(--serif);font-size:0.78rem;
  color:rgba(58,32,16,0.75);line-height:1.9;
  margin-top:0.8rem;
  position:relative;z-index:1;
}

/* ── RSVP — greengray bg, single name input pill ───────────────── */
.rsvp-section{
  background:var(--gray);
  padding:4rem 2rem;
  text-align:center;
}
.rsvp-title{
  font-family:var(--script);
  font-size:clamp(2rem,5vw,3rem);
  color:var(--offwhite);
  margin-bottom:0.5rem;
}
.rsvp-deadline{
  font-family:var(--serif);font-size:0.78rem;
  color:rgba(242,236,231,0.75);
  margin-bottom:2rem;letter-spacing:0.04em;
}
.rsvp-deadline sup{font-size:0.6em;vertical-align:super;}
/* The RSVP blocks area — hidden event blocks expand below the name pill */
.rsvp-blocks-wrap{max-width:420px;margin:0 auto;}
.rsvp-event-block{margin-bottom:2rem;}
/* Name pill — offwhite rounded input per screenshot */
.rsvp-name-pill{
  width:100%;
  background:var(--offwhite);
  border:none;border-radius:999px;
  font-family:var(--serif);font-size:0.9rem;
  color:var(--text);
  padding:0.9rem 1.8rem;
  outline:none;text-align:center;
  box-shadow:0 1px 6px rgba(0,0,0,0.08);
  transition:box-shadow 0.2s;
}
.rsvp-name-pill::placeholder{color:rgba(74,58,61,0.55);}
.rsvp-name-pill:focus{box-shadow:0 2px 12px rgba(0,0,0,0.13);}
/* Expanded details below pill */
.rsvp-expanded{display:none;margin-top:1.2rem;}
.rsvp-expanded.visible{display:block;}
.rsvp-field-row{display:grid;grid-template-columns:1fr 1fr;gap:0.7rem;margin-bottom:0.7rem;}
.rsvp-field-row.full{grid-template-columns:1fr;}
.rsvp-select{
  width:100%;background:rgba(242,236,231,0.15);
  border:none;border-bottom:1px solid rgba(242,236,231,0.4);
  color:var(--offwhite);font-family:var(--serif);font-size:0.8rem;
  padding:0.55rem 0.2rem;outline:none;appearance:none;cursor:pointer;
}
.rsvp-select option{background:var(--gray);color:var(--offwhite);}
.rsvp-text-input{
  width:100%;background:rgba(242,236,231,0.15);
  border:none;border-bottom:1px solid rgba(242,236,231,0.4);
  color:var(--offwhite);font-family:var(--serif);font-size:0.8rem;
  padding:0.55rem 0.2rem;outline:none;
}
.rsvp-text-input::placeholder{color:rgba(242,236,231,0.45);}
.rsvp-textarea{
  width:100%;resize:vertical;min-height:60px;
  background:rgba(242,236,231,0.15);
  border:none;border-bottom:1px solid rgba(242,236,231,0.4);
  color:var(--offwhite);font-family:var(--serif);font-size:0.8rem;
  padding:0.55rem 0.2rem;outline:none;
}
.rsvp-extra-list{margin-top:0.8rem;}
.rsvp-add-guest{
  display:block;width:100%;background:none;
  border:1px solid rgba(242,236,231,0.3);color:rgba(242,236,231,0.75);
  font-family:var(--serif);font-size:0.74rem;letter-spacing:0.08em;
  padding:0.55rem;margin-top:0.8rem;cursor:pointer;transition:all 0.2s;
}
.rsvp-add-guest:hover{border-color:rgba(242,236,231,0.6);color:var(--offwhite);}
.extra-guest-row{margin-bottom:0.6rem;}
.rsvp-remove-btn{background:none;border:none;cursor:pointer;color:rgba(242,236,231,0.5);font-size:1rem;padding:0 0.2rem;}
.rsvp-submit{
  display:block;width:100%;margin-top:1.8rem;
  background:var(--berry);border:none;
  color:var(--offwhite);font-family:var(--serif);
  font-size:0.78rem;letter-spacing:0.12em;text-transform:uppercase;
  padding:0.85rem;cursor:pointer;border-radius:999px;transition:opacity 0.2s;
}
.rsvp-submit:hover{opacity:0.88;}
.rsvp-submit:disabled{opacity:0.4;cursor:not-allowed;}
.rsvp-success{
  display:none;margin-top:2rem;
  font-family:var(--script);font-size:2rem;color:var(--offwhite);
}

/* ── STORY — offwhite bg ─────────────────────────────────────── */
.story-section{background:var(--gold);padding:4rem 2rem;}
.story-inner{max-width:560px;margin:0 auto;text-align:center;}
.story-inner .section-title-script{color:#673d45 !important;}
.story-inner .section-rule-gold{background:rgba(103,61,69,0.4) !important;}
.story-inner .section-body-serif{color:#673d45 !important;}

/* ── FOOTER ──────────────────────────────────────────────────── */
.footer{background:var(--berry);text-align:center;padding:2.5rem 1rem;}
.footer-couple{font-family:var(--script);font-size:2rem;color:var(--offwhite);display:block;margin-bottom:0.4rem;}
.footer-tagline{font-family:var(--serif);font-size:0.7rem;letter-spacing:0.14em;text-transform:uppercase;color:rgba(242,236,231,0.5);}

/* ── RESPONSIVE ──────────────────────────────────────────────── */
@media(max-width:640px){
  .wedding-grid{grid-template-columns:1fr;gap:1rem;}
  .wedding-flower-sep{width:80px;margin:0 auto;}
  .hero-initial-left,.hero-initial-right{font-size:clamp(5rem,18vw,8rem);}
  .hero-initial-amp{font-size:clamp(2.5rem,9vw,4rem);}
  .gallery-grid{grid-template-columns:1fr 1fr;}
  .rsvp-field-row{grid-template-columns:1fr;}
}

/* ── THUMBNAIL MODE (iframe preview in editor) ──────────── */
body.thumbnail-mode .hero{height:66.67vw!important;min-height:0!important;}
body.thumbnail-mode .hero-carousel{height:66.67vw!important;min-height:0!important;}
</style>
</head>
<body class="hydrating">

<!-- MENU OVERLAY -->
<div class="menu-overlay" id="menuOverlay">
  <div class="menu-backdrop" onclick="closeMenu()"></div>
  <div class="menu-drawer">
    <button class="menu-close" onclick="closeMenu()">×</button>
    <div class="menu-title">Menu</div>
    <ul class="menu-links" id="menuLinks">
      <li><a href="#hero"           onclick="handleMenuClick(this)">Home</a></li>
      <li><a href="#story"          onclick="handleMenuClick(this)">Our Story</a></li>
      <li><a href="#wedding"        onclick="handleMenuClick(this)">The Wedding</a></li>
      <li><a href="#events"         onclick="handleMenuClick(this)">Other Events</a></li>
      <li><a href="#accommodations" onclick="handleMenuClick(this)">Accommodations</a></li>
      <li><a href="#travel"         onclick="handleMenuClick(this)">Travel</a></li>
      <li><a href="#ntk"            onclick="handleMenuClick(this)">Need to Know</a></li>
      <li><a href="#gallery"        onclick="handleMenuClick(this)">Gallery</a></li>
      <li><a href="#registry"       onclick="handleMenuClick(this)">Registry</a></li>
      <li><a href="#rsvp"           onclick="handleMenuClick(this)">RSVP</a></li>
    </ul>
  </div>
</div>

<!-- NAV -->
<nav class="nav">
  <button class="nav-hamburger" onclick="openMenu()" aria-label="Open menu">
    <span></span><span></span><span></span>
  </button>
</nav>

<!-- HERO -->
<section class="hero" id="hero">
  <div class="hero-carousel" id="heroCarousel">
    <div class="hero-slide">
      <img src="https://assets.softr-files.com/applications/98da9671-14f5-418f-b98a-6f8fb833401f/assets/a9bef259-3a3f-45b4-83fb-bfaa434bcdba.png" alt="Couple">
    </div>
  </div>
  <button class="carousel-arrow prev" id="carouselPrev" onclick="shiftCarousel(-1)" style="display:none">&#8592;</button>
  <button class="carousel-arrow next" id="carouselNext" onclick="shiftCarousel(1)"  style="display:none">&#8594;</button>
  <div class="carousel-dots" id="carouselDots"></div>
  <!-- Initials bottom-left, large gold, two letters with & between -->
  <div class="hero-initials-wrap" id="heroInitialsWrap">
    <span class="hero-initial-left"  id="heroInitL">T</span><span class="hero-initial-amp">&amp;</span><span class="hero-initial-right" id="heroInitR">L</span>
  </div>
</section>

<!-- OUR STORY -->
<section class="story-section" id="story" style="display:none">
  <div class="story-inner">
    <div class="section-title-script">Our Story</div>
    <div class="section-rule-gold"></div>
    <div class="section-body-serif" id="storyText"></div>
  </div>
</section>

<!-- THE WEDDING — offwhite, NO section title, two cards + flower -->
<section class="wedding-section" id="wedding" style="display:none">
  <div class="wedding-grid" id="weddingGrid">
    <!-- injected by JS -->
  </div>
</section>

<!-- OTHER EVENTS — berry bg, centred white text -->
<section class="events-section" id="events" style="display:none">
  <div id="otherEventsList"></div>
</section>

<!-- ACCOMMODATIONS -->
<section class="accommodations-section" id="accommodations" style="display:none">
  <div class="accom-inner" id="accomContent"></div>
</section>

<!-- TRAVEL -->
<section class="travel-section" id="travel" style="display:none">
  <div class="travel-inner">
    <div class="section-title-script">Getting There</div>
    <div class="section-rule-gold"></div>
    <div class="section-body-serif" id="travelText"></div>

<script>

// ── Thumbnail mode detection ──────────────────────────────
(function(){
  if(new URLSearchParams(window.location.search).get('thumbnail')==='1'){
    document.body.classList.add('thumbnail-mode');
  }
})();

const API         = 'https://wedding-recommender.onrender.com';
const _FLOWER_URL = 'https://assets.softr-files.com/applications/98da9671-14f5-418f-b98a-6f8fb833401f/assets/6e27a5bd-5a9d-4e9a-a607-e8a7c4215978.png';
const _DEFAULT_IMG= 'https://assets.softr-files.com/applications/98da9671-14f5-418f-b98a-6f8fb833401f/assets/a9bef259-3a3f-45b4-83fb-bfaa434bcdba.png';

const _params    = new URLSearchParams(window.location.search);
const _slugParam = _params.get('slug') || '';
const _pathParts = window.location.pathname.split('/').filter(p=>p);
const _firstPart = _pathParts[0] || '';
const _liveSlug  = _slugParam || (_firstPart !== 'template-loveletter.html' ? _firstPart : '');
const _isPreview = !_liveSlug;
const _pwdParam  = _params.get('pwd') || '';

// ── Menu ──────────────────────────────────────────────────────────────────
function openMenu()  { document.getElementById('menuOverlay').classList.add('open'); }
function closeMenu() { document.getElementById('menuOverlay').classList.remove('open'); }
document.addEventListener('keydown', e => { if (e.key==='Escape') closeMenu(); });
function handleMenuClick(link) {
  closeMenu();
  var href = link.getAttribute('href');
  if (href && href !== '#') {
    setTimeout(function() {
      var el = document.querySelector(href);
      if (el) el.scrollIntoView({behavior:'smooth'});
    }, 350);
  }
  return false;
}

// ── Carousel ──────────────────────────────────────────────────────────────
var _carouselIdx = 0, _carouselUrls = [];

function buildCarousel(urls) {
  _carouselUrls = urls;
  var c = document.getElementById('heroCarousel');
  var d = document.getElementById('carouselDots');
  c.innerHTML = urls.map(function(u){
    return '<div class="hero-slide"><img src="'+u+'" alt="Couple"></div>';
  }).join('');
  d.innerHTML = urls.map(function(_,i){
    return '<button class="carousel-dot'+(i===0?' active':'')+'" onclick="goToSlide('+i+')"></button>';
  }).join('');
  var show = urls.length > 1;
  document.getElementById('carouselPrev').style.display = show ? '' : 'none';
  document.getElementById('carouselNext').style.display = show ? '' : 'none';
}
function goToSlide(idx) {
  _carouselIdx = idx;
  var c = document.getElementById('heroCarousel');
  if (c) c.style.transform = 'translateX(-'+(idx*100)+'%)';
  document.querySelectorAll('.carousel-dot').forEach(function(d,i){ d.classList.toggle('active',i===idx); });
}
function shiftCarousel(dir) {
  goToSlide((_carouselIdx + dir + (_carouselUrls.length||1)) % (_carouselUrls.length||1));
}
setInterval(function(){ if(_carouselUrls.length>1) shiftCarousel(1); }, 5000);

// ── Gallery ────────────────────────────────────────────────────────────────
var _galleryUrls=[], _galleryIdx=0;
function openLightbox(i){_galleryIdx=i;var lb=document.getElementById('galleryLightbox');var img=document.getElementById('galleryLbImg');if(!lb||!img)return;img.src=_galleryUrls[i];document.getElementById('galleryLbCounter').textContent=(i+1)+' / '+_galleryUrls.length;lb.classList.add('open');document.body.style.overflow='hidden';}
function closeLightbox(){document.getElementById('galleryLightbox').classList.remove('open');document.body.style.overflow='';}
function shiftLightbox(dir){_galleryIdx=(_galleryIdx+dir+_galleryUrls.length)%_galleryUrls.length;document.getElementById('galleryLbImg').src=_galleryUrls[_galleryIdx];document.getElementById('galleryLbCounter').textContent=(_galleryIdx+1)+' / '+_galleryUrls.length;}
document.addEventListener('keydown',function(e){if(e.key==='Escape')closeLightbox();if(e.key==='ArrowLeft')shiftLightbox(-1);if(e.key==='ArrowRight')shiftLightbox(1);});
document.addEventListener('click',function(e){var lb=document.getElementById('galleryLightbox');if(lb&&lb.classList.contains('open')&&e.target===lb)closeLightbox();});

// ── RSVP entree options ────────────────────────────────────────────────────
var _rsvpEntreeOptions=[{value:'Chicken',label:'Chicken'},{value:'Fish',label:'Fish'},{value:'Vegetarian',label:'Vegetarian'},{value:'Vegan',label:'Vegan'},{value:'Kids Meal',label:'Kids Meal'}];

// ── HYDRATE ────────────────────────────────────────────────────────────────
function hydrateTemplate(d) {
  window._weddingSlug = d.slug || '';
  var p1 = d.partner_1 || '';
  var p2 = d.partner_2 || '';
  var names = d.couple_names || (p1&&p2 ? p1+' & '+p2 : 'A & B');

  // Nav logo removed

  // Hero initials — first letter of each partner (T & L style)
  var il = document.getElementById('heroInitL');
  var ir = document.getElementById('heroInitR');
  if (il) il.textContent = p1 ? p1.charAt(0).toUpperCase() : 'A';
  if (ir) ir.textContent = p2 ? p2.charAt(0).toUpperCase() : 'B';

  // Date
  var dateStr = '';
  if (d.celebration_date) {
    try {
      var dt = new Date(d.celebration_date+'T00:00:00Z');
      dateStr = dt.toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric',timeZone:'UTC'});
    } catch(ex){ dateStr = d.celebration_date; }
  }
  var fc = document.getElementById('footerCouple');
  var fd = document.getElementById('footerDate');
  if (fc) fc.textContent = names;
  if (fd) fd.textContent = dateStr;

  // RSVP deadline from rsvp_config or celebration_date
  var dl = document.getElementById('rsvpDeadline');
  if (dl) {
    var deadline = (d.rsvp_config && d.rsvp_config.deadline) || '';
    if (deadline) {
      dl.innerHTML = 'by ' + deadline;
    } else if (dateStr) {
      dl.innerHTML = 'by ' + dateStr;
    }
  }

  // Hero images — use user uploads if present, else keep default
  var heroImgs = [];
  if (d.hero_image) heroImgs.push(d.hero_image);
  if (d.gallery_images && d.gallery_images.length) {
    d.gallery_images.forEach(function(g){
      var u = typeof g==='string'?g:(g.url||'');
      if (u && u!==d.hero_image) heroImgs.push(u);
    });
  }
  if (heroImgs.length) buildCarousel(heroImgs);
  // else: default image already in HTML, carousel not built, arrows hidden

  // Custom colours
  if (d.customization) {
    if (d.customization.primary_color) document.documentElement.style.setProperty('--berry', d.customization.primary_color);
    if (d.customization.accent_color)  document.documentElement.style.setProperty('--gold',  d.customization.accent_color);
    if (d.customization.text_color)    document.documentElement.style.setProperty('--text',  d.customization.text_color);
  }
  if (d.custom_css) {
    var ex=document.getElementById('custom-css-override'); if(ex) ex.remove();
    var s=document.createElement('style'); s.id='custom-css-override'; s.textContent=d.custom_css; document.head.appendChild(s);
  }

  if (d.rsvp_config && d.rsvp_config.entrees && d.rsvp_config.entrees.length)
    _rsvpEntreeOptions = d.rsvp_config.entrees.map(function(e){return{value:e,label:e};});

  var menu = d.menu_config || {};

  // Build menu links dynamically
  var ml = document.getElementById('menuLinks');
  if (ml) {
    var items=[
      {href:'#hero',show:true,label:'Home'},
      {href:'#story',show:menu.story,label:'Our Story'},
      {href:'#wedding',show:menu.wedding,label:'The Wedding'},
      {href:'#events',show:menu.other_events,label:'Other Events'},
      {href:'#accommodations',show:menu.accommodations,label:'Accommodations'},
      {href:'#travel',show:menu.travel,label:'Travel'},
      {href:'#ntk',show:menu.things_to_do||menu.faqs,label:'Need to Know'},
      {href:'#gallery',show:menu.gallery,label:'Gallery'},
      {href:'#registry',show:menu.registry,label:'Registry'},
      {href:'#rsvp',show:menu.rsvp,label:'RSVP'},
    ];
    ml.innerHTML=items.filter(function(i){return i.show;}).map(function(i){
      return '<li><a href="'+i.href+'" onclick="handleMenuClick(this)">'+i.label+'</a></li>';
    }).join('');
  }

  // ── Story ────────────────────────────────────────────────────────────
  var stEl=document.getElementById('story');
  if(stEl) stEl.style.display=menu.story?'':'none';
  if(menu.story&&d.story){var st=document.getElementById('storyText');if(st)st.innerHTML=d.story;}

  // ── The Wedding ──────────────────────────────────────────────────────
  var wEl=document.getElementById('wedding');
  if(wEl) wEl.style.display=menu.wedding?'':'none';
  if(menu.wedding){
    var grid=document.getElementById('weddingGrid');
    if(grid&&d.weddings_info){
      grid.innerHTML='';
      var wParts=d.weddings_info
        .replace(/<br\s*\/?>\s*<br\s*\/?>/gi,'||SPLIT||')
        .split('||SPLIT||').map(function(p){return p.trim();}).filter(function(p){return p.length>3;});

      function makeWCard(html) {
        var nm=html.match(/^<strong>([^<]+)<\/strong>/i);
        var title=nm?nm[1]:'';
        var rest=nm?html.replace(nm[0],'').replace(/^<br\s*\/?>\s*/i,'').trim():html;
        var dm=rest.match(/<em>([^<]+)<\/em>\s*$/i);
        var dress=dm?dm[1]:'';
        var detail=dm?rest.replace(dm[0],'').replace(/<br\s*\/?>\s*$/i,'').trim():rest;
        return '<div class="wedding-card">' +
          (title ?'<div class="wedding-card-name">'+title+'</div>':'') +
          (detail?'<div class="wedding-card-detail">'+detail+'</div>':'') +
          (dress ?'<div class="wedding-card-dress">'+dress+'</div>':'') +
        '</div>';
      }

      if(wParts.length>=2){
        grid.innerHTML=
          makeWCard(wParts[0])+
          '<div style="display:flex;align-items:center;justify-content:center">'+
            '<img src="'+_FLOWER_URL+'" class="wedding-flower-sep" alt="">'+
          '</div>'+
          makeWCard(wParts[1]);
      } else if(wParts.length===1){
        grid.style.gridTemplateColumns='1fr';
        grid.innerHTML=makeWCard(wParts[0]);
      }
    }
  }

  // ── Other Events ─────────────────────────────────────────────────────
  var evEl=document.getElementById('events');
  if(evEl) evEl.style.display=menu.other_events?'':'none';
  if(menu.other_events){
    var evList=document.getElementById('otherEventsList');
    if(evList&&d.events_info){
      evList.innerHTML='';
      var evParts=d.events_info
        .replace(/<br\s*\/?>\s*<br\s*\/?>/gi,'||SPLIT||')
        .split('||SPLIT||').map(function(p){return p.trim();}).filter(Boolean);
      if(!evParts.length) evParts=[d.events_info];
      evParts.forEach(function(part){
        var nm=part.match(/^<strong>([^<]+)<\/strong>/i);
        var evName=nm?nm[1]:'';
        var rest=nm?part.replace(nm[0],'').replace(/^<br\s*\/?>\s*/i,'').trim():part;
        var dm=rest.match(/<em>([^<]+)<\/em>\s*$/i);
        var dress=dm?dm[1]:'';
        var detail=dm?rest.replace(dm[0],'').replace(/<br\s*\/?>\s*$/i,'').trim():rest;
        var item=document.createElement('div'); item.className='other-event-item';
        item.innerHTML=
          (evName?'<div class="other-event-name">'+evName+'</div>':'')+
          (detail?'<div class="other-event-detail">'+detail+'</div>':'')+
          (dress ?'<div class="other-event-dress">'+dress+'</div>':'');
        evList.appendChild(item);
      });
    }
  }

  // ── Accommodations ────────────────────────────────────────────────────
  var acEl=document.getElementById('accommodations');
  if(acEl) acEl.style.display=menu.accommodations?'':'none';
  if(menu.accommodations&&d.accommodation_info){
    var acContent=document.getElementById('accomContent');
    if(acContent){
      var nm=d.accommodation_info.match(/^<strong>([^<]+)<\/strong>/i);
      var acName=nm?nm[1]:'';
      var rest=nm?d.accommodation_info.replace(nm[0],'').replace(/^<br\s*\/?>\s*/i,'').trim():d.accommodation_info;
      acContent.innerHTML=
        '<div class="accom-title">'+acName+'</div>'+
        '<div class="accom-rule"></div>'+
        (rest?'<div class="accom-detail">'+rest+'</div>':'')+
        '<a class="accom-btn" href="#" target="_blank">Book Now</a>';
    }
  }

  // ── Travel ────────────────────────────────────────────────────────────
  var trEl=document.getElementById('travel');
  if(trEl) trEl.style.display=menu.travel?'':'none';
  if(menu.travel&&d.travel_info){var tv=document.getElementById('travelText');if(tv)tv.innerHTML=d.travel_info;}

  // ── Need to Knows — fully expanded, no accordion ──────────────────────
  var ntkEl=document.getElementById('ntk');
  var showNTK=menu.things_to_do||menu.faqs;
  if(ntkEl) ntkEl.style.display=showNTK?'':'none';
  if(showNTK&&d.faqs){
    var ntkList=document.getElementById('ntkList');
    if(ntkList){
      ntkList.innerHTML='';
      var blocks=d.faqs.replace(/<br\s*\/?>\s*<br\s*\/?>/gi,'||SPLIT||')
        .split('||SPLIT||').map(function(b){return b.trim();}).filter(Boolean);
      var pairs=blocks.map(function(block){
        var brIdx=block.search(/<br\s*\/?>/i);
        if(brIdx===-1) return{q:block.replace(/<[^>]+>/g,'').trim(),a:''};
        return{q:block.substring(0,brIdx).replace(/<[^>]+>/g,'').trim(),
               a:block.substring(brIdx).replace(/^(<br\s*\/?>)+/i,'').trim()};
      });
      if(!pairs.length) pairs=[{q:'',a:d.faqs}];
      pairs.forEach(function(pair){
        var item=document.createElement('div'); item.className='ntk-item';
        item.innerHTML=
          (pair.q?'<div class="ntk-question">'+pair.q+'</div>':'')+
          (pair.a?'<div class="ntk-answer">'+pair.a+'</div>':'');
        ntkList.appendChild(item);
      });
    }
  }

  // ── Gallery ───────────────────────────────────────────────────────────
  var galEl=document.getElementById('gallery');
  if(galEl) galEl.style.display=menu.gallery?'':'none';
  if(menu.gallery&&d.gallery_images&&d.gallery_images.length){
    _galleryUrls=d.gallery_images.map(function(g){return typeof g==='string'?g:(g.url||'');}).filter(Boolean);
    var gg=document.getElementById('galleryGrid');
    if(gg) gg.innerHTML=_galleryUrls.map(function(u,i){
      return '<div class="gallery-cell" onclick="openLightbox('+i+')"><img src="'+u+'" alt="" loading="lazy"></div>';
    }).join('');
  }

  // ── Registry ──────────────────────────────────────────────────────────
  var regEl=document.getElementById('registry');
  if(regEl) regEl.style.display=menu.registry?'':'none';
  if(menu.registry){
    var rb=document.getElementById('registryBody');
    if(rb&&d.registry_info) rb.innerHTML=d.registry_info;
  }

  // ── RSVP ──────────────────────────────────────────────────────────────
  var rsvpEl=document.getElementById('rsvp');
  if(rsvpEl) rsvpEl.style.display=menu.rsvp?'':'none';
  if(menu.rsvp){
    var evs=(d.events&&d.events.length)
      ?d.events.map(function(ev){return{id:ev.id||ev.name,label:ev.label||ev.name};})
      :[{id:'wedding',label:'The Wedding'}];
    buildRsvpBlocks(evs);
  }
}

// ── RSVP form ─────────────────────────────────────────────────────────────
function buildRsvpBlocks(events) {
  var container=document.getElementById('rsvpBlocks');
  container.innerHTML='';
  var entreeOpts=_rsvpEntreeOptions.map(function(o){return '<option value="'+o.value+'">'+o.label+'</option>';}).join('');
  events.forEach(function(ev){
    var block=document.createElement('div'); block.className='rsvp-event-block'; block.dataset.eventId=ev.id;
    block.innerHTML=
      '<div class="rsvp-name-row">'+
        '<input class="rsvp-name-pill" type="text" placeholder="Enter Your Name" oninput="onNameInput(this)">'+
      '</div>'+
      '<div class="rsvp-expanded" id="expanded-'+ev.id+'">'+
        '<div class="rsvp-field-row">'+
          '<select class="rsvp-select" data-field="attending"><option value="">Attending?</option><option value="yes">Yes</option><option value="no">Cannot make it</option><option value="maybe">Not sure</option></select>'+
          '<select class="rsvp-select" data-field="meal"><option value="">Meal preference</option><option value="Vegetarian">Vegetarian</option><option value="Non Vegetarian">Non-Vegetarian</option><option value="Vegan">Vegan</option><option value="Gluten Free">Gluten-Free</option><option value="Kids Meal">Kids Meal</option></select>'+
        '</div>'+
        '<div class="rsvp-field-row full"><select class="rsvp-select" data-field="entree"><option value="">Entree choice</option>'+entreeOpts+'</select></div>'+
        '<div class="rsvp-field-row full"><input class="rsvp-text-input" type="email" placeholder="Email address" data-field="email"></div>'+
        '<div class="rsvp-field-row full"><textarea class="rsvp-textarea" rows="2" placeholder="Message or dietary notes..." data-field="notes"></textarea></div>'+
        '<div class="rsvp-extra-list" id="extra-guests-'+ev.id+'"></div>'+
        '<button class="rsvp-add-guest" onclick="addExtraGuest(this)">+ Add Plus One</button>'+
      '</div>';
    container.appendChild(block);
  });
  checkShowSubmit();
}
function onNameInput(inp){
  var block=inp.closest('.rsvp-event-block');
  var exp=document.getElementById('expanded-'+block.dataset.eventId);
  if(inp.value.trim().length>=2) exp.classList.add('visible');
  else exp.classList.remove('visible');
  checkShowSubmit();
}
function checkShowSubmit(){
  var any=false;
  document.querySelectorAll('.rsvp-name-pill').forEach(function(i){if(i.value.trim().length>=2)any=true;});
  var btn=document.getElementById('rsvpSubmitBtn');
  if(btn) btn.style.display=any?'block':'none';
}
function addExtraGuest(btn){
  var list=document.getElementById('extra-guests-'+btn.closest('.rsvp-event-block').dataset.eventId);
  if(list.children.length>0) return;
  var mOpts=[{v:'',l:'Meal preference'},{v:'Vegetarian',l:'Vegetarian'},{v:'Non Vegetarian',l:'Non-Vegetarian'},{v:'Vegan',l:'Vegan'},{v:'Kids Meal',l:'Kids Meal'}];
  var eOpts=[{v:'',l:'Entree choice'}].concat(_rsvpEntreeOptions.map(function(o){return{v:o.value,l:o.label};}));
  function mkSel(opts,role){var s=document.createElement('select');s.className='rsvp-select';s.dataset.role=role;opts.forEach(function(o){var op=document.createElement('option');op.value=o.v;op.textContent=o.l;s.appendChild(op);});return s;}
  var row=document.createElement('div'); row.className='extra-guest-row';
  var nr=document.createElement('div'); nr.style.cssText='display:grid;grid-template-columns:1fr auto;gap:0.5rem;align-items:center;margin-bottom:0.5rem';
  var ni=document.createElement('input'); ni.className='rsvp-name-pill'; ni.type='text'; ni.placeholder='Plus one name'; ni.dataset.role='plus-one-name'; ni.style.borderRadius='999px';
  var rb=document.createElement('button'); rb.className='rsvp-remove-btn'; rb.textContent='×'; rb.onclick=function(){row.remove();btn.style.display='';};
  nr.appendChild(ni); nr.appendChild(rb);
  var mr=document.createElement('div'); mr.style.cssText='display:grid;grid-template-columns:1fr 1fr;gap:0.5rem;margin-bottom:0.5rem';
  mr.appendChild(mkSel(mOpts,'plus-one-meal')); mr.appendChild(mkSel(eOpts,'plus-one-entree'));
  row.appendChild(nr); row.appendChild(mr); list.appendChild(row); btn.style.display='none';
}
async function submitRSVP(){
  if(_isPreview){alert('RSVP disabled in preview.');return;}
  var slug=window._weddingSlug||'';
  var btn=document.getElementById('rsvpSubmitBtn');
  btn.disabled=true;btn.textContent='Sending...';
  try{
    var promises=[];
    document.querySelectorAll('.rsvp-event-block').forEach(function(block){
      var name=block.querySelector('.rsvp-name-pill').value.trim(); if(!name) return;
      var eid=block.dataset.eventId;
      var exp=document.getElementById('expanded-'+eid);
      var g=function(f){return(exp&&exp.querySelector('[data-field="'+f+'"]'))||{};};
      var label=block.querySelector('.rsvp-event-label')?block.querySelector('.rsvp-event-label').textContent:'Wedding';
      promises.push(fetch(API+'/rsvp',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({slug:slug,guest_name:name,attending:g('attending').value||'yes',
          meal_preference:g('meal').value||'',entree_choice:g('entree').value||'',
          email:g('email').value||'',message:g('notes').value||'',event_name:label})}));
      var por=exp&&exp.querySelector('.extra-guest-row');
      if(por){var pn=(por.querySelector('[data-role="plus-one-name"]')||{}).value||'';
        if(pn.trim())promises.push(fetch(API+'/rsvp',{method:'POST',headers:{'Content-Type':'application/json'},
          body:JSON.stringify({slug:slug,guest_name:pn.trim(),attending:g('attending').value||'yes',
            meal_preference:(por.querySelector('[data-role="plus-one-meal"]')||{}).value||'',
            entree_choice:(por.querySelector('[data-role="plus-one-entree"]')||{}).value||'',event_name:label})}));}
    });
    await Promise.all(promises);
    document.getElementById('rsvpSuccess').style.display='block'; btn.style.display='none';
  }catch(e){alert('Something went wrong. Please try again.'); btn.disabled=false; btn.textContent='Send My Reply';}
}

function _reveal(){document.body.classList.remove('hydrating');}

if(_isPreview){
  _reveal();
  var _got=false;
  window.addEventListener('message',function(e){if(e.data&&e.data.type==='HYDRATE_TEMPLATE'){_got=true;hydrateTemplate(e.data.payload);}});
  setTimeout(function(){if(!_got)hydrateTemplate(SAMPLE_DATA);},800);
}else{
  const _sk='weddingData_'+_liveSlug, _sd=sessionStorage.getItem(_sk);
  if(_sd){
    try{const d=JSON.parse(_sd);sessionStorage.removeItem(_sk);hydrateTemplate(d);_reveal();
      if(window.location.search.includes('slug='))window.history.replaceState({},d.couple_names||'','/'+_liveSlug);
    }catch{sessionStorage.removeItem(_sk);_reveal();_fetch();}
  }else{
    document.body.innerHTML='<style>@keyframes sp{100%{transform:rotate(360deg)}}</style><div style="display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:20px;background:#f2ece7"><div style="width:36px;height:36px;border:2px solid #afab57;border-top-color:transparent;border-radius:50%;animation:sp 0.9s linear infinite"></div><p style="font-family:\'Lancelot\',serif;color:#673d45;font-size:1.1rem;letter-spacing:0.1em">Your celebration awaits</p></div>';
    _reveal();_fetch();
  }
  function _fetch(){
    fetch(API+'/wedding-site/'+encodeURIComponent(_liveSlug)+(_pwdParam?'?password='+encodeURIComponent(_pwdParam):''))
      .then(function(r){if(!r.ok)throw r.status;return r.json();})
      .then(function(d){if(d.password_required){document.body.innerHTML='<div style="display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:Lancelot,serif;color:#673d45;background:#f2ece7"><p>Password protected.</p></div>';return;}hydrateTemplate(d);})
      .catch(function(){document.body.innerHTML='<div style="display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:Lancelot,serif;color:#673d45;background:#f2ece7"><p>Site not found.</p></div>';});
  }
}
