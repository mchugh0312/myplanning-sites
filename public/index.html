<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loading...</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#f9f7f5;font-family:'Instrument Serif',serif}
.loading{display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:1rem}
.spinner{border:2px solid #e0ddd5;border-top:2px solid #8d8863;border-radius:50%;width:32px;height:32px;animation:spin 0.9s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:0.85rem;color:#8d8863;letter-spacing:0.08em}
</style>
</head>
<body>
<div class="loading" id="loadingScreen">
  <div class="spinner"></div>
  <div class="loading-text">Loading your celebration...</div>
</div>
<script>
const API = 'https://wedding-recommender.onrender.com';

// Map template label → template file path on Vercel
// Add new templates here as you build them
const TEMPLATE_MAP = {
  'romantic':   '/template-romantic.html',
  'elegant':    '/template-romantic.html',
  'classic':    '/template-romantic.html',
  'modern':     '/template-romantic.html',
  'minimalist': '/template-romantic.html',
  'rustic':     '/template-romantic.html',
};
const DEFAULT_TEMPLATE = '/template-romantic.html';

// Parse slug from path: weddings.myplanning.ai/sarah-and-john
const path = window.location.pathname.split('/').filter(p => p);
const slug  = path[0] || '';

function showScreen(icon, title, sub) {
  document.getElementById('loadingScreen').outerHTML = `
    <div class="loading" style="flex-direction:column;gap:0.75rem;text-align:center;padding:2rem">
      <div style="font-size:2.5rem">${icon}</div>
      <div style="font-size:1.1rem;color:#040505">${title}</div>
      <div style="font-size:0.85rem;color:#8d8863">${sub}</div>
    </div>`;
}

function showPasswordScreen(templateUrl) {
  document.getElementById('loadingScreen').outerHTML = `
    <div class="loading" id="pwScreen" style="flex-direction:column;gap:0.75rem;text-align:center;padding:2rem">
      <div style="font-size:2.5rem">🔒</div>
      <div style="font-size:1.1rem;color:#040505">Password Protected</div>
      <div style="font-size:0.85rem;color:#8d8863;margin-bottom:0.5rem">This celebration website is private.</div>
      <input id="pwInput" type="password" placeholder="Enter password"
        style="padding:0.75rem 1rem;border:1px solid #c8c5b8;border-radius:3px;font-size:0.9rem;width:280px;outline:none;text-align:center;background:#fff">
      <button id="pwBtn"
        style="padding:0.75rem 2rem;background:#8d8863;color:#fff;border:none;border-radius:999px;font-size:0.85rem;letter-spacing:0.08em;cursor:pointer;width:280px">
        Enter
      </button>
      <div id="pwError" style="color:#c0392b;font-size:0.8rem;display:none">Incorrect password. Please try again.</div>
    </div>`;
  document.getElementById('pwInput').focus();
  const tryPwd = async () => {
    const pwd = document.getElementById('pwInput').value.trim();
    const btn = document.getElementById('pwBtn');
    const err = document.getElementById('pwError');
    if (!pwd) return;
    btn.disabled = true; btn.textContent = 'Checking...'; err.style.display = 'none';
    const url = `${API}/wedding-site/${encodeURIComponent(slug)}?password=${encodeURIComponent(pwd)}`;
    try {
      const res  = await fetch(url);
      const data = await res.json();
      if (data.password_required) {
        err.style.display = 'block'; btn.disabled = false; btn.textContent = 'Enter';
        return;
      }
      // Password correct — load template inline
      const tmpl = TEMPLATE_MAP[data.template?.toLowerCase()] || DEFAULT_TEMPLATE;
      await loadTemplate(tmpl, data);
    } catch {
      err.style.display = 'block'; btn.disabled = false; btn.textContent = 'Enter';
    }
  };
  document.getElementById('pwInput').onkeypress = e => { if (e.key === 'Enter') tryPwd(); };
  document.getElementById('pwBtn').onclick = tryPwd;
}

async function loadTemplate(templateUrl, weddingData) {
  try {
    const res  = await fetch(templateUrl);
    const html = await res.text();

    // Parse and inject the template
    const parser  = new DOMParser();
    const doc     = parser.parseFromString(html, 'text/html');

    // Copy styles
    document.head.innerHTML = doc.head.innerHTML;

    // Copy body content
    document.body.innerHTML = doc.body.innerHTML;

    // Re-execute scripts (innerHTML doesn't run them)
    const scripts = doc.body.querySelectorAll('script');
    for (const oldScript of scripts) {
      const newScript = document.createElement('script');
      if (oldScript.src) {
        newScript.src = oldScript.src;
        await new Promise(r => { newScript.onload = r; newScript.onerror = r; });
      } else {
        newScript.textContent = oldScript.textContent;
      }
      document.body.appendChild(newScript);
    }

    // Wait a tick then hydrate with real data
    await new Promise(r => setTimeout(r, 100));
    if (typeof hydrateTemplate === 'function') {
      hydrateTemplate(weddingData);
    } else {
      // Signal via postMessage as fallback
      window.dispatchEvent(new MessageEvent('message', {
        data: { type: 'HYDRATE_TEMPLATE', payload: weddingData }
      }));
    }
  } catch(e) {
    console.error('Template load error:', e);
    showScreen('⚠️', 'Something went wrong', 'Please refresh and try again.');
  }
}

async function main() {
  if (!slug) {
    showScreen('🎊', 'Welcome to MyPlanning.ai', 'Enter a celebration URL to get started.');
    return;
  }

  try {
    const res = await fetch(`${API}/wedding-site/${encodeURIComponent(slug)}`);

    if (res.status === 404) { showScreen('🔍', 'Page not found', 'Check the URL and try again.'); return; }
    if (res.status === 403) { showScreen('🔜', 'Coming soon', 'This website isn\'t published yet.'); return; }
    if (!res.ok)            { showScreen('⚠️', 'Something went wrong', 'Please refresh and try again.'); return; }

    const data = await res.json();

    if (data.password_required) {
      // Show password screen; on success it will redirect
      const tmpl = TEMPLATE_MAP[data.template?.toLowerCase()] || DEFAULT_TEMPLATE;
      showPasswordScreen(tmpl);
      return;
    }

    // Load the template HTML into this page while keeping the original URL clean.
    // We fetch the template HTML, inject it, and run its scripts — exactly like
    // a SPA router. The URL stays as weddings.myplanning.ai/sarah-and-john.
    const templateFile = TEMPLATE_MAP[data.template?.toLowerCase()] || DEFAULT_TEMPLATE;
    await loadTemplate(templateFile, data);

  } catch {
    showScreen('⚠️', 'Something went wrong', 'Please refresh and try again.');
  }
}

main();
</script>
</body>
</html>
