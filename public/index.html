<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loading...</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#f9f7f5;font-family:'Instrument Serif',serif}

.loading-screen{
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;flex-direction:column;
  background:#f9f7f5;position:relative;overflow:hidden;
}

/* Subtle petal scatter background */
.loading-screen::before{
  content:'';position:absolute;inset:0;
  background-image:
    radial-gradient(ellipse 60% 40% at 20% 80%, rgba(169,189,196,0.12) 0%, transparent 60%),
    radial-gradient(ellipse 40% 60% at 80% 20%, rgba(141,136,99,0.08) 0%, transparent 60%);
}

.loading-inner{
  position:relative;z-index:1;
  display:flex;flex-direction:column;align-items:center;gap:28px;
}

/* Flower spinner — uses the actual flower image, spins gently */
.flower-spinner{
  position:relative;width:72px;height:72px;
}
.flower-spinner img{
  width:100%;height:100%;object-fit:contain;
  animation:petalSpin 3s cubic-bezier(0.45,0.05,0.55,0.95) infinite;
  transform-origin:center;
  filter:drop-shadow(0 4px 12px rgba(141,136,99,0.25));
}
@keyframes petalSpin{
  0%   {transform:rotate(0deg)   scale(1)}
  25%  {transform:rotate(90deg)  scale(1.06)}
  50%  {transform:rotate(180deg) scale(1)}
  75%  {transform:rotate(270deg) scale(1.06)}
  100% {transform:rotate(360deg) scale(1)}
}

/* Floating petals */
.petal{
  position:absolute;width:16px;height:16px;
  animation:floatPetal 4s ease-in-out infinite;
  opacity:0;
}
.petal img{width:100%;height:100%;object-fit:contain;opacity:0.35;}
.petal:nth-child(1){top:-30px;left:-40px;animation-delay:0s;animation-duration:3.8s;}
.petal:nth-child(2){top:-20px;right:-45px;animation-delay:1.2s;animation-duration:4.2s;}
.petal:nth-child(3){bottom:-35px;left:-35px;animation-delay:0.7s;animation-duration:3.5s;}
.petal:nth-child(4){bottom:-25px;right:-40px;animation-delay:2s;animation-duration:4.5s;}
@keyframes floatPetal{
  0%  {opacity:0;transform:translateY(0) rotate(0deg) scale(0.8)}
  30% {opacity:1}
  70% {opacity:0.6}
  100%{opacity:0;transform:translateY(-18px) rotate(45deg) scale(1.1)}
}

.loading-title{
  font-family:'Instrument Serif',serif;
  font-size:1.5rem;color:#8d8863;
  font-weight:400;letter-spacing:0.02em;
  font-style:italic;
}
.loading-sub{
  font-family:'Instrument Serif',serif;
  font-size:0.82rem;color:#b5ad9a;
  letter-spacing:0.1em;margin-top:-16px;
}

/* Thin olive progress line */
.loading-line{
  width:120px;height:1px;background:#e8e4dc;
  position:relative;overflow:hidden;
  border-radius:999px;
}
.loading-line::after{
  content:'';position:absolute;left:-100%;top:0;
  width:100%;height:100%;background:#8d8863;
  animation:lineSlide 1.8s ease-in-out infinite;
  border-radius:999px;
}
@keyframes lineSlide{
  0%  {left:-100%}
  50% {left:0%}
  100%{left:100%}
}
</style>
</head>
<body>
<div class="loading-screen" id="loadingScreen">
  <div class="loading-inner">

    <!-- Spinning flower with floating petals around it -->
    <div class="flower-spinner" style="position:relative">
      <!-- Floating mini petals -->
      <div class="petal"><img src="https://assets.softr-files.com/applications/98da9671-14f5-418f-b98a-6f8fb833401f/assets/d739d2eb-f460-4984-89fb-35511ea20510.png" alt=""></div>
      <div class="petal"><img src="https://assets.softr-files.com/applications/98da9671-14f5-418f-b98a-6f8fb833401f/assets/d739d2eb-f460-4984-89fb-35511ea20510.png" alt=""></div>
      <div class="petal"><img src="https://assets.softr-files.com/applications/98da9671-14f5-418f-b98a-6f8fb833401f/assets/d739d2eb-f460-4984-89fb-35511ea20510.png" alt=""></div>
      <div class="petal"><img src="https://assets.softr-files.com/applications/98da9671-14f5-418f-b98a-6f8fb833401f/assets/d739d2eb-f460-4984-89fb-35511ea20510.png" alt=""></div>
      <!-- Main spinning flower -->
      <img src="https://assets.softr-files.com/applications/98da9671-14f5-418f-b98a-6f8fb833401f/assets/d739d2eb-f460-4984-89fb-35511ea20510.png" alt="">
    </div>

    <div class="loading-title">Your celebration awaits</div>
    <div class="loading-line"></div>
    <div class="loading-sub">Loading...</div>

  </div>
</div>
<script>
const API = 'https://wedding-recommender.onrender.com';

// Map template label → template file path on Vercel
// Add new templates here as you build them
const TEMPLATE_MAP = {
  'romantic':   '/template-romantic.html',
  'elegant':    '/template-romantic.html',
  'classic':    '/template-romantic.html',
  'modern':     '/template-romantic.html',
  'minimalist': '/template-romantic.html',
  'rustic':     '/template-romantic.html',
};
const DEFAULT_TEMPLATE = '/template-romantic.html';

// Parse slug from path: weddings.myplanning.ai/sarah-and-john
const path = window.location.pathname.split('/').filter(p => p);
const slug  = path[0] || '';

function showScreen(icon, title, sub) {
  document.getElementById('loadingScreen').outerHTML = `
    <div class="loading" style="flex-direction:column;gap:0.75rem;text-align:center;padding:2rem">
      <div style="font-size:2.5rem">${icon}</div>
      <div style="font-size:1.1rem;color:#040505">${title}</div>
      <div style="font-size:0.85rem;color:#8d8863">${sub}</div>
    </div>`;
}

function showPasswordScreen(templateUrl) {
  document.getElementById('loadingScreen').outerHTML = `
    <div id="pwScreen" style="
      display:flex;align-items:center;justify-content:center;
      min-height:100vh;flex-direction:column;gap:24px;
      background:#f9f7f5;font-family:'Instrument Serif',serif;padding:2rem;
      background-image:radial-gradient(ellipse 60% 40% at 20% 80%,rgba(169,189,196,0.12) 0%,transparent 60%),
        radial-gradient(ellipse 40% 60% at 80% 20%,rgba(141,136,99,0.08) 0%,transparent 60%)">
      <img src="https://assets.softr-files.com/applications/98da9671-14f5-418f-b98a-6f8fb833401f/assets/d739d2eb-f460-4984-89fb-35511ea20510.png" style="width:56px;height:56px;object-fit:contain;opacity:0.55">
      <div style="text-align:center">
        <p style="font-size:1.8rem;color:#8d8863;font-style:italic;margin-bottom:6px">A private celebration</p>
        <p style="font-size:0.85rem;color:#b5ad9a;letter-spacing:0.06em">Enter the password to continue</p>
      </div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:12px;width:100%;max-width:300px">
        <input id="pwInput" type="password" placeholder="Password"
          style="width:100%;padding:12px 20px;border:1px solid #d4cfc4;border-radius:999px;
            font-size:0.95rem;font-family:'Instrument Serif',serif;font-style:italic;
            outline:none;text-align:center;background:#fff;color:#040505;
            letter-spacing:0.05em">
        <button id="pwBtn"
          style="width:100%;padding:12px 20px;background:#8d8863;color:#fff;
            border:none;border-radius:999px;font-size:0.85rem;
            font-family:'Instrument Serif',serif;letter-spacing:0.1em;
            cursor:pointer">
          Enter
        </button>
        <div id="pwError" style="color:#c0392b;font-size:0.82rem;
          font-family:'Instrument Serif',serif;font-style:italic;display:none">
          Incorrect password — please try again.
        </div>
      </div>
    </div>`;
  document.getElementById('pwInput').focus();
  const tryPwd = async () => {
    const pwd = document.getElementById('pwInput').value.trim();
    const btn = document.getElementById('pwBtn');
    const err = document.getElementById('pwError');
    if (!pwd) return;
    btn.disabled = true; btn.textContent = 'Checking...'; err.style.display = 'none';
    const url = `${API}/wedding-site/${encodeURIComponent(slug)}?password=${encodeURIComponent(pwd)}`;
    try {
      const res  = await fetch(url);
      const data = await res.json();
      if (data.password_required) {
        err.style.display = 'block'; btn.disabled = false; btn.textContent = 'Enter';
        return;
      }
      // Password correct — store data and redirect
      const tmpl = TEMPLATE_MAP[data.template?.toLowerCase()] || DEFAULT_TEMPLATE;
      sessionStorage.setItem('weddingData_' + slug, JSON.stringify(data));
      window.location.replace(tmpl + '?slug=' + encodeURIComponent(slug));
    } catch {
      err.style.display = 'block'; btn.disabled = false; btn.textContent = 'Enter';
    }
  };
  document.getElementById('pwInput').onkeypress = e => { if (e.key === 'Enter') tryPwd(); };
  document.getElementById('pwBtn').onclick = tryPwd;
}

async function main() {
  if (!slug) {
    showScreen('🎊', 'Welcome to MyPlanning.ai', 'Enter a celebration URL to get started.');
    return;
  }

  try {
    const res = await fetch(`${API}/wedding-site/${encodeURIComponent(slug)}`);

    if (res.status === 404) { showScreen('🔍', 'Page not found', 'Check the URL and try again.'); return; }
    if (res.status === 403) {
      // 403 means Draft or Unpublished — show themed coming soon
      showScreen('Coming Soon', 'This celebration is not yet published.');
      return;
    }
    if (!res.ok)            { showScreen('⚠️', 'Something went wrong', 'Please refresh and try again.'); return; }

    const data = await res.json();

    if (data.password_required) {
      // Show password screen; on success it will redirect
      const tmpl = TEMPLATE_MAP[data.template?.toLowerCase()] || DEFAULT_TEMPLATE;
      showPasswordScreen(tmpl);
      return;
    }

    // Store the real data in sessionStorage so the template can read it
    // without needing a query param. Then redirect to template.
    // The template checks sessionStorage first, before falling back to SAMPLE_DATA.
    const templateFile = TEMPLATE_MAP[data.template?.toLowerCase()] || DEFAULT_TEMPLATE;
    sessionStorage.setItem('weddingData_' + slug, JSON.stringify(data));
    window.location.replace(templateFile + '?slug=' + encodeURIComponent(slug));

  } catch {
    showScreen('⚠️', 'Something went wrong', 'Please refresh and try again.');
  }
}

main();
</script>
</body>
</html>
