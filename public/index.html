<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loading...</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#f9f7f5;font-family:'Instrument Serif',serif}
.loading{display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:1rem}
.spinner{border:2px solid #e0ddd5;border-top:2px solid #8d8863;border-radius:50%;width:32px;height:32px;animation:spin 0.9s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:0.85rem;color:#8d8863;letter-spacing:0.08em}
</style>
</head>
<body>
<div class="loading" id="loadingScreen">
  <div class="spinner"></div>
  <div class="loading-text">Loading your celebration...</div>
</div>
<script>
const API = 'https://wedding-recommender.onrender.com';
const path = window.location.pathname.split('/').filter(p => p);
const slug = path[0] || '';

// Map Softr template select label → template file in /public/
const TEMPLATE_MAP = {
  'romantic':   '/template-romantic.html',
  'elegant':    '/template-romantic.html',
  'classic':    '/template-romantic.html',
  'modern':     '/template-romantic.html',
  'minimalist': '/template-romantic.html',
  'rustic':     '/template-romantic.html',
};
const DEFAULT_TEMPLATE = '/template-romantic.html';

function showError(title, sub) {
  document.body.innerHTML = `
    <div class="loading" style="flex-direction:column;gap:0.75rem;text-align:center;padding:2rem">
      <div style="font-size:2.5rem">🔍</div>
      <div style="font-size:1.1rem;color:#040505">${title}</div>
      <div style="font-size:0.85rem;color:#8d8863">${sub}</div>
    </div>`;
}

function showPasswordScreen(onSuccess) {
  document.body.innerHTML = `
    <div class="loading" style="flex-direction:column;gap:0.75rem;text-align:center;padding:2rem">
      <div style="font-size:2.5rem">🔒</div>
      <div style="font-size:1.1rem;color:#040505">Password Protected</div>
      <div style="font-size:0.85rem;color:#8d8863;margin-bottom:0.5rem">This celebration website is private.</div>
      <input id="pwInput" type="password" placeholder="Enter password"
        style="padding:0.75rem 1rem;border:1px solid #c8c5b8;border-radius:3px;font-size:0.9rem;width:280px;outline:none;text-align:center;background:#fff">
      <button id="pwBtn"
        style="padding:0.75rem 2rem;background:#8d8863;color:#fff;border:none;border-radius:3px;font-size:0.85rem;letter-spacing:0.08em;cursor:pointer;width:280px">
        Enter
      </button>
      <div id="pwError" style="color:#c0392b;font-size:0.8rem;display:none">Incorrect password.</div>
    </div>`;
  document.getElementById('pwInput').focus();
  document.getElementById('pwInput').onkeypress = e => { if(e.key==='Enter') tryPwd(); };
  document.getElementById('pwBtn').onclick = tryPwd;
  async function tryPwd() {
    const pwd = document.getElementById('pwInput').value;
    const btn = document.getElementById('pwBtn');
    const err = document.getElementById('pwError');
    if (!pwd) return;
    btn.disabled = true; btn.textContent = 'Checking...'; err.style.display = 'none';
    try {
      const data = await apiFetch(pwd);
      if (data.password_required) { err.style.display='block'; btn.disabled=false; btn.textContent='Enter'; return; }
      onSuccess(data);
    } catch(e) { err.style.display='block'; btn.disabled=false; btn.textContent='Enter'; }
  }
}

async function apiFetch(password) {
  const url = `${API}/wedding-site/${encodeURIComponent(slug)}${password?'?password='+encodeURIComponent(password):''}`;
  const res  = await fetch(url);
  if (res.status===404) throw new Error('not_found');
  if (res.status===403) throw new Error('not_published');
  if (!res.ok)          throw new Error('server_error');
  return res.json();
}

async function injectTemplate(templateUrl, weddingData) {
  const res  = await fetch(templateUrl);
  const html = await res.text();
  const parser = new DOMParser();
  const doc    = parser.parseFromString(html, 'text/html');
  document.documentElement.innerHTML = doc.documentElement.innerHTML;
  // Re-execute scripts
  document.querySelectorAll('script').forEach(old => {
    const s = document.createElement('script');
    old.src ? (s.src = old.src) : (s.textContent = old.textContent);
    old.parentNode.replaceChild(s, old);
  });
  if (typeof hydrateTemplate === 'function') hydrateTemplate(weddingData);
  document.title = weddingData.couple_names || 'Our Wedding';
}

async function main() {
  if (!slug) { showError('Welcome to MyPlanning.ai', 'Enter a celebration URL to get started.'); return; }
  try {
    const data = await apiFetch(null);
    if (data.password_required) {
      showPasswordScreen(d => injectTemplate(TEMPLATE_MAP[d.template]||DEFAULT_TEMPLATE, d));
      return;
    }
    await injectTemplate(TEMPLATE_MAP[data.template]||DEFAULT_TEMPLATE, data);
  } catch(e) {
    if      (e.message==='not_found')     showError('Page not found','Check the URL and try again.');
    else if (e.message==='not_published') showError('Coming soon','This website isn\'t published yet.');
    else                                  showError('Something went wrong','Please refresh and try again.');
  }
}
main();
</script>
</body>
</html>
