<link rel="icon" type="image/png" sizes="16x16" href="https://weddings.myplanning.ai/favicon-16x16.png">

<style>
@font-face{font-family:'Holiday';src:url('/fonts/HOLIDAYScript.woff2') format('woff2'),url('/fonts/HOLIDAYScript.woff') format('woff');font-weight:normal;font-style:normal;}

:root{
  --blue:    #d7dde4;
  --dark:    #32344b;
  --white:   #ffffff;
  --script:  'Holiday','Parfumerie Script',cursive;
  --serif:   'EB Garamond','Garamond',Georgia,serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:var(--serif);color:var(--dark);background:var(--white);}
body.hydrating{visibility:hidden;}
img{display:block;max-width:100%;}

/* ── THUMBNAIL MODE ──────────────────────────────────────────── */
body.thumbnail-mode .hero-section{
  height:66.67vw!important;min-height:0!important;
  display:block!important;
  /* Composite all 3 images as a single horizontal background strip */
  background-image:
    url('https://assets.softr-files.com/applications/98da9671-14f5-418f-b98a-6f8fb833401f/assets/2d42c296-b268-4811-870c-0fd04f5cd929.png'),
    url('https://assets.softr-files.com/applications/98da9671-14f5-418f-b98a-6f8fb833401f/assets/89d6c221-6968-4779-ba69-a28ce2592e5e.png'),
    url('https://assets.softr-files.com/applications/98da9671-14f5-418f-b98a-6f8fb833401f/assets/3617ec8d-4bb0-4eea-91ee-ae1ef7ab1002.png')!important;
  background-size:33.33% 100%, 33.33% 100%, 33.33% 100%!important;
  background-position:0% center, 50% center, 100% center!important;
  background-repeat:no-repeat, no-repeat, no-repeat!important;
  position:relative!important;
}
body.thumbnail-mode .hero-col,
body.thumbnail-mode .hero-col-centre{display:none!important;}
body.thumbnail-mode .hero-section::before,
body.thumbnail-mode .hero-section::after{display:none!important;}
body.thumbnail-mode .hero-names{
  display:flex!important;position:absolute!important;
  bottom:20%!important;left:50%!important;
  transform:translateX(-50%)!important;
  width:auto!important;
}
body.thumbnail-mode .hero-names-text{
  font-size:clamp(0.5rem,3.5vw,0.9rem)!important;
  white-space:nowrap!important;
  text-shadow:0 1px 4px rgba(0,0,0,0.4)!important;
}

/* ── NAV ──────────────────────────────────────────────────────── */
.nav{position:fixed;top:0;right:0;z-index:500;padding:1rem 1.5rem;}
.nav-btn{background:none;border:none;cursor:pointer;font-size:1.3rem;color:var(--white);opacity:0.8;text-shadow:0 1px 4px rgba(0,0,0,0.3);}

/* ── MENU ─────────────────────────────────────────────────────── */
.menu-overlay{position:fixed;inset:0;z-index:1000;display:flex;pointer-events:none;}
.menu-backdrop{flex:1;background:rgba(0,0,0,0);transition:background 0.4s;pointer-events:none;}
.menu-drawer{width:280px;background:var(--dark);transform:translateX(100%);transition:transform 0.45s cubic-bezier(0.77,0,0.175,1);display:flex;flex-direction:column;justify-content:center;padding:3rem 2.5rem;pointer-events:auto;position:relative;}
.menu-overlay.open .menu-backdrop{background:rgba(0,0,0,0.4);pointer-events:auto;}
.menu-overlay.open .menu-drawer{transform:translateX(0);}
.menu-close{position:absolute;top:1rem;right:1.2rem;background:none;border:none;cursor:pointer;font-size:1.4rem;color:rgba(255,255,255,0.6);}
.menu-close:hover{color:var(--white);}
.menu-name{font-family:var(--script);font-size:1.8rem;color:var(--white);margin-bottom:2rem;}
.menu-links{list-style:none;display:flex;flex-direction:column;gap:1.1rem;}
.menu-links a{font-family:var(--serif);font-size:0.78rem;letter-spacing:0.1em;text-transform:uppercase;color:rgba(255,255,255,0.7);text-decoration:none;transition:color 0.2s;}
.menu-links a:hover{color:var(--white);}

/* ── HERO — 3-column split ────────────────────────────────────── */
.hero-section{
  height:100vh;min-height:500px;
  display:grid;grid-template-columns:1fr 0.55fr 1fr;
  position:relative;overflow:hidden;
}
.hero-col{position:relative;overflow:hidden;}
.hero-col-centre{position:relative;display:flex;align-items:center;justify-content:center;}
.hero-section::before{content:'';position:absolute;top:0;bottom:0;left:calc(100% / 2.55);width:1px;background:rgba(255,255,255,0.35);z-index:1;}
.hero-section::after{content:'';position:absolute;top:0;bottom:0;left:calc(100% - 100% / 2.55);width:1px;background:rgba(255,255,255,0.35);z-index:1;}
.hero-names{
  /* Positioned against .hero-section (not heroCol2), so width:100% spans
     the full collage and the script names cross the seams as designed. */
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:100%;
  text-align:center;
  pointer-events:none;
  z-index:2;
  padding:0 1rem;
}
.hero-names-text{
  font-family:var(--script);
  font-size:clamp(2.2rem,5.5vw,4.2rem);
  color:var(--white);
  white-space:nowrap;
  text-shadow:0 2px 16px rgba(0,0,0,0.35);
  line-height:1;
}

/* ── OUR STORY ────────────────────────────────────────────────── */
.story-section{background:var(--blue);padding:5rem 2rem;text-align:center;}
.story-title{font-family:var(--script);font-size:clamp(2rem,5vw,3rem);color:var(--white);margin-bottom:0.5rem;}
.story-rule{width:40px;height:1px;background:rgba(255,255,255,0.4);margin:0 auto 2rem;}
.story-body{font-family:var(--serif);font-size:0.92rem;color:var(--white);line-height:2;max-width:560px;margin:0 auto;}

/* ── THE WEDDING ──────────────────────────────────────────────── */
.wedding-section{background:var(--blue);padding:4rem 2rem;}
.wedding-invite{font-family:var(--serif);font-size:1rem;color:var(--white);text-align:center;line-height:1.7;max-width:560px;margin:0 auto 3rem;}
.wedding-invite em,.wedding-invite i{font-family:var(--script);font-size:1.4em;font-style:normal;}
.wedding-cards{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;max-width:680px;margin:0 auto;}
.wedding-card{border:1px solid rgba(255,255,255,0.4);padding:2rem 1.5rem;text-align:center;}
.wedding-card-name{font-family:var(--script);font-size:clamp(1.5rem,3.5vw,2.2rem);color:var(--white);margin-bottom:1.2rem;line-height:1.2;}
.wedding-card-detail{font-family:var(--serif);font-size:0.82rem;color:rgba(255,255,255,0.88);line-height:2;}
.wedding-card-dress{display:block;margin-top:1rem;font-family:var(--script);font-size:1.1rem;color:rgba(255,255,255,0.8);}

/* ── OTHER EVENTS ─────────────────────────────────────────────── */
.events-section{background:var(--blue);padding:4rem 2rem;}
.events-inner{max-width:480px;margin:0 auto;}
.event-box{border:1px solid rgba(255,255,255,0.35);padding:2.5rem 2rem;text-align:center;margin-bottom:2rem;}
.event-name{font-family:var(--script);font-size:clamp(1.6rem,4vw,2.4rem);color:var(--white);margin-bottom:1.4rem;line-height:1.2;}
.event-detail{font-family:var(--serif);font-size:0.83rem;color:rgba(255,255,255,0.88);line-height:2;}
.event-dress{display:block;margin-top:1.2rem;font-family:var(--script);font-size:1.1rem;color:rgba(255,255,255,0.8);}

/* ── ACCOMMODATION & TRAVEL ───────────────────────────────────── */
.split-section{display:grid;grid-template-columns:1fr 1fr;min-height:320px;}
.split-content{background:var(--white);padding:3.5rem 3rem;display:flex;flex-direction:column;justify-content:center;}
.split-photo{overflow:hidden;}
.split-photo img{width:100%;height:100%;object-fit:cover;display:block;}
.split-label{font-family:var(--script);font-size:2rem;color:var(--dark);margin-bottom:0.7rem;}
.split-rule{width:40px;height:1px;background:rgba(50,52,75,0.2);margin:0 0 1.2rem;}
.split-name{font-family:var(--serif);font-size:0.92rem;color:var(--dark);line-height:1.7;margin-bottom:0.5rem;font-weight:600;}
.split-note{font-family:var(--serif);font-size:0.8rem;color:var(--dark);line-height:1.7;font-style:italic;margin-bottom:1.5rem;}
.split-btn{display:inline-block;border:1px solid var(--blue);color:var(--dark);font-family:var(--serif);font-size:0.75rem;letter-spacing:0.1em;text-transform:uppercase;padding:0.6rem 1.8rem;cursor:pointer;background:transparent;text-decoration:none;transition:all 0.2s;width:fit-content;}
.split-btn:hover{background:var(--blue);}

/* ── NEED TO KNOWS ────────────────────────────────────────────── */
.ntk-section{background:var(--blue);padding:5rem 2rem 4rem;text-align:center;}
.ntk-title{font-family:var(--script);font-size:clamp(2rem,5vw,3rem);color:var(--white);margin-bottom:3rem;}
.ntk-inner{max-width:520px;margin:0 auto;}
.ntk-item{margin-bottom:2.5rem;}
.ntk-question{font-family:var(--serif);font-size:0.95rem;font-weight:600;color:var(--white);margin-bottom:0.8rem;}
.ntk-answer{font-family:var(--serif);font-size:0.8rem;font-style:italic;color:rgba(255,255,255,0.85);line-height:2;max-width:440px;margin:0 auto;}
.ntk-decoration{width:100px;margin:2.5rem auto 0;opacity:0.55;filter:brightness(10);}

/* ── GALLERY ──────────────────────────────────────────────────── */
.gallery-section{background:var(--white);padding:4rem 2rem;}
.gallery-title{font-family:var(--script);font-size:clamp(2rem,4vw,2.8rem);color:var(--dark);text-align:center;margin-bottom:0.5rem;}
.gallery-rule{width:40px;height:1px;background:rgba(50,52,75,0.2);margin:0 auto 2rem;}
.gallery-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:3px;max-width:820px;margin:0 auto;}
.gallery-cell{overflow:hidden;aspect-ratio:1;cursor:pointer;}
.gallery-cell img{width:100%;height:100%;object-fit:cover;transition:transform 0.4s;}
.gallery-cell:hover img{transform:scale(1.05);}

/* ── REGISTRY ─────────────────────────────────────────────────── */
.registry-section{background:var(--white);padding:4rem 2rem;text-align:center;border-top:1px solid rgba(50,52,75,0.1);}
.registry-title{font-family:var(--script);font-size:clamp(1.8rem,4vw,2.8rem);color:var(--dark);}
.registry-body{font-family:var(--serif);font-size:0.82rem;color:rgba(50,52,75,0.65);line-height:1.9;margin-top:0.8rem;}

/* ── RSVP ─────────────────────────────────────────────────────── */
.rsvp-section{background:var(--blue);padding:5rem 2rem;text-align:center;}
.rsvp-title{font-family:var(--script);font-size:clamp(2.2rem,5vw,3.2rem);color:var(--white);margin-bottom:0.5rem;}
.rsvp-deadline{font-family:var(--serif);font-size:0.8rem;color:rgba(255,255,255,0.75);margin-bottom:2rem;}
.rsvp-deadline sup{font-size:0.6em;vertical-align:super;}
.rsvp-wrap{max-width:480px;margin:0 auto;text-align:left;}
.rsvp-name-input{width:100%;background:var(--white);border:1px solid rgba(50,52,75,0.15);font-family:var(--serif);font-size:0.9rem;color:var(--dark);padding:0.85rem 1.2rem;outline:none;text-align:center;margin-bottom:1.5rem;}
.rsvp-name-input::placeholder{color:rgba(50,52,75,0.4);}
.rsvp-event-label{font-family:var(--serif);font-size:0.95rem;font-weight:600;color:var(--dark);margin:1rem 0 0.6rem;}
.rsvp-expanded{display:none;}
.rsvp-expanded.visible{display:block;}
.rsvp-select-wrap{position:relative;margin-bottom:0.6rem;}
.rsvp-select{width:100%;background:var(--white);border:1px solid rgba(50,52,75,0.15);font-family:var(--serif);font-size:0.82rem;color:rgba(50,52,75,0.6);padding:0.7rem 2rem 0.7rem 0.9rem;outline:none;appearance:none;cursor:pointer;}
.rsvp-select:focus{border-color:var(--dark);color:var(--dark);}
.rsvp-chevron{position:absolute;right:0.8rem;top:50%;transform:translateY(-50%);font-size:0.6rem;color:rgba(50,52,75,0.4);pointer-events:none;}
.rsvp-text-input{width:100%;background:var(--white);border:1px solid rgba(50,52,75,0.15);font-family:var(--serif);font-size:0.82rem;color:var(--dark);padding:0.7rem 0.9rem;outline:none;margin-bottom:0.6rem;}
.rsvp-text-input::placeholder{color:rgba(50,52,75,0.4);}
/* Textareas for dietary + message — share the input look but allow vertical resize */
.rsvp-textarea{width:100%;background:var(--white);border:1px solid rgba(50,52,75,0.15);font-family:var(--serif);font-size:0.82rem;color:var(--dark);padding:0.7rem 0.9rem;outline:none;margin-bottom:0.6rem;resize:vertical;min-height:64px;}
.rsvp-textarea::placeholder{color:rgba(50,52,75,0.4);}
.rsvp-textarea:focus,.rsvp-text-input:focus{border-color:var(--dark);}
/* Two-column row for paired selects (attending + meal) */
.rsvp-field-row{display:grid;grid-template-columns:1fr 1fr;gap:0.6rem;margin-bottom:0.6rem;}
.rsvp-field-row.full{grid-template-columns:1fr;}
.rsvp-field-row .rsvp-select-wrap{margin-bottom:0;}
@media(max-width:560px){
  .rsvp-field-row{grid-template-columns:1fr;}
}

/* ── Household section ─────────────────────────────────────────
   Rendered when guest-lookup returns a guest with party members.
   One row per OTHER member of the party; the person filling out
   the form RSVPs for everyone in their household at once. */
.rsvp-household{
  border-top:1px solid rgba(50,52,75,0.15);
  margin-top:1rem;padding-top:1rem;
  display:none;
}
.rsvp-household.visible{display:block;}
.rsvp-household-label{
  font-family:var(--serif);font-style:italic;
  font-size:0.85rem;color:var(--dark);
  text-align:left;letter-spacing:0.01em;
  margin-bottom:0.6rem;line-height:1.5;
}
.rsvp-household-list{display:flex;flex-direction:column;gap:0.55rem;}
.rsvp-household-row{
  display:flex;flex-direction:column;gap:0.5rem;
  padding:0.7rem 0.85rem;
  background:var(--white);
  border:1px solid rgba(50,52,75,0.15);
  text-align:left;
}
.rsvp-household-name{
  font-family:var(--serif);font-weight:600;font-size:0.92rem;
  color:var(--dark);
  display:flex;align-items:center;gap:0.5rem;flex-wrap:wrap;
}
.rsvp-household-name-primary-tag{
  font-family:var(--serif);font-style:italic;
  font-size:0.65rem;font-weight:400;
  letter-spacing:0.04em;
  color:var(--dark);background:var(--blue);
  padding:2px 8px;
}
.rsvp-household-controls{
  display:grid;grid-template-columns:1fr 1fr;gap:0.4rem;
}
.rsvp-household-controls.three-up{
  grid-template-columns:1fr 1fr 1fr;
}
.rsvp-household-controls .rsvp-select-wrap{margin-bottom:0;}
.rsvp-household-controls .rsvp-select{
  font-size:0.78rem;
  padding:0.55rem 1.8rem 0.55rem 0.7rem;
}
.rsvp-household-controls .rsvp-chevron{right:0.6rem;}
@media (max-width:560px){
  .rsvp-household-controls,
  .rsvp-household-controls.three-up{grid-template-columns:1fr;}
}
/* Success message — keep the centred script for the headline but allow a
   serif sub-line for the dynamic party-total text. */
.rsvp-success-msg{display:block;}
.rsvp-add-guest{display:inline-flex;align-items:center;gap:0.3rem;background:none;border:1px solid rgba(255,255,255,0.4);font-family:var(--serif);font-size:0.75rem;color:rgba(255,255,255,0.85);padding:0.4rem 0.9rem;cursor:pointer;margin-top:0.5rem;margin-bottom:1.5rem;transition:all 0.2s;}
.rsvp-add-guest:hover{background:rgba(255,255,255,0.15);}
.rsvp-extra-list{margin-bottom:0.5rem;}
.extra-guest-row{margin-bottom:0.5rem;}
.rsvp-remove-btn{background:none;border:none;cursor:pointer;color:rgba(50,52,75,0.35);font-size:1rem;padding:0 0.2rem;}
.rsvp-divider{border:none;border-top:1px solid rgba(50,52,75,0.12);margin:1.5rem 0;}
.rsvp-submit{display:block;background:var(--dark);color:var(--white);font-family:var(--serif);font-size:0.75rem;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;padding:0.85rem 2.5rem;border:none;cursor:pointer;transition:opacity 0.2s;margin-top:0.5rem;}
.rsvp-submit:hover{opacity:0.8;}
.rsvp-submit:disabled{opacity:0.35;cursor:not-allowed;}
.rsvp-success{display:none;margin-top:2rem;text-align:center;font-family:var(--script);font-size:2rem;color:var(--white);}

/* ── FOOTER ───────────────────────────────────────────────────── */
.footer{background:var(--dark);text-align:center;padding:2.5rem 1rem;}
.footer-couple{font-family:var(--script);font-size:2rem;color:var(--white);display:block;margin-bottom:0.4rem;}
.footer-date{font-family:var(--serif);font-size:0.68rem;letter-spacing:0.14em;text-transform:uppercase;color:rgba(255,255,255,0.4);}

/* ── RESPONSIVE ───────────────────────────────────────────────── */
@media(max-width:768px){
  .hero-section{grid-template-columns:1fr;height:auto;min-height:100vh;}
  .hero-section::before,.hero-section::after{display:none;}
  .hero-col{display:none;}
  .hero-col-centre{height:100vh;min-height:500px;}
  /* On mobile only the centre photo is visible — scale the names down
     and allow wrapping so a long couple name doesn't run off-screen. */
  .hero-names{padding:0 1.5rem;}
  .hero-names-text{
    font-size:clamp(1.8rem,8vw,2.8rem);
    white-space:normal;
    line-height:1.15;
  }
  .wedding-cards{grid-template-columns:1fr;gap:1rem;}
  .split-section{grid-template-columns:1fr;}
  .split-photo{height:280px;}
  .gallery-grid{grid-template-columns:1fr 1fr;}
  /* Thumbnail mode: CSS background handles display */
  body.thumbnail-mode .hero-section{height:66.67vw!important;min-height:0!important;display:block!important;}
  body.thumbnail-mode .hero-col,body.thumbnail-mode .hero-col-centre{display:none!important;}
  body.thumbnail-mode .hero-section::before,body.thumbnail-mode .hero-section::after{display:block!important;}
}
</style>
</head>
<body class="hydrating">

<!-- MENU OVERLAY -->
<div class="menu-overlay" id="menuOverlay">
  <div class="menu-backdrop" onclick="closeMenu()"></div>
  <div class="menu-drawer">
    <button class="menu-close" onclick="closeMenu()">×</button>
    <div class="menu-name" id="menuCoupleName">Menu</div>
    <ul class="menu-links" id="menuLinks"></ul>
  </div>
</div>

<!-- NAV -->
<nav class="nav">
  <button class="nav-btn" onclick="openMenu()" aria-label="Menu">&#9776;</button>
</nav>

<!-- HOME — 3-column split -->
<section class="hero-section" id="home">
  <div class="hero-col" id="heroCol1" style="background-image:url('https://assets.softr-files.com/applications/98da9671-14f5-418f-b98a-6f8fb833401f/assets/2d42c296-b268-4811-870c-0fd04f5cd929.png');background-size:cover;background-position:center;"></div>
  <div class="hero-col hero-col-centre" id="heroCol2" style="background-image:url('https://assets.softr-files.com/applications/98da9671-14f5-418f-b98a-6f8fb833401f/assets/89d6c221-6968-4779-ba69-a28ce2592e5e.png');background-size:cover;background-position:center;">
  </div>
  <div class="hero-col" id="heroCol3" style="background-image:url('https://assets.softr-files.com/applications/98da9671-14f5-418f-b98a-6f8fb833401f/assets/3617ec8d-4bb0-4eea-91ee-ae1ef7ab1002.png');background-size:cover;background-position:center;"></div>
  <!-- Names overlay the full hero (spanning all three columns), positioned
       absolutely against .hero-section. Sitting inside heroCol2 used to clip
       the script type at the narrow centre column's edges; this lifts it out

<script>
const API = 'https://wedding-recommender.onrender.com';

// ─────────────────────────────────────────────────────────────────────────────
// PER-TEMPLATE: Loading screen image
// ─────────────────────────────────────────────────────────────────────────────
// Image shown while wedding-site data is being fetched. Change this URL
// per-template so the loading screen matches each template's design.
//
// Specs that work well here:
//   - Roughly square (rendered at 72×72)
//   - Single subject on a transparent or near-white background
//   - PNG with transparency preferred so the page background shows through
//
// For Golden Hour we re-use one of the existing hero photo assets — keeps
// the loading state visually continuous with the rest of the page.
// ─────────────────────────────────────────────────────────────────────────────
const LOADING_IMAGE = 'https://assets.softr-files.com/applications/98da9671-14f5-418f-b98a-6f8fb833401f/assets/89d6c221-6968-4779-ba69-a28ce2592e5e.png';
const _p = new URLSearchParams(window.location.search);
const _slug = _p.get('slug')||'';
const _path = window.location.pathname.split('/').filter(function(s){return s;})[0]||'';
const _liveSlug = _slug||(_path!=='template-goldenhour.html'?_path:'');
const _isPreview = !_liveSlug;
const _pwdParam = _p.get('pwd')||'';
(function(){if(_p.get('thumbnail')==='1')document.body.classList.add('thumbnail-mode');})();

function openMenu(){document.getElementById('menuOverlay').classList.add('open');}
function closeMenu(){document.getElementById('menuOverlay').classList.remove('open');}
function handleMenuClick(link){closeMenu();var href=link.getAttribute('href');if(href&&href!=='#'){setTimeout(function(){var el=document.querySelector(href);if(el)el.scrollIntoView({behavior:'smooth'});},350);}return false;}
document.addEventListener('keydown',function(e){if(e.key==='Escape')closeMenu();});

var _rsvpEntreeOptions=[
  {value:'Chicken',label:'Chicken'},{value:'Fish',label:'Fish'},
  {value:'Vegetarian',label:'Vegetarian'},{value:'Vegan',label:'Vegan'},
  {value:'Kids Meal',label:'Kids Meal'}
];

function hydrateTemplate(d){
  window._weddingSlug=d.slug||'';
  var p1=d.partner_1||'',p2=d.partner_2||'';
  var names=d.couple_names||(p1&&p2?p1+' & '+p2:'A & B');

  // ── Per-couple social-share metadata (DOM rewrite) ───────────────────
  // Crawlers don't run JS so this doesn't help WhatsApp / iMessage / FB
  // previews — those use the brand-fallback static OG tags in <head>. This
  // rewrite keeps the DOM semantically accurate after hydration and helps
  // a smaller set of share paths that read live DOM (browser-extension
  // share tools, page-archival tools, in-page TTS, the Share API on a few
  // platforms). Per-couple chat previews come from /api/og.js.
  try {
    var setMeta = function(selector, value) {
      var el = document.head.querySelector(selector);
      if (el && value) el.setAttribute('content', value);
    };
    var heroForOg = d.hero_image || 'https://weddings.myplanning.ai/og-image.png';
    var ogTitle   = (names || 'Our Wedding') + ' — Wedding Website';
    var ogDesc    = d.celebration_date
      ? 'Join us as we celebrate on ' + new Date(d.celebration_date).toLocaleDateString('en-US', { month:'long', day:'numeric', year:'numeric' }) + '.'
      : 'Join ' + (names || 'us') + ' for our wedding celebration.';
    var ogUrl     = d.slug
      ? 'https://weddings.myplanning.ai/' + d.slug
      : 'https://weddings.myplanning.ai/';
    setMeta('meta[property="og:title"]',       ogTitle);
    setMeta('meta[property="og:description"]', ogDesc);
    setMeta('meta[property="og:image"]',       heroForOg);
    setMeta('meta[property="og:url"]',         ogUrl);
    setMeta('meta[name="twitter:title"]',       ogTitle);
    setMeta('meta[name="twitter:description"]', ogDesc);
    setMeta('meta[name="twitter:image"]',       heroForOg);
    setMeta('meta[name="description"]',         ogDesc);
    if (names) document.title = names;
  } catch (_e) {}
  function el(id){return document.getElementById(id);}
  if(el('heroNames'))el('heroNames').textContent=names;
  // menu title stays as 'Menu'
  if(el('footerCouple'))el('footerCouple').textContent=names;

  var dateStr='';
  if(d.celebration_date){
    try{var dt=new Date(d.celebration_date+'T00:00:00Z');
      dateStr=dt.toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric',timeZone:'UTC'});
    }catch(ex){dateStr=d.celebration_date;}
  }
  if(el('footerDate'))el('footerDate').textContent=dateStr;

  if(el('rsvpDeadline')&&d.rsvp_config&&d.rsvp_config.deadline)
    el('rsvpDeadline').innerHTML='by '+d.rsvp_config.deadline;
  else if(el('rsvpDeadline')&&dateStr)
    el('rsvpDeadline').textContent='by '+dateStr;

  if(d.rsvp_config&&d.rsvp_config.entrees&&d.rsvp_config.entrees.length)
    _rsvpEntreeOptions=d.rsvp_config.entrees.map(function(e){return{value:e,label:e};});

  if(d.custom_css){var s=document.createElement('style');s.textContent=d.custom_css;document.head.appendChild(s);}

  // Update hero images if user uploaded
  if(d.gallery_images&&d.gallery_images.length){
    var urls=d.gallery_images.map(function(g){return typeof g==='string'?g:(g.url||'');}).filter(Boolean);
    if(urls[0]&&el('heroCol1'))el('heroCol1').style.backgroundImage="url('"+urls[0]+"')";
    if(urls[1]&&el('heroCol2'))el('heroCol2').style.backgroundImage="url('"+urls[1]+"')";
    if(urls[2]&&el('heroCol3'))el('heroCol3').style.backgroundImage="url('"+urls[2]+"')";
  }

  var menu=d.menu_config||{};
  var ml=el('menuLinks');
  if(ml){
    var items=[
      {h:'#home',l:'Home',s:true},
      {h:'#story',l:'Our Story',s:menu.story},
      {h:'#wedding',l:'The Wedding',s:menu.wedding},
      {h:'#events',l:'Other Events',s:menu.other_events},
      {h:'#accommodations',l:'Accommodations',s:menu.accommodations},
      {h:'#travel',l:'Travel',s:menu.travel},
      {h:'#ntk',l:'Need to Know',s:menu.things_to_do||menu.faqs},
      {h:'#gallery',l:'Gallery',s:menu.gallery},
      {h:'#registry',l:'Registry',s:menu.registry},
      {h:'#rsvp',l:'RSVP',s:menu.rsvp}
    ];
    ml.innerHTML=items.filter(function(i){return i.s;}).map(function(i){
      return'<li><a href="'+i.h+'" onclick="handleMenuClick(this)">'+i.l+'</a></li>';
    }).join('');
  }

  // Our Story
  var stEl=el('story');if(stEl)stEl.style.display=menu.story?'':'none';
  if(menu.story&&d.story){var st=el('storyText');if(st)st.innerHTML=d.story;}

  // The Wedding
  var wEl=el('wedding');if(wEl)wEl.style.display=menu.wedding?'':'none';
  if(menu.wedding){
    // Invitation line: "Name and Name lovingly invite you to celebrate their wedding."
    var invite=el('weddingInvite');
    if(invite){
      var n1=p1||'They',n2=p2||(p1?'':'They');
      var inviteHtml=(p1&&p2?p1+' and '+p2:'They')+
        ' <i>lovingly invite</i> you to <i>celebrate</i> their wedding.';
      invite.innerHTML=inviteHtml;
    }
    var wCards=el('weddingCards');
    if(wCards&&d.weddings_info){
      wCards.innerHTML='';
      var wParts=d.weddings_info.replace(/<br\s*\/?>\s*<br\s*\/?>/gi,'||SPLIT||')
        .split('||SPLIT||').map(function(p){return p.trim();}).filter(function(p){return p.length>3;});
      function makeWCard(html){
        var nm=html.match(/^<strong>([^<]+)<\/strong>/i);
        var title=nm?nm[1]:'';
        var rest=nm?html.replace(nm[0],'').replace(/^<br\s*\/?>\s*/i,'').trim():html;
        var dm=rest.match(/<em>([^<]+)<\/em>\s*$/i);
        var dress=dm?dm[1]:'';
        var detail=dm?rest.replace(dm[0],'').replace(/<br\s*\/?>\s*$/i,'').trim():rest;
        return'<div class="wedding-card">'+
          (title?'<div class="wedding-card-name">'+title+'</div>':'')+
          (detail?'<div class="wedding-card-detail">'+detail+'</div>':'')+
          (dress?'<span class="wedding-card-dress">'+dress+'</span>':'')+
          '</div>';
      }
      wParts.forEach(function(part){wCards.innerHTML+=makeWCard(part);});
    }
  }

  // Other Events
  var evEl=el('events');if(evEl)evEl.style.display=menu.other_events?'':'none';
  if(menu.other_events){
    var evList=el('otherEventsList');
    if(evList&&d.events_info){
      evList.innerHTML='';
      var evParts=d.events_info.replace(/<br\s*\/?>\s*<br\s*\/?>/gi,'||SPLIT||')
        .split('||SPLIT||').map(function(p){return p.trim();}).filter(Boolean);
      if(!evParts.length)evParts=[d.events_info];
      evParts.forEach(function(part){
        var nm=part.match(/^<strong>([^<]+)<\/strong>/i);
        var evName=nm?nm[1]:'';
        var rest=nm?part.replace(nm[0],'').replace(/^<br\s*\/?>\s*/i,'').trim():part;
        var dm=rest.match(/<em>([^<]+)<\/em>\s*$/i);
        var dress=dm?dm[1]:'';
        var detail=dm?rest.replace(dm[0],'').replace(/<br\s*\/?>\s*$/i,'').trim():rest;
        var box=document.createElement('div');box.className='event-box';
        box.innerHTML=(evName?'<div class="event-name">'+evName+'</div>':'')+
          (detail?'<div class="event-detail">'+detail+'</div>':'')+
          (dress?'<span class="event-dress">'+dress+'</span>':'');
        evList.appendChild(box);
      });
    }
  }

  // Accommodations — left content, right photo
  var acEl=el('accommodations');if(acEl)acEl.style.display=menu.accommodations?'':'none';
  if(menu.accommodations&&d.accommodation_info){
    var acContent=el('accomContent');
    if(acContent){
      var nm=d.accommodation_info.match(/^<strong>([^<]+)<\/strong>/i);
      var acName=nm?nm[1]:'Hotel';
      var rest=nm?d.accommodation_info.replace(nm[0],'').replace(/^<br\s*\/?>\s*/i,'').trim():d.accommodation_info;
      var lines=rest.split(/<br\s*\/?>/i).map(function(s){return s.replace(/<[^>]+>/g,'').trim();}).filter(Boolean);
      var venueName=lines.slice(0,2).join('<br>');
      var note=lines.slice(2).join(' ');
      acContent.innerHTML=
        '<div class="split-label">'+acName+'</div>'+
        '<div class="split-rule"></div>'+
        '<div class="split-name">'+venueName+'</div>'+
        (note?'<div class="split-note">'+note+'</div>':'')+
        '<a class="split-btn" href="#" target="_blank">Book Now</a>';
    }
  }

  // Travel — left photo, right content
  var trEl=el('travel');if(trEl)trEl.style.display=menu.travel?'':'none';
  if(menu.travel&&d.travel_info){
    var trContent=el('travelContent');
    if(trContent){
      var tText=d.travel_info.replace(/<[^>]+>/g,'').trim();
      var airportMatch=tText.match(/([A-Z][^.,(]+(?:airport|Airport)[^.,)]*)/);
      var tName=airportMatch?airportMatch[0].trim():'Airport';
      var tNote=tText.replace(tName,'').replace(/^[.,\s]+/,'').trim();
      trContent.innerHTML=
        '<div class="split-label">Flights</div>'+
        '<div class="split-rule"></div>'+
        '<div class="split-name">'+tName+'</div>'+
        (tNote?'<div class="split-note">'+tNote+'</div>':'')+
        '<a class="split-btn" href="#" target="_blank">Book Now</a>';
    }
  }

  // Need to Knows
  var ntkEl=el('ntk');
  if(ntkEl)ntkEl.style.display=(menu.things_to_do||menu.faqs)?'':'none';
  if((menu.things_to_do||menu.faqs)&&d.faqs){
    var nl=el('ntkList');
    if(nl){
      nl.innerHTML='';
      var blocks=d.faqs.replace(/<br\s*\/?>\s*<br\s*\/?>/gi,'||SPLIT||')
        .split('||SPLIT||').map(function(b){return b.trim();}).filter(Boolean);
      blocks.forEach(function(block){
        var bi=block.search(/<br\s*\/?>/i);
        var q=bi===-1?block.replace(/<[^>]+>/g,'').trim():block.substring(0,bi).replace(/<[^>]+>/g,'').trim();
        var a=bi===-1?'':block.substring(bi).replace(/^(<br\s*\/?>)+/i,'').trim();
        var item=document.createElement('div');item.className='ntk-item';
        item.innerHTML=(q?'<div class="ntk-question">'+q+'</div>':'')+(a?'<div class="ntk-answer">'+a+'</div>':'');
        nl.appendChild(item);
      });
    }
  }

  // Gallery
  var galEl=el('gallery');if(galEl)galEl.style.display=menu.gallery?'':'none';

  // Registry
  var regEl=el('registry');if(regEl)regEl.style.display=menu.registry?'':'none';
  if(menu.registry){var rb=el('registryBody');if(rb&&d.registry_info)rb.innerHTML=d.registry_info;}

  // RSVP
  var rsvpEl=el('rsvp');if(rsvpEl)rsvpEl.style.display=menu.rsvp?'':'none';
  if(menu.rsvp){
    var evs=(d.events&&d.events.length)
      ?d.events.map(function(ev){return{id:ev.id||ev.name,label:ev.label||ev.name};})
      :[{id:'wedding',label:'The Wedding'}];
    buildRsvpBlocks(evs);
  }
}

function buildRsvpBlocks(events){
  var container=document.getElementById('rsvpBlocks');container.innerHTML='';
  events.forEach(function(ev){
    var block=document.createElement('div');block.className='rsvp-event-block';block.dataset.eventId=ev.id;
    var label=document.createElement('div');label.className='rsvp-event-label';label.textContent=ev.label;
    block.appendChild(label);
    var nameInput=document.createElement('input');
    nameInput.className='rsvp-name-input';nameInput.type='text';
    nameInput.placeholder='Your full name';nameInput.oninput=function(){onNameInput(nameInput);};
    block.appendChild(nameInput);
    var expanded=document.createElement('div');expanded.className='rsvp-expanded';expanded.id='expanded-'+ev.id;

    // Helper: build a styled select with chevron in a wrap
    function makeSelectWrap(field, defaultOpt, options){
      var wrap=document.createElement('div');wrap.className='rsvp-select-wrap';
      var sel=document.createElement('select');sel.className='rsvp-select';sel.dataset.field=field;
      var def=document.createElement('option');def.value='';def.textContent=defaultOpt;sel.appendChild(def);
      options.forEach(function(o){
        var op=document.createElement('option');op.value=o.value;op.textContent=o.label;sel.appendChild(op);
      });
      var chev=document.createElement('span');chev.className='rsvp-chevron';chev.textContent='▾';
      wrap.appendChild(sel);wrap.appendChild(chev);
      return wrap;
    }

    // Row 1 — attending + meal (two-up)
    var row1=document.createElement('div');row1.className='rsvp-field-row';
    row1.appendChild(makeSelectWrap('attending','Do you plan to attend?',[
      {value:'yes',label:'Attending'},
      {value:'no',label:'Cannot make it'},
      {value:'maybe',label:'Not sure yet'},
    ]));
    row1.appendChild(makeSelectWrap('meal','Meal type',[
      {value:'Vegetarian',label:'Vegetarian'},
      {value:'Non Vegetarian',label:'Non-Vegetarian'},
      {value:'Vegan',label:'Vegan'},
      {value:'Gluten Free',label:'Gluten-Free'},
      {value:'Kids Meal',label:'Kids Meal'},
    ]));
    expanded.appendChild(row1);

    // Row 2 — entree (full-width)
    var row2=document.createElement('div');row2.className='rsvp-field-row full';
    row2.appendChild(makeSelectWrap('entree','Your entrée choice',
      _rsvpEntreeOptions.map(function(o){return {value:o.value,label:o.label};})
    ));
    expanded.appendChild(row2);

    // Email (full)
    var ei=document.createElement('input');ei.className='rsvp-text-input';ei.type='email';
    ei.placeholder='Email address (required) *';ei.dataset.field='email';ei.required=true;
    ei.addEventListener('input',function(){checkShowSubmit();});
    expanded.appendChild(ei);

    // Dietary textarea
    var dietary=document.createElement('textarea');dietary.className='rsvp-textarea';
    dietary.rows=2;dietary.placeholder='Allergies or dietary requirements?';dietary.dataset.field='dietary';
    expanded.appendChild(dietary);

    // Notes textarea
    var notes=document.createElement('textarea');notes.className='rsvp-textarea';
    notes.rows=2;notes.placeholder='Message for the couple (optional)';notes.dataset.field='notes';
    expanded.appendChild(notes);

    // Household section — populated by renderHousehold when the lookup
    // returns a guest with other party members. Hidden until then.
    var hh=document.createElement('div');hh.className='rsvp-household';hh.id='household-'+ev.id;
    var hhLabel=document.createElement('div');hhLabel.className='rsvp-household-label';hhLabel.id='household-label-'+ev.id;
    var hhList=document.createElement('div');hhList.className='rsvp-household-list';hhList.id='household-list-'+ev.id;
    hh.appendChild(hhLabel);hh.appendChild(hhList);
    expanded.appendChild(hh);

    // Extra guests + add-guest button
    var extraList=document.createElement('div');extraList.className='rsvp-extra-list';extraList.id='extra-guests-'+ev.id;
    expanded.appendChild(extraList);
    var addBtn=document.createElement('button');addBtn.className='rsvp-add-guest';addBtn.textContent='+ Add Invited Guest';addBtn.style.display='none';
    addBtn.onclick=function(){addExtraGuest(addBtn);};
    expanded.appendChild(addBtn);

    block.appendChild(expanded);
    container.appendChild(block);
  });
  checkShowSubmit();
}


// ─── RSVP lookup + submit logic (canonical, shared across templates) ──────────
// Per-block debounce timers for the guest-lookup call
var _guestLookupTimers = {};

function onNameInput(input) {
  var block    = input.closest('.rsvp-event-block');
  var eventId  = block.dataset.eventId;
  var expanded = document.getElementById('expanded-' + eventId);
  if (expanded) expanded.classList.toggle('visible', input.value.trim().length >= 2);
  checkShowSubmit();
  // Debounced server lookup — figures out if this guest is on the list and
  // if they're allowed a plus-one. The bride sets Plus One Allowed per-guest
  // in the planner; the form respects that setting.
  if (_guestLookupTimers[eventId]) clearTimeout(_guestLookupTimers[eventId]);
  _guestLookupTimers[eventId] = setTimeout(function() {
    lookupGuest(block, input.value.trim());
  }, 500);
}

function lookupGuest(block, name) {
  if (typeof _isPreview !== 'undefined' && _isPreview) return;
  var slug = window._weddingSlug || '';
  if (!slug || !name || name.length < 2) return;
  var eventId  = block.dataset.eventId;
  var expanded = document.getElementById('expanded-' + eventId);

  // Clear any stale disambiguation picker from a previous lookup.
  if (expanded) {
    var staleDisambig = expanded.querySelector('.rsvp-name-disambig');
    if (staleDisambig) staleDisambig.remove();
  }

  // Visible feedback banner — placed as a sibling of the name input, above
  // the expanded section. Stays visible regardless of expansion state.
  var statusEl = block.querySelector('.rsvp-lookup-status');
  if (!statusEl) {
    statusEl = document.createElement('div');
    statusEl.className = 'rsvp-lookup-status';
    statusEl.style.cssText = [
      'font-family:var(--serif, serif)',
      'font-size:0.85rem',
      'padding:0.5rem 0.8rem',
      'margin:0.5rem 0 0.4rem',
      'border-left:3px solid #A9BDC4',
      'background:rgba(169,189,196,0.1)',
      'border-radius:4px',
      'color:#4B5244',
      'transition:opacity 0.2s'
    ].join(';');
    var nameInput = block.querySelector('.rsvp-name-input, .rsvp-name-pill');
    if (nameInput && nameInput.parentNode) {
      if (expanded && expanded.parentNode === block) {
        block.insertBefore(statusEl, expanded);
      } else {
        nameInput.parentNode.insertBefore(statusEl, nameInput.nextSibling);
      }
    } else {
      block.appendChild(statusEl);
    }
  }
  statusEl.textContent           = 'Checking guest list…';
  statusEl.style.borderLeftColor = '#A9BDC4';
  statusEl.style.background      = 'rgba(169,189,196,0.1)';
  statusEl.style.color           = '#8C7D6E';

  var lookupUrl = API + '/wedding-site/' + encodeURIComponent(slug) + '/guest-lookup?name=' + encodeURIComponent(name);
  console.log('[RSVP lookup]', lookupUrl);

  fetch(lookupUrl)
    .then(function(r) {
      if (!r.ok) {
        return r.text().then(function(t) { throw new Error('HTTP ' + r.status + ': ' + t); });
      }
      return r.json();
    })
    .then(function(json) {
      console.log('[RSVP lookup] response', json);
      var addBtn = expanded && expanded.querySelector('.rsvp-add-guest');
      var listEl = expanded && expanded.querySelector('.extra-guests-list, .rsvp-extra-list');

      if (json.found === true) {
        block.dataset.guestId          = json.guest_id || '';
        block.dataset.plusOneAllowed   = json.plus_one_allowed ? '1' : '0';
        block.dataset.householdAllowed = String(json.household_members_allowed || 0);
        block.dataset.lookupState      = 'found';

        statusEl.textContent           = '✓ Found you on the list — ' + json.name;
        statusEl.style.borderLeftColor = '#4B5244';
        statusEl.style.background      = 'rgba(75,82,68,0.08)';
        statusEl.style.color           = '#4B5244';

        // Replace partial typed name with full matched name (UX nicety)
        var nameInput = block.querySelector('.rsvp-name-input, .rsvp-name-pill');
        if (nameInput && json.name && nameInput.value.trim() === name) {
          nameInput.value = json.name;
        }

        if (addBtn) addBtn.style.display = json.plus_one_allowed ? '' : 'none';
        if (listEl && !json.plus_one_allowed) {
          listEl.innerHTML = '';
          if (addBtn) addBtn.style.display = 'none';
        }
        // Render household section if this guest is in a party with others.
        renderHousehold(block, json);
      } else if (json.ambiguous) {
        block.dataset.lookupState = 'ambiguous';
        block.dataset.guestId = '';
        statusEl.textContent           = 'Multiple matches — please pick yours below';
        statusEl.style.borderLeftColor = '#B69400';
        statusEl.style.background      = 'rgba(182,148,0,0.08)';
        statusEl.style.color           = '#B69400';
        if (addBtn) addBtn.style.display = 'none';
        if (listEl) listEl.innerHTML = '';
        clearHousehold(block);
        showAmbiguousMatches(block, json.matches || []);
      } else {
        block.dataset.lookupState = 'unknown';
        block.dataset.guestId = '';
        block.dataset.plusOneAllowed = '0';
        statusEl.textContent           = "We couldn't find your name on the guest list. RSVPs are by invitation only — please contact the couple if you believe this is a mistake.";
        statusEl.style.borderLeftColor = '#C23331';
        statusEl.style.background      = 'rgba(194,51,49,0.08)';
        statusEl.style.color           = '#C23331';
        if (addBtn) addBtn.style.display = 'none';
        if (listEl) listEl.innerHTML = '';
        clearHousehold(block);
      }
      checkShowSubmit();
    })
    .catch(function(err) {
      console.warn('[RSVP lookup] error:', err);
      block.dataset.lookupState = 'error';
      block.dataset.guestId = '';
      if (statusEl) {
        statusEl.textContent           = 'Could not check the guest list right now. Please try again.';
        statusEl.style.borderLeftColor = '#C23331';
        statusEl.style.background      = 'rgba(194,51,49,0.08)';
        statusEl.style.color           = '#C23331';
      }
      clearHousehold(block);
      checkShowSubmit();
    });
}

function clearHousehold(block) {
  // Wipe the household section back to empty + hidden. Called on lookup
  // failure / ambiguous / unknown so a stale household from a previous
  // lookup doesn't linger when the user retypes their name.
  var eventId = block.dataset.eventId;
  var section = document.getElementById('household-' + eventId);
  var label   = document.getElementById('household-label-' + eventId);
  var list    = document.getElementById('household-list-' + eventId);
  if (section) section.classList.remove('visible');
  if (label) label.textContent = '';
  if (list) list.innerHTML = '';
  block.dataset.householdMembers = '';
}

function renderHousehold(block, json) {
  // Populate the household section from a guest-lookup response. If the
  // response has no `household_members` array (legacy backend, or a solo
  // guest with no party), this is a no-op and the section stays hidden.
  //
  // Each member becomes a small card with name + per-person attending /
  // meal / entree dropdowns. The person filling out the form is asked to
  // RSVP for the whole household at once — anyone in the party can do it,
  // not just the primary contact (matches the planner-side behaviour).
  var eventId = block.dataset.eventId;
  var section = document.getElementById('household-' + eventId);
  var label   = document.getElementById('household-label-' + eventId);
  var list    = document.getElementById('household-list-' + eventId);
  if (!section || !label || !list) return;

  var members = Array.isArray(json && json.household_members) ? json.household_members : [];
  // Strip any entry that's actually the looked-up guest themselves
  // (backend already excludes this, but be defensive).
  members = members.filter(function(m) { return m && m.guest_id && m.guest_id !== json.guest_id; });

  if (members.length === 0) {
    clearHousehold(block);
    return;
  }

  // Stash members on the block so submitRSVP can post a household_rsvps array.
  block.dataset.householdMembers = JSON.stringify(members.map(function(m) {
    return { guest_id: m.guest_id, name: m.name };
  }));

  var partyName = (json.party_name || '').trim();
  label.textContent = partyName
    ? 'Your household — ' + partyName + ' (' + members.length + ' other ' + (members.length === 1 ? 'person' : 'people') + ')'
    : 'Your household (' + members.length + ' other ' + (members.length === 1 ? 'person' : 'people') + ')';

  // Reuse the entree options from the global config (same list the primary sees).
  var entreeOptsHtml = _rsvpEntreeOptions.map(function(o) {
    return '<option value="' + o.value + '">' + o.label + '</option>';
  }).join('');

  list.innerHTML = '';
  members.forEach(function(m, idx) {
    var row = document.createElement('div');
    row.className = 'rsvp-household-row';
    row.dataset.guestId = m.guest_id;
    row.dataset.memberIdx = String(idx);

    var savedMeal = (m.meal_preference || '').trim();
    var mealOpts = [
      { v: '',                l: 'Meal type' },
      { v: 'Vegetarian',      l: 'Vegetarian' },
      { v: 'Non Vegetarian',  l: 'Non-Vegetarian' },
      { v: 'Vegan',           l: 'Vegan' },
      { v: 'Gluten Free',     l: 'Gluten-Free' },
      { v: 'Kids Meal',       l: 'Kids Meal' },
    ].map(function(o) {
      var sel = (o.v === savedMeal) ? ' selected' : '';
      return '<option value="' + o.v + '"' + sel + '>' + o.l + '</option>';
    }).join('');

    var primaryTag = m.is_primary
      ? '<span class="rsvp-household-name-primary-tag">primary contact</span>'
      : '';

    // Each select is wrapped so the styled chevron sits on top — matches
    // the look of the primary's selects.
    row.innerHTML =
      '<div class="rsvp-household-name">' + (m.name || '(household member)') + primaryTag + '</div>' +
      '<div class="rsvp-household-controls three-up">' +
        '<div class="rsvp-select-wrap">' +
          '<select class="rsvp-select" data-h-field="attending">' +
            '<option value="">Will attend?</option>' +
            '<option value="yes">Attending</option>' +
            '<option value="no">Cannot make it</option>' +
            '<option value="maybe">Not sure</option>' +
          '</select>' +
          '<span class="rsvp-chevron">▾</span>' +
        '</div>' +
        '<div class="rsvp-select-wrap">' +
          '<select class="rsvp-select" data-h-field="meal">' + mealOpts + '</select>' +
          '<span class="rsvp-chevron">▾</span>' +
        '</div>' +
        '<div class="rsvp-select-wrap">' +
          '<select class="rsvp-select" data-h-field="entree">' +
            '<option value="">Entree (optional)</option>' + entreeOptsHtml +
          '</select>' +
          '<span class="rsvp-chevron">▾</span>' +
        '</div>' +
      '</div>';
    list.appendChild(row);
  });

  section.classList.add('visible');
}

function showAmbiguousMatches(block, matches) {
  // Render a small picker so the user disambiguates between guests with similar
  // (or identical) names. Each match shows the masked email so duplicates can be
  // distinguished. Selection sends the picked guest_id to /guest-by-id/, which
  // bypasses fuzzy matching entirely — avoids the loop where two guests with
  // literally the same name keep returning ambiguous.
  var eventId  = block.dataset.eventId;
  var expanded = document.getElementById('expanded-' + eventId);
  if (!expanded) return;
  var existing = expanded.querySelector('.rsvp-name-disambig');
  if (existing) existing.remove();
  if (!matches.length) return;

  var wrap = document.createElement('div');
  wrap.className = 'rsvp-name-disambig';
  wrap.style.cssText = 'background:#f9f7f5;border:1px solid #e3dfd6;border-radius:6px;padding:0.55rem 0.7rem;margin-bottom:0.6rem;font-family:var(--serif, serif);font-size:0.78rem;color:#4B5244;';
  var label = document.createElement('div');
  label.textContent = 'We found a few matches — please pick yours:';
  label.style.cssText = 'margin-bottom:0.4rem;font-size:0.72rem;color:#888';
  wrap.appendChild(label);

  matches.forEach(function(m) {
    var btn = document.createElement('button');
    btn.type = 'button';
    btn.style.cssText = 'display:block;width:100%;text-align:left;border:1px solid #e3dfd6;background:#fff;padding:0.45rem 0.7rem;border-radius:4px;margin-bottom:0.3rem;cursor:pointer;font-family:var(--serif, serif);font-size:0.85rem;color:#121212;';
    var nameSpan = document.createElement('div');
    nameSpan.textContent = m.name;
    nameSpan.style.cssText = 'font-weight:500;';
    btn.appendChild(nameSpan);
    if (m.hint) {
      var hintSpan = document.createElement('div');
      hintSpan.textContent = m.hint;
      hintSpan.style.cssText = 'font-size:0.7rem;color:#999;font-family:Open Sans, sans-serif;margin-top:2px;';
      btn.appendChild(hintSpan);
    }
    btn.onclick = function() {
      var nameInput = block.querySelector('.rsvp-name-input, .rsvp-name-pill');
      if (nameInput) nameInput.value = m.name;
      wrap.remove();
      lookupGuestById(block, m.id, m.name);
    };
    wrap.appendChild(btn);
  });
  expanded.insertBefore(wrap, expanded.firstChild);
}

function lookupGuestById(block, guestId, displayName) {
  if (typeof _isPreview !== 'undefined' && _isPreview) return;
  var slug = window._weddingSlug || '';
  if (!slug || !guestId) return;
  var eventId  = block.dataset.eventId;
  var expanded = document.getElementById('expanded-' + eventId);
  var statusEl = block.querySelector('.rsvp-lookup-status');
  if (statusEl) {
    statusEl.textContent = 'Confirming…';
    statusEl.style.borderLeftColor = '#A9BDC4';
    statusEl.style.background      = 'rgba(169,189,196,0.1)';
    statusEl.style.color           = '#8C7D6E';
  }
  var url = API + '/wedding-site/' + encodeURIComponent(slug) + '/guest-by-id/' + encodeURIComponent(guestId);
  console.log('[RSVP lookup-by-id]', url);
  fetch(url)
    .then(function(r) { return r.ok ? r.json() : null; })
    .then(function(json) {
      console.log('[RSVP lookup-by-id] response', json);
      if (!json || !json.found) {
        block.dataset.lookupState = 'unknown';
        block.dataset.guestId = '';
        if (statusEl) {
          statusEl.textContent           = "We couldn't verify that guest. Please try again.";
          statusEl.style.borderLeftColor = '#C23331';
          statusEl.style.background      = 'rgba(194,51,49,0.08)';
          statusEl.style.color           = '#C23331';
        }
        clearHousehold(block);
        checkShowSubmit();
        return;
      }
      block.dataset.guestId          = json.guest_id || '';
      block.dataset.plusOneAllowed   = json.plus_one_allowed ? '1' : '0';
      block.dataset.householdAllowed = String(json.household_members_allowed || 0);
      block.dataset.lookupState      = 'found';
      if (statusEl) {
        statusEl.textContent           = '✓ Found you on the list — ' + (json.name || displayName);
        statusEl.style.borderLeftColor = '#4B5244';
        statusEl.style.background      = 'rgba(75,82,68,0.08)';
        statusEl.style.color           = '#4B5244';
      }
      var addBtn = expanded && expanded.querySelector('.rsvp-add-guest');
      if (addBtn) addBtn.style.display = json.plus_one_allowed ? '' : 'none';
      renderHousehold(block, json);
      checkShowSubmit();
    })
    .catch(function(err) {
      console.warn('[RSVP lookup-by-id] error:', err);
    });
}

function checkShowSubmit() {
  // Submit visible only when at least one block has lookupState='found' AND
  // an email containing '@'. Backend re-validates either way.
  var blocks = document.querySelectorAll('.rsvp-event-block');
  var anyValid = false;
  blocks.forEach(function(block) {
    var nameInput = block.querySelector('.rsvp-name-input, .rsvp-name-pill');
    var nameVal = nameInput ? (nameInput.value || '') : '';
    if (nameVal.trim().length < 2) return;
    if (block.dataset.lookupState !== 'found') return;
    var eid = block.dataset.eventId;
    var exp = document.getElementById('expanded-' + eid);
    var emailEl = exp && exp.querySelector('[data-field="email"]');
    var emailVal = emailEl ? (emailEl.value || '').trim() : '';
    if (!emailVal || emailVal.indexOf('@') < 1) return;
    anyValid = true;
  });
  var btn = document.getElementById('rsvpSubmitBtn');
  if (btn) btn.style.display = anyValid ? 'block' : 'none';
}

async function submitRSVP() {
  if (typeof _isPreview !== 'undefined' && _isPreview) { alert('RSVP is disabled in preview mode.'); return; }
  var blocks = document.querySelectorAll('.rsvp-event-block');
  var slug   = window._weddingSlug || '';
  var btn    = document.getElementById('rsvpSubmitBtn');
  if (!btn) return;
  btn.disabled = true; btn.textContent = 'Submitting...';
  try {
    var promises = [];
    blocks.forEach(function(block) {
      var nameInput = block.querySelector('.rsvp-name-input, .rsvp-name-pill');
      var name = nameInput ? nameInput.value.trim() : '';
      if (!name) return;
      // Hard gate: skip blocks that didn't resolve to the guest list
      if (block.dataset.lookupState !== 'found' || !block.dataset.guestId) return;
      var eid = block.dataset.eventId;
      var exp = document.getElementById('expanded-' + eid);
      var attending = (exp && exp.querySelector('[data-field="attending"]')) ? exp.querySelector('[data-field="attending"]').value : 'yes';
      var meal      = (exp && exp.querySelector('[data-field="meal"]'))      ? exp.querySelector('[data-field="meal"]').value      : '';
      var entree    = (exp && exp.querySelector('[data-field="entree"]'))    ? exp.querySelector('[data-field="entree"]').value    : '';
      var email     = (exp && exp.querySelector('[data-field="email"]'))     ? exp.querySelector('[data-field="email"]').value     : '';
      var dietary   = (exp && exp.querySelector('[data-field="dietary"]'))   ? exp.querySelector('[data-field="dietary"]').value   : '';
      var notes     = (exp && exp.querySelector('[data-field="notes"]'))    ? exp.querySelector('[data-field="notes"]').value    : '';
      var labelEl   = block.querySelector('.rsvp-event-label');
      var label     = labelEl ? labelEl.textContent : '';

      // Skip if email empty (frontend-required, defense in depth)
      if (!email || email.trim().indexOf('@') < 1) return;

      var resolvedGuestId = block.dataset.guestId || null;

      // Plus-one bundled as extra_guests so backend creates a separate row
      // with the same Couple Group (atomic).
      var extraGuests = [];
      var plusOneRow = exp && exp.querySelector('.extra-guest-row');
      if (plusOneRow) {
        var pn = (plusOneRow.querySelector('[data-role="plus-one-name"]') || {}).value || '';
        var pm = (plusOneRow.querySelector('[data-role="plus-one-meal"]') || {}).value || '';
        var pe = (plusOneRow.querySelector('[data-role="plus-one-entree"]') || {}).value || '';
        if (pn.trim()) {
          extraGuests.push({ name: pn.trim(), meal: pm, entree: pe });
        }
      }

      // Collect household RSVPs — each row in the household section maps to
      // an existing Guest List record that we update by guest_id. Backend
      // re-verifies that each guest_id belongs to this celebration AND
      // shares the primary's Party Name; defense-in-depth (see /rsvp).
      // Rows with no attending value selected are skipped so we don't
      // overwrite a previously-saved RSVP with a blank.
      var householdRsvps = [];
      var hList = exp && exp.querySelector('.rsvp-household-list');
      if (hList) {
        var hRows = hList.querySelectorAll('.rsvp-household-row');
        hRows.forEach(function(hr) {
          var gid = hr.dataset.guestId || '';
          if (!gid) return;
          var hAttendingEl = hr.querySelector('[data-h-field="attending"]');
          var hMealEl      = hr.querySelector('[data-h-field="meal"]');
          var hEntreeEl    = hr.querySelector('[data-h-field="entree"]');
          var hAttending = hAttendingEl ? (hAttendingEl.value || '').trim() : '';
          // Skip unanswered rows — leaves their existing RSVP untouched.
          if (!hAttending) return;
          householdRsvps.push({
            guest_id:        gid,
            attending:       hAttending,
            meal_preference: hMealEl  ? (hMealEl.value  || '') : '',
            entree_choice:   hEntreeEl ? (hEntreeEl.value || '') : '',
          });
        });
      }

      promises.push(fetch(API + '/rsvp', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          slug:            slug,
          guest_name:      name,
          guest_id:        resolvedGuestId,
          attending:       attending || 'yes',
          meal_preference: meal || '',
          entree_choice:   entree || '',
          email:           email || '',
          dietary_notes:   dietary || '',
          message:         notes || '',
          event_name:      label,
          plus_one:        extraGuests.length > 0,
          extra_guests:    extraGuests,
          // RSVPs for known household members (already on the guest list).
          // Empty array is fine — solo guests just won't send any.
          household_rsvps: householdRsvps,
        })
      }));
    });
    var results = await Promise.all(promises);
    var anyOk = false, failedDetail = null;
    for (var i = 0; i < results.length; i++) {
      if (results[i].ok) { anyOk = true; }
      else {
        try { failedDetail = (await results[i].json()).detail || null; } catch (e) {}
      }
    }
    if (!anyOk) {
      throw new Error(failedDetail || 'RSVP submission failed.');
    }
    // Tally how many people we actually RSVP'd for so the thank-you message
    // can reflect it. Backend returns `total` per event (1 = primary only,
    // higher if household members or plus-ones were submitted alongside).
    var totalPeople = 0;
    for (var rj = 0; rj < results.length; rj++) {
      if (!results[rj].ok) continue;
      try {
        var okBody = await results[rj].json();
        if (okBody && typeof okBody.total === 'number') totalPeople += okBody.total;
      } catch (_e) { /* non-fatal */ }
    }
    var successEl = document.getElementById('rsvpSuccess');
    if (successEl && totalPeople > 1) {
      var msgEl = successEl.querySelector('.rsvp-success-msg');
      if (msgEl) {
        msgEl.innerHTML = 'Thank you! We\'ve recorded RSVPs for ' + totalPeople +
          ' ' + (totalPeople === 1 ? 'person' : 'people') + '.';
      }
    }
    if (successEl) successEl.style.display = 'block';
    btn.style.display = 'none';
  } catch (err) {
    console.error('[RSVP submit]', err);
    alert('Sorry — ' + (err && err.message ? err.message : 'something went wrong submitting your RSVP. Please try again.'));
    btn.disabled = false; btn.textContent = 'Send My RSVP';
  }
}

  }else{
    // Loading screen — uses LOADING_IMAGE constant defined at top of script.
    // Template literal (backticks) for ${LOADING_IMAGE} interpolation.
    document.body.innerHTML = `
      <style>
        @keyframes ghBreathe {
          0%, 100% { transform: scale(1); opacity: 0.92; }
          50%      { transform: scale(1.06); opacity: 1; }
        }
        @keyframes ghLineSlide {
          0%   { left: -100%; }
          50%  { left: 0%; }
          100% { left: 100%; }
        }
      </style>
      <div style="display:flex;align-items:center;justify-content:center;
        min-height:100vh;flex-direction:column;gap:24px;background:var(--blue, #d7dde4);
        background-image:radial-gradient(ellipse 60% 40% at 20% 80%, rgba(50,52,75,0.06) 0%, transparent 60%),
          radial-gradient(ellipse 40% 60% at 80% 20%, rgba(50,52,75,0.04) 0%, transparent 60%);">
        <img src="${LOADING_IMAGE}" alt="" style="width:72px;height:72px;object-fit:contain;border-radius:50%;
          animation:ghBreathe 2.4s ease-in-out infinite;
          filter:drop-shadow(0 4px 12px rgba(50,52,75,0.18));">
        <p style="font-family:'EB Garamond', Georgia, serif;
          color:var(--dark, #32344b);
          font-size:1.4rem;font-style:italic;letter-spacing:0.02em;margin:0;">
          Your celebration awaits</p>
        <div style="width:120px;height:1px;background:rgba(50,52,75,0.18);
          border-radius:999px;position:relative;overflow:hidden;">
          <div style="position:absolute;left:-100%;top:0;width:100%;height:100%;
            background:var(--dark, #32344b);border-radius:999px;
            animation:ghLineSlide 1.8s ease-in-out infinite;"></div>
        </div>
      </div>`;
    _reveal();_fetch();
  }
  function _fetch(){
    fetch(API+'/wedding-site/'+encodeURIComponent(_liveSlug)+(_pwdParam?'?password='+encodeURIComponent(_pwdParam):''))
      .then(function(r){if(!r.ok)throw r.status;return r.json();})
      .then(function(d){
        if(d.password_required){
          _renderPlaceholderPage({
            kind: 'password',
            coupleNames: d.couple_names || '',
          });
          return;
        }
        // Backend returns a rich `not_published` payload (couple names,
        // date, status) instead of a bare 403 when the site is in draft.
        // Render a polished Coming Soon page rather than a generic error.
        if(d.not_published){
          _renderPlaceholderPage({
            kind: 'coming-soon',
            coupleNames: d.couple_names || '',
            celebrationDate: d.celebration_date || '',
          });
          return;
        }
        hydrateTemplate(d);
      })
      .catch(function(){
        _renderPlaceholderPage({ kind: 'not-found' });
      });
  }
}

// Renders a branded placeholder page for the three "we can't show the real
// site right now" states: password-required, coming-soon (draft), and
// not-found. Uses Golden Hour's palette (muted blue ground, dark navy text)
// and type (Holiday script display + EB Garamond serif body) so the
// placeholder still feels like the couple's website rather than an error.
function _renderPlaceholderPage(opts){
  var kind            = (opts || {}).kind;
  var coupleNames     = (opts || {}).coupleNames || '';
  var celebrationDate = (opts || {}).celebrationDate || '';

  // Format the date for display when we have one. Stored as ISO yyyy-mm-dd
  // in the DB — render as e.g. "April 5, 2026". Falls back gracefully if
  // the string isn't parseable.
  var dateLine = '';
  if (celebrationDate){
    try {
      var dt = new Date(celebrationDate);
      if (!isNaN(dt.getTime())){
        dateLine = dt.toLocaleDateString('en-US', { year:'numeric', month:'long', day:'numeric' });
      } else {
        dateLine = celebrationDate;
      }
    } catch(e){ dateLine = celebrationDate; }
  }

  // Heading + body per state. We DELIBERATELY avoid the word "undefined"
  // anywhere — every line is built from cleanly defaulted strings.
  var heading, body, badge;
  if (kind === 'password'){
    badge = '🔒';
    heading = coupleNames ? coupleNames : 'A private celebration';
    body = 'This wedding website is password-protected. Please use the link your hosts shared with you to access it.';
  } else if (kind === 'coming-soon'){
    badge = '✨';
    heading = coupleNames ? coupleNames : 'Coming soon';
    body = coupleNames
      ? coupleNames + ' are putting the finishing touches on their wedding website. Please check back soon — we can&rsquo;t wait to share it with you.'
      : 'The hosts are putting the finishing touches on their wedding website. Please check back soon.';
  } else {
    badge = '🔍';
    heading = 'We couldn&rsquo;t find that website';
    body = 'The link you followed may be incorrect, or the website may have moved. Please double-check the address with your hosts.';
  }

  document.body.innerHTML =
    '<div style="' +
      'min-height:100vh;' +
      'display:flex;' +
      'align-items:center;' +
      'justify-content:center;' +
      'padding:32px 20px;' +
      'background:#d7dde4;' +
      'font-family:\'EB Garamond\',Georgia,serif;' +
      'color:#32344b;' +
      'text-align:center;' +
    '">' +
      '<div style="max-width:520px;width:100%;">' +
        '<div style="font-size:32px;margin-bottom:20px;opacity:0.7;">' + badge + '</div>' +
        '<h1 style="' +
          'font-family:\'Holiday\',\'Parfumerie Script\',cursive;' +
          'font-weight:400;' +
          'font-size:clamp(2.4rem,6vw,3.6rem);' +
          'line-height:1.1;' +
          'margin:0 0 16px 0;' +
          'color:#32344b;' +
          'letter-spacing:0.01em;' +
        '">' + heading + '</h1>' +
        (dateLine ? (
          '<p style="' +
            'font-family:\'EB Garamond\',Georgia,serif;' +
            'font-size:0.78rem;' +
            'font-weight:500;' +
            'font-style:italic;' +
            'letter-spacing:0.18em;' +
            'text-transform:uppercase;' +
            'color:#32344b;' +
            'opacity:0.65;' +
            'margin:0 0 22px 0;' +
          '">' + dateLine + '</p>'
        ) : '') +
        '<p style="' +
          'font-family:\'EB Garamond\',Georgia,serif;' +
          'font-size:1rem;' +
          'font-weight:400;' +
          'line-height:1.7;' +
          'color:#32344b;' +
          'opacity:0.85;' +
          'margin:0 auto;' +
          'max-width:440px;' +
        '">' + body + '</p>' +
        '<div style="' +
          'margin-top:40px;' +
          'padding-top:22px;' +
          'border-top:1px solid rgba(50,52,75,0.18);' +
          'font-family:\'EB Garamond\',Georgia,serif;' +
          'font-size:0.7rem;' +
          'font-weight:500;' +
          'letter-spacing:0.18em;' +
          'text-transform:uppercase;' +
          'color:rgba(50,52,75,0.5);' +
        '">myplanning.ai</div>' +
      '</div>' +
    '</div>';
}
</script>
</body>
